<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="assets/css/theme.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification | TigerEx</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#F0B90B; --bg:#0B0E11; --card:#1E2329; --text:#EAECEF; --text2:#848E9C; --border:#2B3139; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); margin:0; min-height:100vh; }
    .h { background:var(--card); padding:16px 24px; display:flex; align-items:center; gap:16px; border-bottom:1px solid var(--border); }
    .logo { display:flex; align-items:center; gap:8px; font-size:22px; font-weight:700; color:var(--text); text-decoration:none; }
    .i { width:36px; height:36px; background:linear-gradient(135deg,var(--primary),#FF6B6B); border-radius:10px; display:flex; align-items:center; justify-content:center; }
    .b { color:var(--text); text-decoration:none; font-size:14px; padding:8px 12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; }
    .c { max-width:800px; margin:0 auto; padding:40px 24px; text-align:center; }
    h1 { font-size:32px; margin-bottom:16px; }
    p { color:var(--text2); font-size:16px; margin-bottom:24px; }
    .btn { padding:14px 32px; background:var(--primary); color:var(--bg); border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; }
  .theme-toggle { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--bg-card); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; padding: 8px; } .theme-toggle:hover { background: var(--bg-card-hover); } body { transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body>
  <div class="h">
    <a href="dashboard.html" class="b">← Back</a>
    <a href="dashboard.html" class="logo"><div class="i">🐯</div>TigerEx</a>
  </div>
  <div class="c">
    <h1>Coming Soon</h1>
    <p>This feature is under development.</p>
    <a href="dashboard.html" class="btn">Go to Dashboard</a>
  </div>
    <script src="assets/js/theme.js"></script>
</body>
</html>
