<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Verification</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const App = () => {
            const [kyc, setKyc] = useState({email:true, phone:true, id:false, selfie:false});
            
            return (
                <div className="container-fluid p-4">
                    <h4 className="mb-4"><i className="bi bi-shield-check me-2"></i>Verification</h4>
                    <div className="card-panel p-4">
                        <div className="d-flex justify-content-between p-3 mb-2" style={{background:'var(--dark2)',borderRadius:8}}>
                            <div><div>Email</div><small className="text-success">Verified</small></div>
                            <span className="badge bg-success">{kyc.email?'✓':'○'}</span>
                        </div>
                        <div className="d-flex justify-content-between p-3 mb-2" style={{background:'var(--dark2)',borderRadius:8}}>
                            <div><div>Phone</div><small className="text-success">Verified</small></div>
                            <span className="badge bg-success">{kyc.phone?'✓':'○'}</span>
                        </div>
                        <div className="d-flex justify-content-between p-3 mb-2" style={{background:'var(--dark2)',borderRadius:8}}>
                            <div><div>Government ID</div><small className="text-muted">{kyc.id?'Verified':'Not submitted'}</small></div>
                            <button className="btn btn-sm" style={{background:'var(--primary)',color:'#000'}}>Verify</button>
                        </div>
                        <div className="d-flex justify-content-between p-3" style={{background:'var(--dark2)',borderRadius:8}}>
                            <div><div>Selfie</div><small className="text-muted">{kyc.selfie?'Verified':'Not submitted'}</small></div>
                            <button className="btn btn-sm" style={{background:'var(--primary)',color:'#000'}}>Verify</button>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
