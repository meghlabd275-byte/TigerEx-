<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Dynamic Trading Platform</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Web3.js -->
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    
    <!-- Ethers.js -->
    <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d4aa;
            --primary-dark: #00b894;
            --secondary: #1a1a2e;
            --dark: #0f0f1a;
            --dark-light: #16213e;
            --light: #f8f9fa;
            --success: #00ff88;
            --danger: #ff4757;
            --warning: #ffa502;
            --info: #3498db;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
        }
        
        /* Navbar */
        .navbar-custom {
            background: linear-gradient(180deg, var(--secondary) 0%, var(--dark) 100%);
            border-bottom: 1px solid rgba(0, 212, 170, 0.2);
            padding: 12px 0;
        }
        
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary) !important;
        }
        
        .nav-link-custom {
            color: rgba(255,255,255,0.7) !important;
            padding: 8px 16px !important;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .nav-link-custom:hover, .nav-link-custom.active {
            color: var(--primary) !important;
            background: rgba(0, 212, 170, 0.1);
        }
        
        /* Cards */
        .card-custom {
            background: var(--secondary);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            transition: all 0.3s;
        }
        
        .card-custom:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 32px rgba(0, 212, 170, 0.1);
        }
        
        /* Price Colors */
        .price-up { color: var(--success) !important; }
        .price-down { color: var(--danger) !important; }
        
        /* Buttons */
        .btn-primary-custom {
            background: var(--primary);
            border: none;
            color: var(--dark);
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .btn-primary-custom:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        
        .btn-buy { background: var(--success); color: #000; }
        .btn-sell { background: var(--danger); color: #fff; }
        
        /* Ticker Tape */
        .ticker-tape {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            padding: 8px 0;
            overflow: hidden;
        }
        
        .ticker-content {
            display: flex;
            animation: scroll 40s linear infinite;
            white-space: nowrap;
        }
        
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        /* Order Book */
        .order-book {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .order-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            font-family: 'Monaco', monospace;
            font-size: 0.85rem;
            position: relative;
        }
        
        .depth-bar {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            opacity: 0.2;
            transition: width 0.3s;
        }
        
        /* Forms */
        .form-control-custom {
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--light);
            border-radius: 8px;
            padding: 12px;
        }
        
        .form-control-custom:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.2);
            outline: none;
        }
        
        /* Wallet */
        .wallet-address {
            font-family: 'Monaco', monospace;
            background: var(--dark);
            padding: 8px 12px;
            border-radius: 8px;
            word-break: break-all;
        }
        
        /* Loading */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 212, 170, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Connection Status */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected { background: var(--success); }
        .status-dot.disconnected { background: var(--danger); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Web3 Connect */
        .wallet-connect-btn {
            background: linear-gradient(135deg, #627eea 0%, #00d4aa 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .wallet-connect-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(98, 126, 234, 0.4);
        }
        
        /* Sidebar */
        .sidebar {
            background: var(--secondary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        
        .sidebar-link:hover, .sidebar-link.active {
            background: rgba(0, 212, 170, 0.1);
            color: var(--primary);
        }
        
        /* Market Tabs */
        .market-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
        }
        
        .market-tab {
            padding: 8px 16px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .market-tab:hover, .market-tab.active {
            background: var(--primary);
            color: var(--dark);
            border-color: var(--primary);
        }
        
        /* Price Input */
        .price-input-group {
            display: flex;
            gap: 8px;
        }
        
        .price-btn {
            padding: 8px 12px;
            background: var(--dark);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--light);
            border-radius: 8px;
            cursor: pointer;
        }
        
        .price-btn:hover { background: var(--secondary); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .card-custom { margin-bottom: 16px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        // API Configuration - Dynamic from backend
        const API_CONFIG = {
            production: 'http://localhost:5300',
            price: 'http://localhost:5200',
            wallet: 'http://localhost:6000',
            exchange: 'http://localhost:5900',
            blockchain: 'http://localhost:5800'
        };
        
        // Helper function for API calls
        const apiCall = async (service, endpoint, options = {}) => {
            const url = `${API_CONFIG[service]}${endpoint}`;
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                return await response.json();
            } catch (error) {
                console.error(`API Error (${service}${endpoint}):`, error);
                return { error: error.message };
            }
        };
        
        // Web3 Connection Hook
        const useWeb3 = () => {
            const [web3, setWeb3] = useState(null);
            const [account, setAccount] = useState(null);
            const [chainId, setChainId] = useState(null);
            const [balance, setBalance] = useState(null);
            const [connected, setConnected] = useState(false);
            
            const connect = useCallback(async () => {
                if (typeof window.ethereum !== 'undefined') {
                    try {
                        const web3Instance = new Web3(window.ethereum);
                        const accounts = await window.ethereum.request({ 
                            method: 'eth_requestAccounts' 
                        });
                        
                        if (accounts.length > 0) {
                            setWeb3(web3Instance);
                            setAccount(accounts[0]);
                            setConnected(true);
                            
                            // Get chain ID
                            const chain = await web3Instance.eth.getChainId();
                            setChainId(chain);
                            
                            // Get balance
                            const bal = await web3Instance.eth.getBalance(accounts[0]);
                            setBalance(web3Instance.utils.fromWei(bal));
                            
                            // Listen for account changes
                            window.ethereum.on('accountsChanged', (newAccounts) => {
                                setAccount(newAccounts[0] || null);
                                if (newAccounts.length === 0) setConnected(false);
                            });
                            
                            // Listen for chain changes
                            window.ethereum.on('chainChanged', (newChain) => {
                                setChainId(newChain);
                            });
                        }
                    } catch (error) {
                        console.error('Web3 connection error:', error);
                    }
                } else {
                    console.log('MetaMask not installed');
                }
            }, []);
            
            const disconnect = useCallback(() => {
                setWeb3(null);
                setAccount(null);
                setChainId(null);
                setBalance(null);
                setConnected(false);
            }, []);
            
            return { web3, account, chainId, balance, connected, connect, disconnect };
        };
        
        // Ticker Tape Component
        const TickerTape = () => {
            const [tickers, setTickers] = useState([]);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                // Simulated live ticker data (in production, connect to price service)
                const mockTickers = [
                    { symbol: 'BTC/USDT', price: 45000 + Math.random() * 500, change: 2.5 + Math.random() * 2 },
                    { symbol: 'ETH/USDT', price: 2800 + Math.random() * 50, change: 1.8 + Math.random() * 2 },
                    { symbol: 'BNB/USDT', price: 280 + Math.random() * 10, change: 3.2 + Math.random() * 2 },
                    { symbol: 'SOL/USDT', price: 95 + Math.random() * 5, change: 5.5 + Math.random() * 3 },
                    { symbol: 'TIG/USDC', price: 2.5 + Math.random() * 0.1, change: 4.2 + Math.random() * 2 },
                    { symbol: 'MATIC/USDT', price: 0.85 + Math.random() * 0.05, change: -1.5 + Math.random() * 2 },
                    { symbol: 'AVAX/USDT', price: 35 + Math.random() * 2, change: 2.8 + Math.random() * 2 },
                    { symbol: 'ARB/USDT', price: 1.1 + Math.random() * 0.1, change: 3.5 + Math.random() * 2 }
                ];
                setTickers(mockTickers);
                setLoading(false);
                
                // Update prices every 3 seconds
                const interval = setInterval(() => {
                    setTickers(prev => prev.map(t => ({
                        ...t,
                        price: t.price * (0.999 + Math.random() * 0.002),
                        change: t.change + (Math.random() - 0.5) * 0.5
                    })));
                }, 3000);
                
                return () => clearInterval(interval);
            }, []);
            
            if (loading) return <div className="loading-spinner"></div>;
            
            return (
                <div className="ticker-tape">
                    <div className="ticker-content">
                        {[...tickers, ...tickers].map((ticker, i) => (
                            <span key={i} className="mx-4" style={{display: 'inline-flex', gap: '8px'}}>
                                <strong>{ticker.symbol}</strong>
                                <span>${ticker.price.toFixed(2)}</span>
                                <span className={ticker.change >= 0 ? 'price-up' : 'price-down'}>
                                    {ticker.change >= 0 ? '+' : ''}{ticker.change.toFixed(2)}%
                                </span>
                            </span>
                        ))}
                    </div>
                </div>
            );
        };
        
        // Order Book Component
        const OrderBook = ({ symbol }) => {
            const [bids, setBids] = useState([]);
            const [asks, setAsks] = useState([]);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                // Generate order book data (in production, connect to exchange API)
                const generateOrderBook = () => {
                    const basePrice = symbol === 'BTC/USDT' ? 45000 : 
                                     symbol === 'ETH/USDT' ? 2800 : 2.5;
                    
                    const newBids = [];
                    const newAsks = [];
                    
                    for (let i = 0; i < 15; i++) {
                        newBids.push({
                            price: basePrice - (i * (basePrice * 0.001)),
                            quantity: Math.random() * 10 + 1,
                            total: Math.random() * 100 + 10
                        });
                        newAsks.push({
                            price: basePrice + (i * (basePrice * 0.001) * 0.5),
                            quantity: Math.random() * 10 + 1,
                            total: Math.random() * 100 + 10
                        });
                    }
                    
                    setBids(newBids);
                    setAsks(newAsks);
                    setLoading(false);
                };
                
                generateOrderBook();
                
                const interval = setInterval(generateOrderBook, 1000);
                return () => clearInterval(interval);
            }, [symbol]);
            
            if (loading) return <div className="loading-spinner"></div>;
            
            const maxBid = Math.max(...bids.map(b => b.total));
            const maxAsk = Math.max(...asks.map(a => a.total));
            
            return (
                <div className="order-book">
                    <div className="d-flex justify-content-between px-3 py-2 border-bottom border-secondary">
                        <span>Price</span>
                        <span>Amount</span>
                    </div>
                    <div className="asks">
                        {asks.slice().reverse().map((ask, i) => (
                            <div key={i} className="order-row">
                                <span className="price-down">{ask.price.toFixed(2)}</span>
                                <span>{ask.quantity.toFixed(4)}</span>
                                <div className="depth-bar price-down" style={{width: `${(ask.total/maxAsk)*100}%`}}></div>
                            </div>
                        ))}
                    </div>
                    <div className="text-center py-2 border-top border-bottom border-secondary my-2">
                        <span className="h5 text-primary">{symbol.split('/')[1]}</span>
                    </div>
                    <div className="bids">
                        {bids.map((bid, i) => (
                            <div key={i} className="order-row">
                                <span className="price-up">{bid.price.toFixed(2)}</span>
                                <span>{bid.quantity.toFixed(4)}</span>
                                <div className="depth-bar price-up" style={{width: `${(bid.total/maxBid)*100}%`}}></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // Trading Form Component
        const TradingForm = ({ symbol, web3, account, connected }) => {
            const [side, setSide] = useState('buy');
            const [orderType, setOrderType] = useState('limit');
            const [price, setPrice] = useState('');
            const [amount, setAmount] = useState('');
            const [total, setTotal] = useState('0.00');
            const [loading, setLoading] = useState(false);
            const [orderHistory, setOrderHistory] = useState([]);
            
            useEffect(() => {
                if (price && amount) {
                    setTotal((parseFloat(price) * parseFloat(amount)).toFixed(2));
                } else {
                    setTotal('0.00');
                }
            }, [price, amount]);
            
            const placeOrder = async () => {
                if (!connected) {
                    alert('Please connect your wallet first!');
                    return;
                }
                
                if (!price || !amount) {
                    alert('Please enter price and amount');
                    return;
                }
                
                setLoading(true);
                
                try {
                    // In production, call the exchange API
                    const order = {
                        id: 'ORD_' + Date.now(),
                        symbol: symbol,
                        side: side,
                        type: orderType,
                        price: parseFloat(price),
                        amount: parseFloat(amount),
                        status: 'open',
                        time: new Date().toLocaleTimeString()
                    };
                    
                    setOrderHistory(prev => [order, ...prev].slice(0, 10));
                    
                    // If Web3 connected, also try to execute on chain
                    if (web3 && side === 'buy') {
                        // Mock transaction
                        console.log('Would execute on-chain transaction');
                    }
                    
                    alert(`${side.toUpperCase()} order placed successfully!`);
                    
                    setPrice('');
                    setAmount('');
                } catch (error) {
                    console.error('Order error:', error);
                    alert('Failed to place order');
                } finally {
                    setLoading(false);
                }
            };
            
            const setPercentage = (pct) => {
                // In production, get from balance
                const maxAmount = side === 'buy' ? 10000 : 10;
                setAmount((maxAmount * pct / 100).toFixed(4));
            };
            
            return (
                <div className="card-custom p-3">
                    <ul className="nav nav-tabs mb-3">
                        <li className="nav-item">
                            <button 
                                className={`nav-link ${side === 'buy' ? 'active' : ''}`}
                                onClick={() => setSide('buy')}
                                style={{color: side === 'buy' ? '#00ff88' : '#aaa'}}
                            >
                                Buy
                            </button>
                        </li>
                        <li className="nav-item">
                            <button 
                                className={`nav-link ${side === 'sell' ? 'active' : ''}`}
                                onClick={() => setSide('sell')}
                                style={{color: side === 'sell' ? '#ff4757' : '#aaa'}}
                            >
                                Sell
                            </button>
                        </li>
                    </ul>
                    
                    <div className="mb-3">
                        <label className="form-label small text-muted">Order Type</label>
                        <select 
                            className="form-control form-control-custom"
                            value={orderType}
                            onChange={(e) => setOrderType(e.target.value)}
                        >
                            <option value="limit">Limit</option>
                            <option value="market">Market</option>
                            <option value="stop_loss">Stop-Loss</option>
                        </select>
                    </div>
                    
                    {orderType !== 'market' && (
                        <div className="mb-3">
                            <label className="form-label small text-muted">Price</label>
                            <input 
                                type="number" 
                                className="form-control form-control-custom"
                                placeholder="0.00"
                                value={price}
                                onChange={(e) => setPrice(e.target.value)}
                            />
                        </div>
                    )}
                    
                    <div className="mb-3">
                        <label className="form-label small text-muted">Amount</label>
                        <input 
                            type="number" 
                            className="form-control form-control-custom"
                            placeholder="0.00"
                            value={amount}
                            onChange={(e) => setAmount(e.target.value)}
                        />
                    </div>
                    
                    <div className="mb-3">
                        <div className="d-flex gap-2 mb-2">
                            {[25, 50, 75, 100].map(pct => (
                                <button 
                                    key={pct}
                                    className="price-btn flex-grow-1"
                                    onClick={() => setPercentage(pct)}
                                >
                                    {pct}%
                                </button>
                            ))}
                        </div>
                    </div>
                    
                    <div className="mb-3 d-flex justify-content-between">
                        <span className="text-muted">Total</span>
                        <span>${total}</span>
                    </div>
                    
                    <button 
                        className={`btn w-100 ${side === 'buy' ? 'btn-buy' : 'btn-sell'}`}
                        onClick={placeOrder}
                        disabled={loading || !connected}
                    >
                        {loading ? 'Processing...' : `${side === 'buy' ? 'Buy' : 'Sell'} ${symbol.split('/')[0]}`}
                    </button>
                    
                    {!connected && (
                        <div className="mt-2 text-center small text-warning">
                            Connect wallet to trade
                        </div>
                    )}
                    
                    {orderHistory.length > 0 && (
                        <div className="mt-3 border-top pt-3">
                            <h6 className="small">Recent Orders</h6>
                            {orderHistory.map((order, i) => (
                                <div key={i} className="d-flex justify-content-between small py-1">
                                    <span className={order.side === 'buy' ? 'price-up' : 'price-down'}>
                                        {order.side.toUpperCase()}
                                    </span>
                                    <span>{order.price} × {order.amount}</span>
                                    <span className="badge bg-secondary">{order.status}</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };
        
        // Wallet Component
        const Wallet = ({ web3, account, connected, balance }) => {
            const [wallets, setWallets] = useState([]);
            const [balances, setBalances] = useState({});
            const [showCreate, setShowCreate] = useState(false);
            const [selectedChain, setSelectedChain] = useState('ethereum');
            const [loading, setLoading] = useState(false);
            
            const chains = [
                { id: 'ethereum', name: 'Ethereum', symbol: 'ETH' },
                { id: 'bsc', name: 'BNB Chain', symbol: 'BNB' },
                { id: 'polygon', name: 'Polygon', symbol: 'MATIC' },
                { id: 'arbitrum', name: 'Arbitrum', symbol: 'ETH' },
                { id: 'tigerex', name: 'TigerEx', symbol: 'TIG' }
            ];
            
            const createWallet = async (type) => {
                setLoading(true);
                try {
                    // In production, call wallet API
                    const newWallet = {
                        id: (type === 'custodial' ? 'CUST_' : 'NONCUST_') + Date.now(),
                        type: type,
                        chain: selectedChain,
                        address: '0x' + Math.random().toString(16).substr(2, 40),
                        created: new Date().toLocaleDateString()
                    };
                    
                    setWallets(prev => [...prev, newWallet]);
                    setShowCreate(false);
                } finally {
                    setLoading(false);
                }
            };
            
            const getBalance = async (wallet) => {
                if (web3 && wallet.type === 'non_custodial') {
                    try {
                        const bal = await web3.eth.getBalance(wallet.address);
                        return web3.utils.fromWei(bal);
                    } catch {
                        return '0';
                    }
                }
                return (Math.random() * 10).toFixed(4);
            };
            
            return (
                <div className="row">
                    <div className="col-md-4">
                        <div className="card-custom p-3">
                            <div className="d-flex justify-content-between align-items-center mb-3">
                                <h5>My Wallets</h5>
                                <button 
                                    className="btn btn-sm btn-primary-custom"
                                    onClick={() => setShowCreate(!showCreate)}
                                >
                                    + New
                                </button>
                            </div>
                            
                            {showCreate && (
                                <div className="mb-3 p-3" style={{background: 'var(--dark)', borderRadius: '8px'}}>
                                    <select 
                                        className="form-control form-control-custom mb-2"
                                        value={selectedChain}
                                        onChange={(e) => setSelectedChain(e.target.value)}
                                    >
                                        {chains.map(c => (
                                            <option key={c.id} value={c.id}>{c.name}</option>
                                        ))}
                                    </select>
                                    <div className="d-flex gap-2">
                                        <button 
                                            className="btn btn-sm btn-primary flex-grow-1"
                                            onClick={() => createWallet('custodial')}
                                        >
                                            Custodial
                                        </button>
                                        <button 
                                            className="btn btn-sm btn-outline-primary flex-grow-1"
                                            onClick={() => createWallet('non_custodial')}
                                        >
                                            Non-Custodial
                                        </button>
                                    </div>
                                </div>
                            )}
                            
                            {connected && account && (
                                <div className="wallet-card mb-2 p-2" style={{background: 'var(--dark)', borderRadius: '8px'}}>
                                    <div className="d-flex justify-content-between">
                                        <span className="badge bg-primary">{selectedChain}</span>
                                        <span className="badge bg-warning">Connected</span>
                                    </div>
                                    <div className="wallet-address mt-2 small">
                                        {account.substring(0, 10)}...{account.substring(38)}
                                    </div>
                                    <div className="text-primary mt-1">
                                        {balance ? parseFloat(balance).toFixed(6) : '0'} {chains.find(c => c.id === selectedChain)?.symbol}
                                    </div>
                                </div>
                            )}
                            
                            {wallets.length === 0 && !connected && (
                                <p className="text-muted text-center">No wallets yet</p>
                            )}
                            
                            {wallets.map((w, i) => (
                                <div key={i} className="wallet-card mb-2 p-2" style={{background: 'var(--dark)', borderRadius: '8px'}}>
                                    <div className="d-flex justify-content-between">
                                        <span className="badge bg-secondary">{w.chain}</span>
                                        <span className="badge bg-info">{w.type}</span>
                                    </div>
                                    <div className="wallet-address mt-2 small">
                                        {w.address.substring(0, 14)}...
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="col-md-8">
                        <div className="card-custom p-3">
                            <h5 className="mb-3">Balance</h5>
                            
                            {connected ? (
                                <div className="row">
                                    {chains.map(chain => (
                                        <div key={chain.id} className="col-md-4 mb-3">
                                            <div className="p-3" style={{background: 'var(--dark)', borderRadius: '12px'}}>
                                                <div className="d-flex justify-content-between">
                                                    <span>{chain.symbol}</span>
                                                    <span className="text-muted">{chain.name}</span>
                                                </div>
                                                <div className="h4 text-primary mt-2">
                                                    {parseFloat(Math.random() * 10).toFixed(4)}
                                                </div>
                                                <div className="small text-muted">
                                                    ${(parseFloat(Math.random() * 10) * 2800).toFixed(2)}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <p className="text-center text-muted">Connect wallet to view balances</p>
                            )}
                        </div>
                        
                        <div className="card-custom p-3 mt-3">
                            <h5 className="mb-3">Send / Receive</h5>
                            
                            <div className="mb-3">
                                <input 
                                    type="text" 
                                    className="form-control form-control-custom"
                                    placeholder="Recipient address (0x...)"
                                />
                            </div>
                            
                            <div className="mb-3">
                                <input 
                                    type="number" 
                                    className="form-control form-control-custom"
                                    placeholder="Amount"
                                />
                            </div>
                            
                            <div className="d-flex gap-2">
                                <button className="btn btn-primary-custom flex-grow-1">
                                    Send
                                </button>
                                <button className="btn btn-outline-primary flex-grow-1">
                                    Receive
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        // Chart Component
        const PriceChart = ({ symbol }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);
            
            useEffect(() => {
                if (!canvasRef.current) return;
                
                const ctx = canvasRef.current.getContext('2d');
                
                // Generate mock price data
                const basePrice = symbol === 'BTC/USDT' ? 45000 : 
                                 symbol === 'ETH/USDT' ? 2800 : 2.5;
                
                const labels = Array.from({length: 50}, (_, i) => 
                    new Date(Date.now() - (49 - i) * 60000).toLocaleTimeString()
                );
                
                const prices = Array.from({length: 50}, () => 
                    basePrice * (0.98 + Math.random() * 0.04)
                );
                
                if (chartRef.current) {
                    chartRef.current.destroy();
                }
                
                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: symbol,
                            data: prices,
                            borderColor: '#00d4aa',
                            backgroundColor: 'rgba(0, 212, 170, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: { 
                                display: false 
                            },
                            y: {
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#aaa' }
                            }
                        },
                        interaction: {
                            intersect: false,
                            mode: 'index'
                        }
                    }
                });
                
                // Simulate real-time updates
                const interval = setInterval(() => {
                    if (chartRef.current) {
                        const newPrice = basePrice * (0.98 + Math.random() * 0.04);
                        const data = [...chartRef.current.data.datasets[0].data.slice(1), newPrice];
                        const newLabels = [...chartRef.current.data.labels.slice(1), new Date().toLocaleTimeString()];
                        
                        chartRef.current.data.datasets[0].data = data;
                        chartRef.current.data.labels = newLabels;
                        chartRef.current.update('none');
                    }
                }, 2000);
                
                return () => {
                    clearInterval(interval);
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }
                };
            }, [symbol]);
            
            return (
                <div style={{height: '300px'}}>
                    <canvas ref={canvasRef}></canvas>
                </div>
            );
        };
        
        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('trade');
            const [symbol, setSymbol] = useState('BTC/USDT');
            const [connected, setConnected] = useState(false);
            const { web3, account, chainId, balance, connect, disconnect } = useWeb3();
            
            const symbols = ['BTC/USDT', 'ETH/USDT', 'BNB/USDT', 'TIG/USDC', 'SOL/USDT', 'MATIC/USDT'];
            
            const renderPage = () => {
                switch(currentPage) {
                    case 'trade':
                        return (
                            <div className="row mt-4">
                                <div className="col-md-3">
                                    <div className="card-custom p-3">
                                        <h6 className="mb-3">Markets</h6>
                                        <div className="market-tabs" style={{flexDirection: 'column'}}>
                                            {symbols.map(s => (
                                                <div 
                                                    key={s}
                                                    className={`market-tab ${symbol === s ? 'active' : ''} mb-2`}
                                                    onClick={() => setSymbol(s)}
                                                    style={{display: 'flex', justifyContent: 'space-between'}}
                                                >
                                                    <span>{s}</span>
                                                    <span className="price-up">${(Math.random() * 100).toFixed(2)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="col-md-6">
                                    <div className="card-custom p-3 mb-3">
                                        <PriceChart symbol={symbol} />
                                    </div>
                                    <OrderBook symbol={symbol} />
                                </div>
                                
                                <div className="col-md-3">
                                    <TradingForm 
                                        symbol={symbol} 
                                        web3={web3}
                                        account={account}
                                        connected={connected || !!account}
                                    />
                                </div>
                            </div>
                        );
                    
                    case 'wallet':
                        return (
                            <div className="mt-4">
                                <Wallet 
                                    web3={web3}
                                    account={account}
                                    connected={connected || !!account}
                                    balance={balance}
                                />
                            </div>
                        );
                    
                    case 'history':
                        return (
                            <div className="mt-4">
                                <div className="card-custom p-3">
                                    <h5>Trade History</h5>
                                    <table className="table table-dark mt-3">
                                        <thead>
                                            <tr>
                                                <th>Time</th>
                                                <th>Pair</th>
                                                <th>Type</th>
                                                <th>Price</th>
                                                <th>Amount</th>
                                                <th>Total</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {[
                                                {time: '10:45:23', pair: 'BTC/USDT', type: 'buy', price: 45123, amount: 0.5, total: 22561.5},
                                                {time: '10:42:15', pair: 'ETH/USDT', type: 'sell', price: 2815, amount: 2, total: 5630},
                                                {time: '10:38:42', pair: 'BTC/USDT', type: 'buy', price: 44980, amount: 0.1, total: 4498}
                                            ].map((trade, i) => (
                                                <tr key={i}>
                                                    <td>{trade.time}</td>
                                                    <td>{trade.pair}</td>
                                                    <td className={trade.type === 'buy' ? 'price-up' : 'price-down'}>
                                                        {trade.type.toUpperCase()}
                                                    </td>
                                                    <td>{trade.price}</td>
                                                    <td>{trade.amount}</td>
                                                    <td>${trade.total.toFixed(2)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        );
                    
                    default:
                        return null;
                }
            };
            
            return (
                <div>
                    {/* Ticker Tape */}
                    <TickerTape />
                    
                    {/* Navbar */}
                    <nav className="navbar navbar-expand-lg navbar-custom">
                        <div className="container-fluid">
                            <a className="navbar-brand" href="#">
                                <i className="bi bi-graph-up-arrow"></i> TigerEx
                            </a>
                            
                            <div className="d-flex align-items-center gap-3">
                                <div className="connection-status">
                                    <span className={`status-dot ${connected || account ? 'connected' : 'disconnected'}`}></span>
                                    <span className="small">
                                        {connected || account ? 'Connected' : 'Disconnected'}
                                    </span>
                                </div>
                                
                                {account ? (
                                    <button 
                                        className="wallet-connect-btn"
                                        onClick={disconnect}
                                    >
                                        {account.substring(0, 6)}...{account.substring(38)}
                                    </button>
                                ) : (
                                    <button 
                                        className="wallet-connect-btn"
                                        onClick={connect}
                                    >
                                        <i className="bi bi-wallet2 me-2"></i>
                                        Connect Wallet
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>
                    
                    <div className="d-flex">
                        {/* Sidebar */}
                        <div className="sidebar d-none d-md-block" style={{width: '200px'}}>
                            <a 
                                className={`sidebar-link ${currentPage === 'trade' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('trade')}
                            >
                                <i className="bi bi-graph-up"></i> Trade
                            </a>
                            <a 
                                className={`sidebar-link ${currentPage === 'wallet' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('wallet')}
                            >
                                <i className="bi bi-wallet2"></i> Wallet
                            </a>
                            <a 
                                className={`sidebar-link ${currentPage === 'history' ? 'active' : ''}`}
                                onClick={() => setCurrentPage('history')}
                            >
                                <i className="bi bi-clock-history"></i> History
                            </a>
                            <a className="sidebar-link" href="#">
                                <i className="bi bi-gear"></i> Settings
                            </a>
                            <a className="sidebar-link" href="#">
                                <i className="bi bi-question-circle"></i> Help
                            </a>
                        </div>
                        
                        {/* Main Content */}
                        <div className="flex-grow-1 p-3">
                            {renderPage()}
                        </div>
                    </div>
                </div>
            );
        };
        
        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
