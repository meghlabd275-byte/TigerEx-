<!DOCTYPE html>
<!-- TigerEx On-Chain Trading Page -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On-Chain | TigerEx</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
<style>
:root { --primary:#F0B90B; --bg:#0B0E11; --bg2:#151A21; --card:#1E2329; --text:#EAECEF; --text2:#848E9C; --border:#2B3139; --green:#00C087; --red:#F6465D; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
a { text-decoration:none; color:inherit; }
.header { background:var(--card); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.logo { display:flex; align-items:center; gap:10px; font-size:22px; font-weight:700; }
.logo-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--primary),#FF6B6B); border-radius:10px; }
.nav { display:flex; gap:6px; flex-wrap:wrap; }
.nav-link { padding:10px 16px; font-size:13px; color:var(--text); border-radius:8px; text-decoration:none; }
.nav-link:hover, .nav-link.active { background:var(--primary); color:var(--bg); }
.container { max-width:1600px; margin:0 auto; padding:24px; }
.page-title { font-size:32px; font-weight:700; margin-bottom:24px; }
.chain-tabs { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
.chain-tab { padding:12px 24px; font-size:14px; font-weight:600; border-radius:10px; background:var(--card); border:2px solid var(--border); cursor:pointer; }
.chain-tab.active { background:var(--primary); color:var(--bg); border-color:var(--primary); }
.token-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.token-card { background:var(--card); border:2px solid var(--border); border-radius:16px; padding:24px; transition:all 0.2s; cursor:pointer; }
.token-card:hover { border-color:var(--primary); transform:translateY(-2px); }
.token-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.token-icon { width:48px; height:48px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:var(--bg); }
.token-name { font-size:18px; font-weight:700; }
.token-symbol { font-size:13px; color:var(--text2); }
.live-badge { padding:4px 10px; background:var(--green); color:#fff; border-radius:12px; font-size:11px; font-weight:600; }
.price-section { margin:16px 0; }
.current-price { font-size:28px; font-weight:700; }
.price-change { font-size:16px; font-weight:500; }
.price-up { color:var(--green); }
.price-down { color:var(--red); }
.token-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.stat-item { background:var(--bg2); padding:12px; border-radius:8px; }
.stat-label { font-size:12px; color:var(--text2); }
.stat-value { font-size:15px; font-weight:600; }
.trade-btns { display:flex; gap:12px; margin-top:20px; }
.trade-btn { flex:1; padding:14px; font-size:14px; font-weight:600; border:none; border-radius:10px; cursor:pointer; }
.trade-btn.buy { background:var(--green); color:#fff; }
.trade-btn.sell { background:var(--red); color:#fff; }
.footer { background:var(--card); padding:24px; margin-top:40px; text-align:center; color:var(--text2); }
@media (max-width:768px) { .nav { display:none; } }
</style>
</head>
<body>
<div class="header">
<a href="index.html" class="logo"><div class="logo-icon">🐯</div>TigerEx</a>
<nav class="nav">
<a href="index.html" class="nav-link">Home</a>
<a href="markets.html" class="nav-link">Markets</a>
<a href="spot.html" class="nav-link">Exchange</a>
<a href="futures.html" class="nav-link">Futures</a>
<a href="onchain.html" class="nav-link active">On-Chain</a>
</nav>
</div>
<div class="container">
<h1 class="page-title"><i class="fas fa-link"></i> On-Chain Trading</h1>

<div class="chain-tabs">
<div class="chain-tab active">Solana</div>
<div class="chain-tab">Ethereum</div>
<div class="chain-tab">BNB Chain</div>
<div class="chain-tab">Base</div>
</div>

<div class="token-grid">
<div class="token-card">
<div class="token-header">
<div class="token-icon">🐕</div>
<div>
<div class="token-name">Dogwifhat</div>
<div class="token-symbol">WIF</div>
</div>
<span class="live-badge">TRENDING</span>
</div>
<div class="price-section">
<div class="current-price">$3.45</div>
<div class="price-change price-up">+12.5%</div>
</div>
<div class="token-stats">
<div class="stat-item"><div class="stat-label">Market Cap</div><div class="stat-value">$3.4B</div></div>
<div class="stat-item"><div class="stat-label">24h Volume</div><div class="stat-value">$890M</div></div>
</div>
<div class="trade-btns">
<button class="trade-btn buy">Buy</button>
<button class="trade-btn sell">Sell</button>
</div>
</div>

<div class="token-card">
<div class="token-header">
<div class="token-icon" style="background:#9945FF;">🍄</div>
<div>
<div class="token-name">MOG</div>
<div class="token-symbol">MOG</div>
</div>
<span class="live-badge">NEW</span>
</div>
<div class="price-section">
<div class="current-price">$0.0018</div>
<div class="price-change price-up">+8.2%</div>
</div>
<div class="token-stats">
<div class="stat-item"><div class="stat-label">Market Cap</div><div class="stat-value">$1.8B</div></div>
<div class="stat-item"><div class="stat-label">24h Volume</div><div class="stat-value">$520M</div></div>
</div>
<div class="trade-btns">
<button class="trade-btn buy">Buy</button>
<button class="trade-btn sell">Sell</button>
</div>
</div>
</div>

<footer class="footer">
<p>© 2026 TigerEx - On-Chain Trading</p>
</footer>
<script>
document.querySelectorAll('.chain-tab').forEach(tab => {
tab.addEventListener('click', () => {
document.querySelectorAll('.chain-tab').forEach(t => t.classList.remove('active'));
tab.classList.add('active');
});
});
</script>
    <script src="assets/js/auth-guard.js"></script>
</body>
</html>
