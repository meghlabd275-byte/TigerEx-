<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Wallet Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); font-size: 12px; }
        .card-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null});
            const connect = async () => {
                if(window.ethereum) {
                    const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'});
                    if(acc) setS({connected: true, account: acc});
                }
            };
            return {...s, connect};
        };
        
        const ChainIcon = ({c}) => <span style={{fontSize:24}}>{{eth:'🔷',bsc:'🟡',poly:'🟣',arb:'🔵',avax:'🔺',sol:'☀️',tig:'🐯'}[c] || '💰'}</span>;
        
        const WalletCard = ({w}) => (
            <div className="card-panel p-3 mb-3">
                <div className="d-flex justify-content-between mb-2">
                    <div className="d-flex align-items-center gap-2"><ChainIcon c={w.chain} /><span style={{fontWeight:600}}>{w.name}</span></div>
                    <span className="badge" style={{background:'var(--primary)',color:'#000'}}>{w.chain.toUpperCase()}</span>
                </div>
                <div style={{fontFamily:'monospace',fontSize:11,background:'var(--dark3)',padding:8,borderRadius:6,wordBreak:'break-all'}}>{w.address}</div>
                <div className="d-flex justify-content-between mt-2">
                    <span style={{fontWeight:600}}>{w.balance.toFixed(4)} {w.symbol}</span>
                    <div className="d-flex gap-2">
                        <button className="btn btn-sm" style={{background:'var(--dark3)'}}>Receive</button>
                        <button className="btn btn-sm" style={{background:'var(--primary)',color:'#000'}}>Send</button>
                    </div>
                </div>
            </div>
        );
        
        const AssetRow = ({a}) => (
            <div className="d-flex justify-content-between p-3" style={{borderBottom:'1px solid var(--border)'}}>
                <div className="d-flex align-items-center gap-2">
                    <span style={{fontWeight:700,fontSize:20}}>{a.symbol[0]}</span>
                    <div><div style={{fontWeight:600}}>{a.symbol}</div><div className="text-muted" style={{fontSize:11}}>Available</div></div>
                </div>
                <div className="text-end"><div>{a.balance.toFixed(4)}</div><div className="text-warning">${a.value.toFixed(2)}</div></div>
            </div>
        );
        
        const App = () => {
            const {connected, account, connect} = useWeb3();
            const [wallets, setW] = useState([
                {name:'Main',chain:'eth',address:'0x742d35Cc6634C0532925a3b8D0D2C8D3D5A5B5B5',balance:1.25,symbol:'ETH'},
                {name:'BSC',chain:'bsc',address:'0x8AC76a51CC950d5922DD9EA5912B6E5eC08f7D9A0',balance:5.8,symbol:'BNB'},
            ]);
            
            return (
                <div>
                    <nav className="d-flex justify-content-between p-4" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                        <span className="h4" style={{background:'linear-gradient(135deg,#00d4aa,#00f5d4)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent'}}><i className="bi bi-wallet2 me-2"></i>TigerEx Wallet</span>
                        <button className="btn" style={{background:'var(--primary)',color:'#000'}} onClick={connect}>{connected ? account?.slice(0,8)+'...' : 'Connect'}</button>
                    </nav>
                    <div className="container-fluid p-4">
                        <div className="row">
                            <div className="col-md-8">
                                <div className="card-panel p-3 mb-3">
                                    <h5 className="mb-3">My Wallets</h5>
                                    {wallets.map((w,i)=><WalletCard key={i} wallet={w} />)}
                                </div>
                                <div className="card-panel p-3">
                                    <h5 className="mb-3">Assets</h5>
                                    <AssetRow symbol="BTC" balance={0.5} value={39220} />
                                    <AssetRow symbol="ETH" balance={1.25} value={2887.50} />
                                    <AssetRow symbol="USDT" balance={5000} value={5000} />
                                    <AssetRow symbol="TIG" balance={10000} value={25000} />
                                </div>
                            </div>
                            <div className="col-md-4">
                                <div className="card-panel p-3">
                                    <h5 className="mb-3">Quick Actions</h5>
                                    <div className="d-flex flex-column gap-2">
                                        <button className="btn" style={{background:'var(--dark3)'}}>Buy Crypto</button>
                                        <button className="btn" style={{background:'var(--dark3)'}}>Sell</button>
                                        <button className="btn" style={{background:'var(--dark3)'}}>Swap</button>
                                        <button className="btn" style={{background:'var(--dark3)'}}>Stake</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
