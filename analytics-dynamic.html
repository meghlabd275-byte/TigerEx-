<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Analytics</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --purple: #7645d9; --border: #2a3140; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--light); font-family: -apple-system, sans-serif; font-size: 13px; }
        .card-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; }
        .btn-action { background: var(--primary); color: #000; font-weight: 600; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
        .ticker { background: linear-gradient(90deg, var(--primary), #00b894); height: 40px; overflow: hidden; display: flex; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440},{s:'ETH',p:2310},{s:'BNB',p:619}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p: x.p*(0.999+Math.random()*0.002)})), 2000); return () => clearInterval(i); }, []);
            return <div className="ticker">{[...t,...t].map((x,i) => <div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p.toFixed(2)}</span></div>)}</div>;
        };
        
        const PortfolioChart = () => {
            const ref = useRef(null);
            useEffect(() => {
                if(!ref.current) return;
                const ctx = ref.current.getContext('2d');
                if(window.pChart) window.pChart.destroy();
                window.pChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['BTC', 'ETH', 'USDT', 'TIG', 'Others'],
                        datasets: [{ data: [35, 25, 20, 15, 5], backgroundColor: ['#f7931a', '#627eea', '#26a17b', '#00d4aa', '#8b8b8b'] }]
                    },
                    options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
                });
            }, []);
            return <canvas ref={ref}></canvas>;
        };
        
        const PnLChart = () => {
            const ref = useRef(null);
            useEffect(() => {
                if(!ref.current) return;
                const ctx = ref.current.getContext('2d');
                if(window.nlChart) window.nlChart.destroy();
                window.nlChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Jan','Feb','Mar','Apr','May','Jun'],
                        datasets: [{
                            label: 'P&L',
                            data: [1000, 2500, 1800, 3200, 4500, 5200],
                            borderColor: '#00d4aa',
                            backgroundColor: 'rgba(0,212,170,0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: { plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#8b8b8b' } }, x: { ticks: { color: '#8b8b8b' } } } }
                });
            }, []);
            return <canvas ref={ref}></canvas>;
        };
        
        const App = () => (
            <div>
                <Ticker />
                <nav className="d-flex justify-content-between align-items-center px-4 py-2" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                    <span className="h4" style={{background:'linear-gradient(135deg,#00d4aa,#00f5d4)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent',fontWeight:700}}><i className="bi bi-graph-up-arrow me-2"></i>TigerEx Analytics</span>
                </nav>
                <div className="container-fluid p-4">
                    <div className="row">
                        <div className="col-md-3">
                            <div className="card-panel p-4 mb-3">
                                <div className="text-muted mb-2">Total Balance</div>
                                <div className="h3 text-warning">$125,678.90</div>
                                <div className="text-up">+$2,456.78 (2.05%)</div>
                            </div>
                            <div className="card-panel p-4 mb-3">
                                <div className="text-muted mb-2">Today's P&L</div>
                                <div className="h3 text-up">+$1,234.56</div>
                            </div>
                            <div className="card-panel p-4">
                                <div className="text-muted mb-2">Total Trades</div>
                                <div className="h3">1,567</div>
                            </div>
                        </div>
                        <div className="col-md-5">
                            <div className="card-panel p-4 mb-3">
                                <h5 className="mb-3">Portfolio Distribution</h5>
                                <div style={{height:'300px'}}><PortfolioChart /></div>
                            </div>
                        </div>
                        <div className="col-md-4">
                            <div className="card-panel p-4">
                                <h5 className="mb-3">P&L Over Time</h5>
                                <div style={{height:'250px'}}><PnLChart /></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html><script>
const analytics = { volume: 1250000000, users: 1250000, trades: 4500000, pairs: 85 };
function loadAnalytics() {
    document.getElementById('stats').innerHTML = `
        <div class="row">
            <div class="col"><h3>$${(analytics.volume/1e9).toFixed(1)}B</h3><p>Volume</p></div>
            <div class="col"><h3>${(analytics.users/1e6).toFixed(1)}M</h3><p>Users</p></div>
            <div class="col"><h3>${(analytics.trades/1e6).toFixed(1)}M</h3><p>Trades</p></div>
            <div class="col"><h3>${analytics.pairs}</h3><p>Pairs</p></div>
        </div>`;
}
document.addEventListener('DOMContentLoaded', loadAnalytics);
</script>

        ownership: 'USER_OWNS'
    }),
