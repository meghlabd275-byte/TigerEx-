<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Analytics & Reports</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); font-size: 12px; }
        .card-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440},{s:'ETH',p:2310},{s:'BNB',p:619},{s:'TIG',p:2.5}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p: x.p*(0.999+Math.random()*0.002)})), 2000); return () => clearInterval(i); }, []);
            return <div className="d-flex overflow-hidden" style={{background:'linear-gradient(90deg,#00d4aa,#00b894)',height:36}}>{[...t,...t].map((x,i)=><div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p.toFixed(2)}</span></div>)}</div>;
        };
        
        const VolumeChart = () => {
            const ref = useRef(null);
            useEffect(() => {
                if(!ref.current) return;
                const ctx = ref.current.getContext('2d');
                if(window.volChart) window.volChart.destroy();
                window.volChart = new Chart(ctx, {type:'bar', data:{labels:['Jan','Feb','Mar','Apr','May','Jun'], datasets:[{label:'Volume',data:[1.2,1.5,1.8,2.1,2.4,2.5],backgroundColor:'#00d4aa'}]}, options:{plugins:{legend:{display:false}}, scales:{y:{grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#8b8b8b'}}, x:{ticks:{color:'#8b8b8b'}}}}});
            }, []);
            return <canvas ref={ref}></canvas>;
        };
        
        const TxTable = () => {
            const [tx, setTx] = useState([
                {id:'tx1', type:'deposit', asset:'BTC', amount:0.5, status:'confirmed', time:'2024-05-02 10:30'},
                {id:'tx2', type:'withdraw', asset:'ETH', amount:2.0, status:'pending', time:'2024-05-02 09:15'},
                {id:'tx3', type:'trade', asset:'USDT', amount:5000, status:'confirmed', time:'2024-05-01 14:20'},
            ]);
            return (
                <div className="card-panel p-3 mt-3">
                    <h5 className="mb-3">Transaction History</h5>
                    <table className="w-100">
                        <thead><tr style={{borderBottom:'1px solid var(--border)',color:'var(--dim)'}}><th className="p-2 text-start">Type</th><th className="p-2 text-start">Asset</th><th className="p-2 text-start">Amount</th><th className="p-2 text-start">Status</th><th className="p-2 text-start">Time</th></tr></thead>
                        <tbody>{tx.map(t=><tr key={t.id} style={{borderBottom:'1px solid var(--border)'}}><td className="p-2"><span className={`badge ${t.type==='deposit'?'bg-success':t.type==='withdraw'?'bg-danger':'bg-warning'}`} style={{color:'#000'}}>{t.type}</span></td><td className="p-2">{t.asset}</td><td className="p-2">{t.amount}</td><td className="p-2"><span className="badge" style={{background:t.status==='confirmed'?'var(--green)':'orange',color:'#000'}}>{t.status}</span></td><td className="p-2 text-muted">{t.time}</td></tr>)}</tbody>
                    </table>
                </div>
            );
        };
        
        const OrderTable = () => {
            const [orders, setOrders] = useState([
                {id:'ORD1', type:'buy', pair:'BTC/USDT', price:78440, amount:0.5, filled:0.5, status:'filled'},
                {id:'ORD2', type:'sell', pair:'ETH/USDT', price:2310, amount:2, filled:0, status:'open'},
                {id:'ORD3', type:'buy', pair:'BTC/USDT', price:78300, amount:0.25, filled:0.25, status:'filled'},
            ]);
            return (
                <div className="card-panel p-3 mt-3">
                    <h5 className="mb-3">Order History</h5>
                    <table className="w-100">
                        <thead><tr style={{borderBottom:'1px solid var(--border)',color:'var(--dim)'}}><th className="p-2 text-start">Order</th><th className="p-2 text-start">Type</th><th className="p-2 text-start">Pair</th><th className="p-2 text-start">Price</th><th className="p-2 text-start">Filled</th><th className="p-2 text-start">Status</th></tr></thead>
                        <tbody>{orders.map(o=><tr key={o.id} style={{borderBottom:'1px solid var(--border)'}}><td className="p-2">{o.id}</td><td className={`p-2 ${o.type==='buy'?'text-up':'text-down'}`}>{o.type.toUpperCase()}</td><td className="p-2">{o.pair}</td><td className="p-2">{o.price}</td><td className="p-2">{o.filled}/{o.amount}</td><td className="p-2"><span className="badge" style={{background:o.status==='filled'?'var(--green)':'orange',color:'#000'}}>{o.status}</span></td></tr>)}</tbody>
                    </table>
                </div>
            );
        };
        
        const App = () => (
            <div>
                <Ticker />
                <nav className="d-flex justify-content-between p-4" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                    <span className="h4" style={{background:'linear-gradient(135deg,#00d4aa,#00f5d4)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent'}}><i className="bi bi-graph-up me-2"></i>TigerEx Analytics</span>
                </nav>
                <div className="container-fluid p-4">
                    <div className="row g-3 mb-4">
                        <div className="col-md-3"><div className="card-panel p-3"><div className="text-muted">Total Volume</div><div className="h4 text-warning">$2.5B</div></div></div>
                        <div className="col-md-3"><div className="card-panel p-3"><div className="text-muted">Total Trades</div><div className="h4">1.2M</div></div>
                        <div className="col-md-3"><div className="card-panel p-3"><div className="text-muted">Fees</div><div className="h4 text-up">$890K</div></div></div>
                        <div className="col-md-3"><div className="card-panel p-3"><div className="text-muted">Users</div><div className="h4">125K</div></div></div>
                    </div>
                    <div className="row g-3">
                        <div className="col-md-8">
                            <div className="card-panel p-3 mb-3"><h5 className="mb-3">Volume Chart</h5><div style={{height:300}}><VolumeChart /></div></div>
                            <OrderTable />
                        </div>
                        <div className="col-md-4">
                            <TxTable />
                        </div>
                    </div>
                </div>
            </div>
        );
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
