<!DOCTYPE html>
<html>
<head>
<title>Reseller Portal - TigerEx White Label</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root { --primary:#F0B90B; --bg:#0B0E11; --card:#1E2329; --text:#EAECEF; --green:#00C087; --red:#F6465D; }
body { font-family:Inter,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
.container { max-width:1200px; margin:0 auto; }
h1 { color:var(--primary); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; margin-top:20px; }
.card { background:var(--card); padding:24px; border-radius:12px; }
.stat { font-size:32px; font-weight:700; }
.stat-label { font-size:14px; color:#848E9C; }
.btn { background:var(--primary); color:#000; padding:12px 24px; border:none; border-radius:8px; cursor:pointer; font-weight:600; }
table { width:100%; border-collapse:collapse; margin-top:20px; }
th,td { padding:12px; text-align:left; border-bottom:1px solid #2B3139; }
.status-active { color:var(--green); }
</style>
</head>
<body>
<div class="container">
<h1>🐯 Reseller Portal</h1>

<div class="grid">
<div class="card">
<div class="stat">25</div>
<div class="stat-label">Total Clients</div>
</div>
<div class="card">
<div class="stat">$12,450</div>
<div class="stat-label">Monthly Revenue</div>
</div>
<div class="card">
<div class="stat">8</div>
<div class="stat-label">Active Subscriptions</div>
</div>
</div>

<h2>My Clients</h2>
<table>
<tr><th>Client</th><th>Plan</th><th>Revenue</th><th>Status</th><th>Action</th></tr>
<tr><td>CryptoKing</td><td>Professional</td><td>$299/mo</td><td class="status-active">Active</td><td><button class="btn">Manage</button></td></tr>
<tr><td>BitTrade</td><td>Enterprise</td><td>$999/mo</td><td class="status-active">Active</td><td><button class="btn">Manage</button></td></tr>
<tr><td>SafeExchange</td><td>Starter</td><td>$99/mo</td><td class="status-active">Active</td><td><button class="btn">Manage</button></td></tr>
</table>

<h2>Create New Client</h2>
<div class="card" style="max-width:500px;">
<div style="margin-bottom:16px;">
<label>Client Name</label><br>
<input type="text" placeholder="My Exchange" style="width:100%;padding:12px;background:var(--bg);border:1px solid #333;border-radius:8px;color:var(--text);">
</div>
<div style="margin-bottom:16px;">
<label>Select Plan</label><br>
<select style="width:100%;padding:12px;background:var(--bg);border:1px solid #333;border-radius:8px;color:var(--text);">
<option>Starter - $99/month</option>
<option>Professional - $299/month</option>
<option>Enterprise - $999/month</option>
</select>
</div>
<button class="btn">Create Client Account</button>
</div>
</div>
    <script src="assets/js/auth-guard.js"></script>
</body>
</html>
