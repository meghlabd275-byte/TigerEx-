# TigerEx White Label - Nginx Configuration Template
# For custom subdomains

# Main domain (tigerex.com)
server {
    listen 80;
    server_name tigerex.com www.tigerex.com;
    
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
    }
    
    # SSL configuration (use certbot)
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/tigerex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tigerex.com/privkey.pem;
}

# White label client subdomain template
# Replace {client_id} with actual client subdomain
server {
    listen 80;
    server_name {subdomain}.tigerex.com;
    
    # Redirect to client's custom domain if set
    if ($host !~* ^({subdomain})\.tigerex\.com$) {
        # Custom domain handling
    }
    
    location / {
        # Route to specific white label instance
        set $client_id "{client_id}";
        proxy_pass http://localhost:3000;
        proxy_set_header X-Client-ID $client_id;
        proxy_set_header Host $host;
    }
    
    # Custom SSL (per client)
    listen 443 ssl http2;
    ssl_certificate /etc/ssl/client/{client_id}.pem;
    ssl_certificate_key /etc/ssl/client/{client_id}-key.pem;
}

# Example client configurations:
# client1.tigerex.com -> routes to client_001
# myexchange.com -> routes to custom domain

# SSL auto-renewal (certbot)
0 0 * * * certbot renew --quiet --deploy-hook "nginx -s reload"
