<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--light:#eaeaea}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState}=React;
        const App=()=>useState(null);
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
<script>
const makerAPI = { getPairs: () => [
    {pair: "BTC/USDT", bid: "42,495", ask: "42,500", spread: "0.01%"},
    {pair: "ETH/USDT", bid: "2,248", ask: "2,250", spread: "0.09%"}
]};
function loadPairs() {
    let html = '<table><thead><tr><th>Pair</th><th>Bid</th><th>Ask</th><th>Spread</th></tr></thead><tbody>';
    makerAPI.getPairs().forEach(p => {
        html += `<tr><td>${p.pair}</td><td>${p.bid}</td><td>${p.ask}</td><td>${p.spread}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('pairs').innerHTML = html;
}
document.addEventListener('DOMContentLoaded', loadPairs);
</script>
