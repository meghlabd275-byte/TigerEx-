<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Help Center</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const App = () => {
            const [search, setSearch] = useState('');
            const [openF, setOpenF] = useState(0);
            const faqs = [
                {q:'How to deposit?', a:'Go to Wallet > Deposit, select coin, copy address.'},
                {q:'How to trade?', a:'Navigate to Trade, select pair, place order.'},
                {q:'Fees?', a'Maker 0.1%, Taker 0.2%.'},
                {q:'Verification?', a'Complete in Settings > Verification.'},
                {q:'2FA?', a'Set up in Security > 2FA.'},
            ];
            const filtered = faqs.filter(f => f.q.toLowerCase().includes(search.toLowerCase()));
            
            return (
                <div className="container-fluid p-4">
                    <h4 className="mb-4"><i className="bi bi-question-circle me-2"></i>Help Center</h4>
                    <input className="form-control mb-4" placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} />
                    <div className="card-panel p-3">
                        {filtered.map((f, i) => (
                            <div key={i} className="mb-3">
                                <div className="d-flex justify-content-between" onClick={()=>setOpenF(openF===i?null:i)} style={{cursor:'pointer'}}>
                                    <span>{f.q}</span>
                                    <span>{openF===i?'−':'+'}</span>
                                </div>
                                {openF===i && <div className="text-muted mt-2">{f.a}</div>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
