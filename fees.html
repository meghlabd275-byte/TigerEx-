<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Fees</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); font-size: 13px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const App = () => (
            <div className="container-fluid p-4">
                <h4 className="mb-4"><i className="bi bi-percent me-2"></i>Fees</h4>
                <div className="card-panel p-4 mb-3">
                    <table className="w-100">
                        <thead><tr style={{borderBottom:'1px solid var(--border)'}}><th className="p-2 text-start">Tier</th><th className="p-2 text-start">Maker</th><th className="p-2 text-start">Taker</th><th className="p-2 text-start">Volume (30d)</th></tr></thead>
                        <tbody>
                            <tr style={{borderBottom:'1px solid var(--border)'}}><td className="p-2">VIP 0</td><td className="p-2">0.10%</td><td className="p-2">0.20%</td><td className="p-2">&lt; 1BTC</td></tr>
                            <tr style={{borderBottom:'1px solid var(--border)'}}><td className="p-2">VIP 1</td><td className="p-2">0.08%</td><td className="p-2">0.16%</td><td className="p-2">&gt; 1BTC</td></tr>
                            <tr style={{borderBottom:'1px solid var(--border)'}}><td className="p-2">VIP 2</td><td className="p-2">0.05%</td><td className="p-2">0.10%</td><td className="p-2">&gt; 10BTC</td></tr>
                            <tr style={{borderBottom:'1px solid var(--border)'}}><td className="p-2">VIP 3</td><td className="p-2">0.02%</td><td className="p-2">0.05%</td><td className="p-2">&gt; 50BTC</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        );
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
