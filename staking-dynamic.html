<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Staking</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --purple: #7645d9; --border: #2a3140; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--light); font-family: -apple-system, sans-serif; font-size: 12px; }
        .card { background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
        .text-orange { color: var(--orange) !important; }
        .text-purple { color: var(--purple) !important; }
        .btn-stake { background: var(--primary); color: #000; font-weight: 600; }
        .input-field { background: var(--dark3); border: 1px solid var(--border); color: var(--light); padding: 10px; border-radius: 4px; width: 100%; }
        .staking-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: 0.3s; }
        .staking-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .apy-badge { background: linear-gradient(135deg, var(--orange), #ff8c00); color: #000; padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 16px; }
        .lock-badge { background: var(--dark3); padding: 4px 12px; border-radius: 4px; font-size: 11px; }
        .progress-bar { height: 6px; background: var(--dark3); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
        .ticker { background: linear-gradient(90deg, var(--primary), #00b894); height: 36px; overflow: hidden; display: flex; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null});
            const connect = async () => {
                if (window.ethereum) {
                    const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'});
                    if (acc) setS({connected: true, account: acc});
                }
            };
            return {...s, connect};
        };
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440},{s:'ETH',p:2310},{s:'TIG',p:2.5}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p: x.p*(0.999+Math.random()*0.002)}))), 2000); return () => clearInterval(i); }, []);
            return <div className="ticker">{[...t,...t].map((x,i) => <div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p.toFixed(2)}</span></div>)}</div>;
        };
        
        const StakingCard = ({ asset, apy, type, lockPeriod, minStake, totalStaked, reward }) => {
            const progress = (totalStaked / (totalStaked + 500000)) * 100;
            return (
                <div className="staking-card mb-3">
                    <div className="d-flex justify-content-between align-items-start mb-3">
                        <div className="d-flex align-items-center gap-3">
                            <div style={{width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg, var(--primary), var(--purple))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700,color:'#000'}}>{asset[0]}</div>
                            <div>
                                <div style={{fontSize:20,fontWeight:700}}>{asset}</div>
                                <div className="d-flex gap-2 mt-1">
                                    <span className="lock-badge">{type}</span>
                                    <span className="lock-badge">{lockPeriod}</span>
                                </div>
                            </div>
                        </div>
                        <span className="apy-badge">{apy}% APY</span>
                    </div>
                    
                    <div className="row mb-3">
                        <div className="col-4"><div className="text-muted small">Min Stake</div><div>{minStake}</div></div>
                        <div className="col-4"><div className="text-muted small">Total Staked</div><div>{totalStaked.toLocaleString()}</div></div>
                        <div className="col-4"><div className="text-muted small">Est. Daily</div><div className="text-up">${reward}</div></div>
                    </div>
                    
                    <div className="mb-2"><div className="d-flex justify-content-between mb-1"><span className="text-muted">Pool Filled</span><span>{progress.toFixed(0)}%</span></div><div className="progress-bar"><div className="progress-fill" style={{width:progress+'%'}}></div></div></div>
                    
                    <button className="btn btn-stake w-100 mt-2">Stake Now</button>
                </div>
            );
        };
        
        const FlexibleCard = ({ asset, apy, dailyReward, staked }) => (
            <div className="staking-card mb-3">
                <div className="d-flex justify-content-between align-items-start">
                    <div className="d-flex align-items-center gap-3">
                        <div style={{width:48,height:48,borderRadius:'50%',background:'var(--dark3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:700}}>{asset[0]}</div>
                        <div><div style={{fontSize:18,fontWeight:600}}>{asset}</div><div className="text-muted">Flexible</div></div>
                    </div>
                    <span className="apy-badge">{apy}%</span>
                </div>
                <div className="row mt-3">
                    <div className="col-6"><div className="text-muted small">Staked</div><div className="text-orange">{staked}</div></div>
                    <div className="col-6"><div className="text-muted small">Daily Reward</div><div className="text-up">{dailyReward}</div></div>
                </div>
                <button className="btn btn-stake w-100 mt-3">Stake</button>
            </div>
        );
        
        const MyStakes = () => (
            <div className="card p-3 mb-3">
                <h6 className="mb-3">My Staking Positions</h6>
                <div className="d-flex justify-content-between py-2 border-bottom" style={{borderColor:'var(--border)'}}>
                    <div><span className="text-orange me-2">TIG</span><span className="text-muted">Flexible</span></div>
                    <div><div>1,250 TIG</div><div className="text-muted small">≈ $3,125</div></div>
                    <div className="text-end"><div className="text-up">$2.50/day</div><div className="text-purple">12% APY</div></div>
                </div>
                <div className="d-flex justify-content-between py-2 border-bottom" style={{borderColor:'var(--border)'}}>
                    <div><span className="text-purple me-2">ETH</span><span className="text-muted">30 Days</span></div>
                    <div><div>2.5 ETH</div><div className="text-muted small">≈ $5,775</div></div>
                    <div className="text-end"><div className="text-up">$0.85/day</div><div className="text-purple">5.2% APY</div></div>
                </div>
            </div>
        );
        
        const App = () => {
            const {connected, account, connect} = useWeb3();
            const [tab, setTab] = useState('flexible');
            
            return (
                <div>
                    <Ticker />
                    <nav className="d-flex justify-content-between align-items-center px-4 py-2" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                        <span className="h4" style={{background:'linear-gradient(135deg,#00d4aa,#00f5d4)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent',fontWeight:700}}>
                            <i className="bi bi-gem me-2"></i>TigerEx Staking
                        </span>
                        <button className="btn btn-stake" style={{background:connected?'green':'linear-gradient(135deg,#627eea,#00d4aa)'}} onClick={connect}>
                            {connected ? account?.slice(0,8)+'...' : 'Connect'}
                        </button>
                    </nav>
                    <div className="container-fluid p-3">
                        <div className="row mb-3">
                            <div className="col-md-3"><div className="card p-3 text-center"><div className="text-muted">Total Staked</div><div className="text-orange h4">$12.5M</div></div></div>
                            <div className="col-md-3"><div className="card p-3 text-center"><div className="text-muted">Total Rewards</div><div className="text-up h4">$890K</div></div></div>
                            <div className="col-md-3"><div className="card p-3 text-center"><div className="text-muted">Active Stakers</div><div className="h4">12,456</div></div></div>
                            <div className="col-md-3"><div className="card p-3 text-center"><div className="text-muted">Avg. APY</div><div className="text-purple h4">8.5%</div></div></div>
                        </div>
                        <div className="d-flex gap-2 mb-3">
                            {['Flexible', 'Locked', 'DeFi'].map(t => <button key={t} className={`btn ${tab===t?'btn-stake':'btn-outline-secondary'}`} onClick={()=>setTab(t)}>{t}</button>)}
                        </div>
                        <div className="row">
                            <div className="col-md-8">
                                {tab==='Flexible' && <><FlexibleCard asset="TIG" apy={12.5} dailyReward="$2.50" staked="1,250 TIG" /><FlexibleCard asset="USDT" apy={5.2} dailyReward="$1.25" staked="5,000 USDT" /></>}
                                {tab==='Locked' && <><StakingCard asset="TIG" apy={15.2} type="Locked" lockPeriod="30 Days" minStake="100" totalStaked={450000} reward="1.85" /><StakingCard asset="ETH" apy={5.2} type="Locked" lockPeriod="60 Days" minStake="0.1" totalStaked={180000} reward="0.85" /><StakingCard asset="BNB" apy={8.5} type="Locked" lockPeriod="90 Days" minStake="0.01" totalStaked={95000} reward="0.45" /></>}
                                {tab==='DeFi' && <StakingCard asset="TIG-LP" apy={25.5} type="DeFi" lockPeriod="7 Days" minStake="10" totalStaked={320000} reward="5.20" />}
                            </div>
                            <div className="col-md-4"><MyStakes /></div>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>

        ownership: 'USER_OWNS'

    defiSwap: (a, b, amt) => ({ txHash: '0x' + Math.random().toString(16).slice(2, 66) }),

</script>
