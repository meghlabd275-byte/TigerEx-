<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Earn - Staking & Savings</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --purple: #7645d9; --border: #2a3140; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--light); font-family: -apple-system, sans-serif; font-size: 12px; }
        .card { background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
        .text-orange { color: var(--orange) !important; }
        .text-purple { color: var(--purple) !important; }
        .btn-stake { background: var(--primary); color: #000; font-weight: 600; }
        .product-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: 0.3s; }
        .product-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .apy-badge { background: var(--orange); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        .ticker { background: linear-gradient(90deg, var(--primary), #00b894); height: 36px; overflow: hidden; display: flex; }
        .lock-period { background: var(--dark3); padding: 8px 16px; border-radius: 8px; margin: 8px 0; }
        .progress-bar-custom { height: 6px; background: var(--dark3); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null});
            const connect = async () => {
                if (window.ethereum) {
                    const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'});
                    if (acc) setS({connected: true, account: acc});
                }
            };
            return {...s, connect};
        };
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440,c:0.26},{s:'ETH',p:2310,c:0.12},{s:'BNB',p:619,c:-0.23}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p: x.p*(0.999+Math.random()*0.002)}))), 2000); return () => clearInterval(i); }, []);
            return <div className="ticker">{[...t,...t].map((x,i) => <div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p.toFixed(2)}</span><span style={{color:x.c>=0?'#000':'#333'}}>{x.c>=0?'+':''}{x.c.toFixed(2)}%</span></div>)}</div>;
        };
        
        const ProductCard = ({ asset, apy, type, lock, minAmt, total, available }) => {
            const percent = (total - available) / total * 100;
            return (
                <div className="product-card mb-3">
                    <div className="d-flex justify-content-between align-items-start mb-3">
                        <div className="d-flex align-items-center gap-3">
                            <div style={{width:48,height:48,borderRadius:'50%',background:'var(--dark3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{asset[0]}</div>
                            <div><div style={{fontWeight:700,fontSize:16}}>{asset}</div><div className="text-muted">{type}</div></div>
                        </div>
                        <span className="apy-badge">{apy}% APY</span>
                    </div>
                    <div className="lock-period d-flex justify-content-between">
                        <span className="text-muted">Lock Period</span>
                        <span>{lock}</span>
                    </div>
                    <div className="lock-period d-flex justify-content-between">
                        <span className="text-muted">Min. Amount</span>
                        <span>{minAmt}</span>
                    </div>
                    <div className="mt-3">
                        <div className="d-flex justify-content-between mb-1"><span className="text-muted">Progress</span><span>{percent.toFixed(0)}%</span></div>
                        <div className="progress-bar-custom"><div className="progress-fill" style={{width:percent+'%'}}></div></div>
                    </div>
                    <div className="mt-3 d-flex justify-content-between text-muted" style={{fontSize:11}}>
                        <span>Available: {available.toLocaleString()}</span>
                        <span>Total: {total.toLocaleString()}</span>
                    </div>
                    <button className="btn btn-stake w-100 mt-3">Stake Now</button>
                </div>
            );
        };
        
        const FlexibleCard = ({ asset, apy, }) => {
            return (
                <div className="product-card mb-3">
                    <div className="d-flex justify-content-between align-items-start">
                        <div className="d-flex align-items-center gap-3">
                            <div style={{width:48,height:48,borderRadius:'50%',background:'var(--dark3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{asset[0]}</div>
                            <div><div style={{fontWeight:700,fontSize:16}}>{asset}</div><div className="text-muted">Flexible</div></div>
                        </div>
                        <span className="apy-badge">{apy}% APY</span>
                    </div>
                    <div className="mt-3 p-3" style={{background:'var(--dark3)',borderRadius:8}}>
                        <div className="d-flex justify-content-between"><span className="text-muted">Daily Rewards</span><span className="text-up">$0.00</span></div>
                        <div className="d-flex justify-content-between mt-2"><span className="text-muted">Total Staked</span><span>$1,234.56</span></div>
                    </div>
                    <button className="btn btn-stake w-100 mt-3">Stake</button>
                </div>
            );
        };
        
        const StakingStats = () => (
            <div className="card p-4 mb-3">
                <div className="row">
                    <div className="col-4 text-center">
                        <div className="text-muted">Total Value Locked</div>
                        <div className="text-orange h4 mb-0">$12,345,678</div>
                    </div>
                    <div className="col-4 text-center">
                        <div className="text-muted">Total Rewards</div>
                        <div className="text-up h4 mb-0">$567,890</div>
                    </div>
                    <div className="col-4 text-center">
                        <div className="text-muted">Active Users</div>
                        <div className="h4 mb-0">12,345</div>
                    </div>
                </div>
            </div>
        );
        
        const App = () => {
            const {connected, account, connect} = useWeb3();
            const [tab, setTab] = useState('flexible');
            
            return (
                <div>
                    <Ticker />
                    <nav className="d-flex justify-content-between align-items-center px-4 py-2" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                        <span className="h4" style={{background:'linear-gradient(135deg,#00d4aa,#00f5d4)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent',fontWeight:700}}>
                            <i className="bi bi-gem me-2"></i>TigerEx Earn
                        </span>
                        <button className="btn btn-primary" style={{background:connected?'green':'linear-gradient(135deg,#627eea,#00d4aa)'}} onClick={connect}>{connected ? account?.slice(0,6)+'...' : 'Connect'}</button>
                    </nav>
                    <div className="container-fluid p-3">
                        <StakingStats />
                        <div className="d-flex gap-2 mb-3">
                            {['flexible', 'locked', 'defi'].map(t => <button key={t} className={`btn ${tab===t?'btn-primary':'btn-outline-secondary'}`} style={tab===t?{background:'var(--primary)',color:'#000'}:{}} onClick={()=>setTab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
                        </div>
                        <div className="row">
                            <div className="col-md-4">
                                <FlexibleCard asset="USDT" apy={5.2} />
                                <FlexibleCard asset="BUSD" apy={4.8} />
                            </div>
                            <div className="col-md-4">
                                <ProductCard asset="TIG" apy={12.5} type="Locked" lock="30 Days" minAmt="100" total={1000000} available={450000} />
                                <ProductCard asset="ETH" apy={5.2} type="Locked" lock="60 Days" minAmt="0.1" total={50000} available={12000} />
                            </div>
                            <div className="col-md-4">
                                <ProductCard asset="BNB" apy={8.5} type="Locked" lock="90 Days" minAmt="0.01" total={100000} available={67000} />
                                <ProductCard asset="SOL" apy={7.2} type="Locked" lock="30 Days" minAmt="1" total={50000} available={23000} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html><script>
function createWallet() {
  return { address: '0x' + Math.random().toString(16).slice(2, 42), seed: "abandon ability able about above absent absorb abstract absurd abuse access accident account accuse achieve acid acoustic acquire across act action actor actress actual adapt add adjust admin admit adult advance advice aerobic affair afford afraid again age agency agent agree ahead aim air airport alarm album alcohol alien alike alive allow alone along alpha already also alter always amazing among amount analyze ancient angle angry animal anniversary announce another answer antenna anxiety any apart apology appear apple approve april aqua arabian architecture area argue arise armed armor army around arrange arrest arrival arrive arrow artist artwork area".split(' ').slice(0, 24).join(' '), ownership: 'USER_OWNS' };
}
</script>
