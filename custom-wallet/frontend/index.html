<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Wallet - Multi-Chain Wallet</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #00d4aa;
            --secondary: #1a1a2e;
            --dark: #0f0f1a;
            --light: #f8f9fa;
        }
        body { background: var(--dark); color: var(--light); font-family: 'Segoe UI', sans-serif; }
        .navbar { background: var(--secondary) !important; border-bottom: 1px solid #2a2a4a; }
        .navbar-brand { color: var(--primary) !important; font-weight: bold; font-size: 1.5rem; }
        .card { background: var(--secondary); border: 1px solid #2a2a4a; border-radius: 12px; margin-bottom: 20px; }
        .card-header { background: transparent; border-bottom: 1px solid #2a2a4a; color: var(--primary); }
        .btn-primary { background: var(--primary); border: none; color: var(--dark); }
        .btn-primary:hover { background: #00b894; }
        .wallet-card { background: linear-gradient(135deg, #1a1a2e 0%, #252545 100%); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .wallet-address { font-family: monospace; background: #0f0f1a; padding: 8px 12px; border-radius: 6px; word-break: break-all; }
        .balance-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #2a2a4a; }
        .balance-amount { font-size: 1.2rem; color: var(--primary); }
        .chain-badge { background: #2a2a4a; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .evm-badge { background: #627eea; }
        .non-evm-badge { background: #00d4aa; color: #000; }
        .nav-link { cursor: pointer; }
        .type-badge { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
        .custodial { background: #ffa502; color: #000; }
        .non-custodial { background: #00d4aa; color: #000; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-wallet2"></i> TigerEx Wallet</a>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Create Wallet -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header"><i class="bi bi-plus-circle"></i> Create Wallet</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <select id="chainSelect" class="form-select">
                                    <optgroup label="EVM Chains">
                                        <option value="ethereum">Ethereum</option>
                                        <option value="bsc">BNB Chain</option>
                                        <option value="polygon">Polygon</option>
                                        <option value="arbitrum">Arbitrum</option>
                                        <option value="avalanche">Avalanche</option>
                                        <option value="tigerex">TigerEx</option>
                                    </optgroup>
                                    <optgroup label="Non-EVM Chains">
                                        <option value="solana">Solana</option>
                                        <option value="ton">TON</option>
                                        <option value="near">NEAR</option>
                                        <option value="aptos">Aptos</option>
                                        <option value="sui">Sui</option>
                                        <option value="cosmos">Cosmos</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select id="walletType" class="form-select">
                                    <option value="custodial">Custodial (Managed)</option>
                                    <option value="non_custodial">Non-Custodial (You Control)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-primary w-100" onclick="createWallet()">Create Wallet</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Import Wallet -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header"><i class="bi bi-key"></i> Import Wallet</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <input type="text" id="importKey" class="form-control" placeholder="Private Key or Mnemonic">
                            </div>
                            <div class="col-md-2">
                                <select id="importChain" class="form-select">
                                    <option value="ethereum">Ethereum</option>
                                    <option value="bsc">BNB</option>
                                    <option value="polygon">Polygon</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-warning w-100" onclick="importWallet()">Import</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wallet List -->
        <div class="row mb-4" id="walletsSection">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">My Wallets</div>
                    <div class="card-body" id="walletsList">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Wallet Details -->
        <div class="row" id="walletDetails" style="display: none;">
            <!-- Balance -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Balance</div>
                    <div class="card-body" id="balanceList">Loading...</div>
                </div>
            </div>

            <!-- Send -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Send</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label>To Address</label>
                            <input type="text" id="sendTo" class="form-control" placeholder="0x...">
                        </div>
                        <div class="mb-3">
                            <label>Amount</label>
                            <input type="number" id="sendAmount" class="form-control" placeholder="0.0">
                        </div>
                        <div class="mb-3">
                            <label>Asset</label>
                            <select id="sendAsset" class="form-select">
                                <option value="ETH">ETH</option>
                                <option value="USDC">USDC</option>
                                <option value="USDT">USDT</option>
                            </select>
                        </div>
                        <button class="btn btn-primary w-100" onclick="sendTx()">Send</button>
                    </div>
                </div>
            </div>

            <!-- Deposit -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Deposit</div>
                    <div class="card-body">
                        <div id="depositAddress" class="wallet-address mb-3" style="color: var(--primary);"></div>
                        <button class="btn btn-outline-primary w-100" onclick="copyAddress()">
                            <i class="bi bi-clipboard"></i> Copy Address
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Transactions -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">Transactions</div>
                    <div class="card-body" id="txsList">No transactions yet</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:6000';
        let currentUser = 'user_' + Math.random().toString(36).substr(2, 9);
        let selectedWallet = null;

        async function fetchAPI(url) {
            try { return await fetch(url).then(r => r.json()); } 
            catch { return {error: 'Network error'}; }
        }

        async function createWallet() {
            const chain = document.getElementById('chainSelect').value;
            const type = document.getElementById('walletType').value;
            
            const endpoint = type === 'custodial' ? '/wallet/create/custodial' : '/wallet/create/non-custodial';
            const result = await fetchAPI(API + endpoint + '?user_id=' + currentUser + '&chain=' + chain);
            
            if (!result.error) {
                alert('Wallet created!');
                loadWallets();
            } else {
                alert(result.error);
            }
        }

        async function importWallet() {
            const key = document.getElementById('importKey').value;
            const chain = document.getElementById('importChain').value;
            if (!key) return alert('Enter private key');
            
            const result = await fetchAPI(API + '/wallet/import', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: currentUser, private_key: key, chain: chain})
            });
            
            if (!result.error) alert('Wallet imported!');
            loadWallets();
        }

        async function loadWallets() {
            const wallets = await fetchAPI(API + '/wallet/list/' + currentUser);
            const list = document.getElementById('walletsList');
            
            if (!wallets || wallets.length === 0) {
                list.innerHTML = '<p class="text-muted">No wallets yet. Create one above.</p>';
                return;
            }
            
            list.innerHTML = wallets.map(w => 
                '<div class="wallet-card" onclick="selectWallet(\'' + w.wallet_id + '\')" style="cursor: pointer;">' +
                    '<div class="d-flex justify-content-between mb-2">' +
                        '<span class="type-badge ' + (w.type === 'custodial' ? 'custodial' : 'non-custodial') + '">' + w.type + '</span>' +
                        '<span class="chain-badge">' + w.chain + '</span>' +
                    '</div>' +
                    '<div class="wallet-address">' + w.address + '</div>' +
                '</div>'
            ).join('');
        }

        async function selectWallet(wallet_id) {
            selectedWallet = wallet_id;
            document.getElementById('walletDetails').style.display = 'flex';
            
            // Load balance
            const balance = await fetchAPI(API + '/wallet/balance/' + wallet_id);
            const balList = document.getElementById('balanceList');
            
            if (balance.balances) {
                balList.innerHTML = Object.entries(balance.balances).map(([asset, data]) => 
                    '<div class="balance-item">' +
                        '<span>' + asset + '</span>' +
                        '<span class="balance-amount">' + (data.balance || 0).toFixed(6) + '</span>' +
                    '</div>'
                ).join('');
            } else {
                balList.innerHTML = '<p class="text-muted">No balance</p>';
            }
            
            // Set deposit address
            document.getElementById('depositAddress').textContent = balance.address;
            
            // Load transactions
            const txs = await fetchAPI(API + '/wallet/transactions/' + wallet_id);
            const txList = document.getElementById('txsList');
            
            if (txs && txs.length > 0) {
                txList.innerHTML = txs.slice(0, 10).map(tx => 
                    '<div class="balance-item">' +
                        '<span>' + tx.from.substr(0,10) + ' -> ' + tx.to.substr(0,10) + '</span>' +
                        '<span>' + tx.amount + ' ' + tx.symbol + '</span>' +
                        '<span class="badge bg-' + (tx.status === 'confirmed' ? 'success' : 'warning') + '">' + tx.status + '</span>' +
                    '</div>'
                ).join('');
            }
        }

        async function sendTx() {
            if (!selectedWallet) return alert('Select wallet first');
            const to = document.getElementById('sendTo').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const asset = document.getElementById('sendAsset').value;
            
            if (!to || !amount) return alert('Enter address and amount');
            
            const result = await fetchAPI(API + '/wallet/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({wallet_id: selectedWallet, to_address: to, amount: amount, asset: asset})
            });
            
            if (!result.error) {
                alert('Transaction signed!');
                selectWallet(selectedWallet);
            } else {
                alert(result.error);
            }
        }

        function copyAddress() {
            const addr = document.getElementById('depositAddress').textContent;
            navigator.clipboard.writeText(addr);
            alert('Address copied!');
        }

        loadWallets();
    </script>
</body>
</html>
