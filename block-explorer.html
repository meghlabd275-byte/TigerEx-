<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Block Explorer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--dark2:#161c25;--light:#eaeaea;--border:#2a3140}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState,useEffect}=React;
        const App=()=>{
            const[blocks,setBlocks]=useState([
                {hash:'0xabc...123',height:1234567,txs:125,time:'2m ago'},
                {hash:'0xdef...456',height:1234566,txs:98,time:'5m ago'},
            ]);
            return(<div className="container-fluid p-4">
                <h4 className="mb-4"><i className="bi bi-box me-2"></i>Block Explorer</h4>
                <div className="card-panel p-3 mb-3">
                    <input className="form-control" placeholder="Search block, address, tx..." />
                </div>
                <table className="w-100"><tbody>
                    {blocks.map((b,i)=><tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                        <td className="p-2">#{b.height}</td>
                        <td className="p-2 text-muted" style={{fontFamily:'monospace'}}>{b.hash}</td>
                        <td className="p-2">{b.txs} txns</td>
                        <td className="p-2 text-muted">{b.time}</td>
                    </tr>)}</tbody></table>
            </div>);
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html><script>
const explorerAPI = { search: async (addr) => {
    return { address: addr, balance: (Math.random() * 10).toFixed(4), txs: 42, lastTx: "2h ago" };

async function searchAddr() {
    const addr = document.getElementById('search').value;
    const data = await explorerAPI.search(addr);
    document.getElementById('result').innerHTML = "Address: " + data.address + "<br>Balance: " + data.balance + " ETH<br>Txs: " + data.txs;
}
</script>
