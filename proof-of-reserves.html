<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Proof of Reserves</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--dark2:#161c25;--light:#eaeaea;--border:#2a3140}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState}=React;
        const App=()=>{
            const[reserves,setR]=useState({btc:12500,eth:45000,usdt:25000000,audit:'2024-04-30'});
            return(<div className="container-fluid p-4">
                <h4 className="mb-4"><i className="bi bi-shield-check me-2"></i>Proof of Reserves</h4>
                <div className="card-panel p-4 mb-3">
                    <div className="row g-3 mb-3"><div className="col"><small>BTC</small><h5>{reserves.btc.toLocaleString()}</h5></div>
                        <div className="col"><small>ETH</small><h5>{reserves.eth.toLocaleString()}</h5></div>
                        <div className="col"><small>USDT</small><h5>${(reserves.usdt/1e6).toFixed(0)}M</h5></div></div>
                    <small className="text-muted">Last audit: {reserves.audit}</small>
                </div>
            </div>);
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
