<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Coupons</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const App = () => {
            const [coupons, setCoupons] = useState([
                {code:'WELCOME50', discount:'50%', type:'Fee', exp:'2024-12-31', used:false},
                {code:'DEPOSIT20', discount:'20 USDT', type:'Deposit', exp:'2024-06-30', used:true},
            ]);
            
            return (
                <div className="container-fluid p-4">
                    <h4 className="mb-4"><i className="bi bi-ticket-perforated me-2"></i>Coupons</h4>
                    <div className="card-panel p-4">
                        {coupons.map((c,i)=><div key={i} className="d-flex justify-content-between p-3 mb-2" style={{background:'var(--dark2)',borderRadius:8}}>
                            <div>
                                <code style={{fontSize:16,fontWeight:600}}>{c.code}</code>
                                <span className="badge bg-warning ms-2" style={{color:'#000'}}>{c.type}</span>
                                <small className="d-block text-muted">Expires: {c.exp}</small>
                            </div>
                            <div className="text-end">
                                <div style={{fontWeight:600}}>{c.discount}</div>
                                <small className={c.used?'text-muted':'text-success'}>{c.used?'Used':'Available'}</small>
                            </div>
                        </div>)}
                    </div>
                    <div className="card-panel p-4 mt-3">
                        <h6>Redeem Code</h6>
                        <div className="d-flex gap-2">
                            <input className="form-control" placeholder="Enter coupon code" />
                            <button className="btn" style={{background:'var(--primary)',color:'#000'}}>Redeem</button>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
