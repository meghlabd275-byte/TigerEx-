<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--light:#eaeaea}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState}=React;
        const App=()=>useState(null);
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
<script>
const whitelistAPI = { verify: async (addr) => {
    return { address: addr, verified: Math.random() > 0.3, tier: Math.random() > 0.5 ? "KYC" : "None" };
}};
async function verifyAddr() {
    const addr = document.getElementById('addr').value;
    const result = await whitelistAPI.verify(addr);
    document.getElementById('result').innerHTML = result.verified ? "✅ Verified" : "❌ Not Found";
}
</script>
