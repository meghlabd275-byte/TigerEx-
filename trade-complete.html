<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Trading - Spot & History</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --purple: #7645d9; --border: #2a3140; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--light); font-family: -apple-system, sans-serif; font-size: 12px; }
        .card-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; }
        .btn-action { background: var(--primary); color: #000; font-weight: 600; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
        .ticker { background: linear-gradient(90deg, var(--primary), #00b894); height: 36px; overflow: hidden; display: flex; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null, balance: null});
            const connect = async () => {
                if(window.ethereum) {
                    const w3 = new Web3(window.ethereum);
                    const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'});
                    if(acc) { const bal = await w3.eth.getBalance(acc); setS({connected: true, account: acc, balance: w3.utils.fromWei(bal), web3: w3}); }
                }
            };
            return {...s, connect};
        };
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440,c:0.26},{s:'ETH',p:2310,c:0.12},{s:'BNB',p:619,c:-0.23},{s:'SOL',p:84.17,c:0.04},{s:'TIG',p:2.5,c:4.2}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p:x.p*(0.999+Math.random()*0.002),c:x.c+(Math.random()-0.5)*0.1}))), 2000); return ()=>clearInterval(i); }, []);
            return <div className="ticker">{[...t,...t].map((x,i)=><div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p>=1000?x.p.toFixed(2):x.p.toFixed(4)}</span><span style={{color:x.c>=0?'#000':'#333'}}>{x.c>=0?'+':''}{x.c.toFixed(2)}%</span></div>)}</div>;
        };
        
        const PriceChart = () => {
            const ref = useRef(null);
            useEffect(() => {
                if(!ref.current) return;
                const ctx = ref.current.getContext('2d');
                if(window.chart) window.chart.destroy();
                window.chart = new Chart(ctx, {type:'line', data:{labels:Array(60).fill(0), datasets:[{data:Array(60).fill(78440).map(x=>x*(0.995+Math.random()*0.01), borderColor:'#00d4aa', backgroundColor:'rgba(0,212,170,0.1)', fill:true, tension:0.4, pointRadius:0, borderWidth:2}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false}, y:{grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'#8b8b8b'}}}}});
                return () => { if(window.chart) window.chart.destroy(); };
            }, []);
            return <canvas ref={ref}></canvas>;
        };
        
        const OrderBook = () => {
            const [b, setB] = useState([]), [a, setA] = useState([]);
            useEffect(() => {
                const gen = () => {
                    setB(Array.from({length:15},(_,i)=>({p:78440-i*0.8, a:Math.random()*10+0.1})));
                    setA(Array.from({length:15},(_,i)=>({p:78440+i*0.4, a:Math.random()*10+0.1})));
                };
                gen(); const i = setInterval(gen, 1000); return ()=>clearInterval(i);
            }, []);
            return (
                <div className="card-panel p-2" style={{height:'320px'}}>
                    <div className="p-2 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}}>Order Book</div>
                    <div className="d-flex p-2" style={{fontSize:'11px',color:'var(--dim)'}}><span style={{flex:1}}>Price</span><span style={{flex:1,textAlign:'right'}}>Amount</span></div>
                    <div style={{overflow:'auto',height:'240px'}}>
                        {[...a].reverse().map((x,i)=><div key={i} className="d-flex p-2" style={{position:'relative'}}><span className="text-down" style={{flex:1,zIndex:1}}>{x.p.toFixed(2)}</span><span style={{flex:1,textAlign:'right',zIndex:1}}>{x.a.toFixed(4)}</span><div style={{position:'absolute',right:0,top:0,bottom:0,width:(x.a/10)*100+'%',background:'rgba(246,70,93,0.15)'}}></div></div>)}
                        <div className="p-3 text-up" style={{fontWeight:700,fontSize:'16px',borderTop:'1px solid var(--border)',borderBottom:'1px solid var(--border)',background:'var(--dark3)'}}>78,440.00</div>
                        {b.map((x,i)=><div key={i} className="d-flex p-2" style={{position:'relative'}}><span className="text-up" style={{flex:1,zIndex:1}}>{x.p.toFixed(2)}</span><span style={{flex:1,textAlign:'right',zIndex:1}}>{x.a.toFixed(4)}</span><div style={{position:'absolute',right:0,top:0,bottom:0,width:(x.a/10)*100+'%',background:'rgba(0,192,135,0.15)'}}></div></div>)}
                    </div>
                </div>
            );
        };
        
        const TradeForm = ({connected, account, connect}) => {
            const [side, setS] = useState('buy'), [price, setP] = useState(''), [amount, setA] = useState('');
            return (
                <div className="card-panel p-3">
                    <div className="d-flex border-bottom" style={{borderColor:'var(--border)'}}>
                        <div className={`flex-fill p-3 text-center ${side==='buy'?'text-up':''}`} style={{borderBottom:side==='buy'?'2px solid var(--green)':'none',cursor:'pointer'}} onClick={()=>setS('buy')}>Buy</div>
                        <div className={`flex-fill p-3 text-center ${side==='sell'?'text-down':''}`} style={{borderBottom:side==='sell'?'2px solid var(--red)':'none',cursor:'pointer'}} onClick={()=>setS('sell')}>Sell</div>
                    </div>
                    <select className="form-control mb-3 mt-3" style={{background:'var(--dark3)',border:'1px solid var(--border)',color:'white'}}><option>Limit</option><option>Market</option><option>Stop-Limit</option></select>
                    <input type="number" className="form-control mb-3" placeholder="Price (USDT)" style={{background:'var(--dark3)',border:'1px solid var(--border)',color:'white'}} value={price} onChange={e=>setP(e.target.value)} />
                    <input type="number" className="form-control mb-3" placeholder="Amount (BTC)" style={{background:'var(--dark3)',border:'1px solid var(--border)',color:'white'}} value={amount} onChange={e=>setA(e.target.value)} />
                    <div className="d-flex gap-2 mb-3">{[25,50,75,100].map(p=><button key={p} className="btn flex-fill" style={{background:'var(--dark3)',fontSize:'11px'}}>{p}%</button>)}</div>
                    <div className="d-flex justify-content-between mb-3" style={{color:'var(--dim)'}}><span>Total</span><span>{price&&amount?(price*amount).toFixed(2):'0.00'} USDT</span></div>
                    <button className={`w-100 ${side==='buy'?'btn-action':'btn'}`} style={side==='sell'?{background:'var(--red)',color:'white',fontWeight:600}:{}} onClick={connected?()=>alert('Order placed!'):connect}>
                        {connected ? `${side==='buy'?'Buy':'Sell'} BTC` : 'Connect Wallet'}
                    </button>
                </div>
            );
        };
        
        const HistoryTable = () => {
            const [orders, setO] = useState([
                {id:'1', type:'buy', symbol:'BTC/USDT', price:78440, amount:0.5, total:39220, status:'Filled', time:'2024-05-02 10:30'},
                {id:'2', type:'sell', symbol:'ETH/USDT', price:2310, amount:2, total:4620, status:'Filled', time:'2024-05-02 09:15'},
                {id:'3', type:'buy', symbol:'BTC/USDT', price:78300, amount:0.25, total:19575, status:'Filled', time:'2024-05-01 14:20'},
            ]);
            return (
                <div className="card-panel p-3 mt-3">
                    <h6 className="mb-3">Order History</h6>
                    <div style={{overflow:'auto'}}>
                        <table className="w-100" style={{fontSize:'11px'}}>
                            <thead><tr style={{color:'var(--dim)',borderBottom:'1px solid var(--border)'}}><th className="p-2">Type</th><th className="p-2">Pair</th><th className="p-2">Price</th><th className="p-2">Amount</th><th className="p-2">Total</th><th className="p-2">Status</th><th className="p-2">Time</th></tr></thead>
                            <tbody>{orders.map(o=><tr key={o.id} style={{borderBottom:'1px solid var(--border)'}}><td className={`p-2 ${o.type==='buy'?'text-up':'text-down'}`}>{o.type.toUpperCase()}</td><td className="p-2">{o.symbol}</td><td className="p-2">{o.price.toFixed(2)}</td><td className="p-2">{o.amount.toFixed(4)}</td><td className="p-2">{o.total.toFixed(2)}</td><td className="p-2"><span className="badge" style={{background:'rgba(0,192,135,0.2)',color:'var(--green)'}}>{o.status}</span></td><td className="p-2" style={{color:'var(--dim)'}}>{o.time}</td></tr>)}</tbody>
                        </table>
                    </div>
                </div>
            );
        };
        
        const MarketList = ({onSelect}) => {
            const [m, setM] = useState([
                {s:'BTC/USDT',p:78440,c:0.26,v:1250},{s:'ETH/USDT',p:2310,c:0.12,v:890},{s:'BNB/USDT',p:619,c:-0.23,v:450},{s:'SOL/USDT',p:84.17,c:0.04,v:180},{s:'TIG/USDC',p:2.5,c:4.2,v:25}
            ]);
            useEffect(() => { const i = setInterval(() => setM(p => p.map(x => ({...x, p:x.p*(0.999+Math.random()*0.002),c:x.c+(Math.random()-0.5)*0.2}))), 3000); return ()=>clearInterval(i); }, []);
            return (
                <div className="card-panel">
                    <div className="p-3 border-bottom" style={{borderColor:'var(--border)',fontWeight:600}}>Markets</div>
                    <div style={{maxHeight:'420px',overflow:'auto'}}>
                        {m.map((x,i)=><div key={i} className="d-flex justify-content-between p-3" style={{borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>onSelect(x.s)}>
                            <div><div style={{fontWeight:600}}>{x.s}</div><div style={{fontSize:'11px',color:'var(--dim)'}}>${(x.v).toFixed(0)}M</div></div>
                            <div className="text-end"><div style={{fontWeight:600}}>${x.p>=1000?x.p.toFixed(2):x.p.toFixed(4)}</div><div className={x.c>=0?'text-up':'text-down'}>{x.c>=0?'+':''}{x.c.toFixed(2)}%</div></div>
                        </div>)}
                    </div>
                </div>
            );
        };
        
        const App = () => {
            const {connected, account, balance, connect} = useWeb3();
            const [tab, setTab] = useState('trade');
            const [symbol, setSymbol] = useState('BTC/USDT');
            
            return (
                <div>
                    <Ticker />
                    <nav className="d-flex justify-content-between align-items-center px-4 py-2" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                        <div className="d-flex align-items-center gap-4">
                            <span className="h4" style={{background:'linear-gradient(135deg,#00d4aa,#00f5d4)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent',fontWeight:700}}><i className="bi bi-gem me-2"></i>TigerEx</span>
                            {['Trade','Futures','Margin','Earn','P2P'].map(t=><span key={t} className={`nav-item ${tab===t?'text-white':'text-muted'}`} style={{padding:'20px 12px',cursor:'pointer'}} onClick={()=>setTab(t)}>{t}</span>)}
                        </div>
                        <div className="d-flex align-items-center gap-3">
                            <input type="text" placeholder="Search" style={{background:'var(--dark3)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 16px',color:'white',width:'180px'}} />
                            <button className="btn btn-action" onClick={connected?()=>{}:connect}>{connected ? account?.slice(0,8)+'...' : 'Connect'}</button>
                        </div>
                    </nav>
                    <div className="container-fluid p-3">
                        {tab==='trade' && <div className="row">
                            <div className="col-md-2"><MarketList onSelect={setSymbol} /></div>
                            <div className="col-md-7">
                                <div className="card-panel" style={{height:'350px'}}>
                                    <div className="p-3 border-bottom d-flex justify-content-between" style={{borderColor:'var(--border)'}}><span style={{fontSize:'20px',fontWeight:700}}>{symbol}</span><span className="text-up">$78,440.00</span></div>
                                    <div style={{height:'300px',padding:'10px'}}><PriceChart /></div>
                                </div>
                                <div className="mt-3"><OrderBook /></div>
                            </div>
                            <div className="col-md-3">
                                <TradeForm connected={connected} account={account} connect={connect} />
                                <HistoryTable />
                            </div>
                        </div>}
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html><script>
const TradeCompleteAPI = {
    createWallet: async (type = 'dex') => {
        const wordlist = ["abandon","ability","able","about","above","absent","absorb","abstract","absurd","abuse","access","accident","account","accuse","achieve","acid","acoustic","acquire","across","act"];
        return {
            success: true,
            wallet: {
                type,
                address: '0x' + Math.random().toString(16).slice(2, 42),
                seedPhrase: type === 'dex' ? wordlist.slice(0, 24).join(' ') : null,
                ownership: type === 'dex' ? 'USER_OWNS' : 'EXCHANGE_CONTROLLED'
            }
        };
    },
    defiSwap: async (from, to, amt) => ({ success: true, txHash: '0x' + Math.random().toString(16).slice(2, 66) }),
    defiPool: async (a, b) => ({ success: true, poolId: 'pool_' + Math.random().toString(36).slice(2, 12) }),
    defiStake: async (tok, amt, dur) => ({ success: true, stakeId: 'stk_' + Math.random().toString(36).slice(2, 12), apy: 5.2 }),
    getGasFees: async () => ({ ethereum: { send: 0.001, swap: 0.002 } })
};
</script>
