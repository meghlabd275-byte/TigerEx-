<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Token Creator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--dark2:#161c25;--light:#eaeaea;--border:#2a3140}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState}=React;
        const App=()=>{
            const[t,setT]=useState({name:'',symbol:'',supply:'',dec:18});
            const create=()=>{if(t.name&&t.symbol)alert('Token created: '+t.symbol);};
            return(<div className="container-fluid p-4">
                <h4 className="mb-4"><i className="bi bi-coin me-2"></i>Token Creator</h4>
                <div className="card-panel p-4">
                    <input className="form-control mb-2" placeholder="Token Name" value={t.name} onChange={e=>setT({...t,name:e.target.value})} />
                    <input className="form-control mb-2" placeholder="Symbol" value={t.symbol} onChange={e=>setT({...t,symbol:e.target.value})} />
                    <input className="form-control mb-2" placeholder="Total Supply" value={t.supply} onChange={e=>setT({...t,supply:e.target.value})} />
                    <button className="btn w-100" style={{background:'var(--primary)',color:'#000'}} onClick={create}>Deploy Token</button>
                </div>
            </div>);
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html><script>
const defiAPI = { createToken: async (name, symbol, supply) => {
    return { success: true, tokenAddress: "0x" + Math.random().toString(16).slice(2, 42), txHash: "0xabc123", name, symbol, supply };
}};
async function createToken() {
    const name = document.getElementById('tokenName').value;
    const symbol = document.getElementById('tokenSymbol').value;
    const supply = parseFloat(document.getElementById('tokenSupply').value);
    const result = await defiAPI.createToken(name, symbol, supply);
    alert("Token Created!\nAddress: " + result.tokenAddress);
}
</script>

}
</script>
