<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Ultimate Trading Platform</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --purple: #7645d9; --border: #2a3140; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--light); font-family: -apple-system, sans-serif; font-size: 13px; }
        .card-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; }
        .btn-action { background: var(--primary); color: #000; font-weight: 600; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
        .ticker { background: linear-gradient(90deg, var(--primary), #00b894); height: 40px; overflow: hidden; display: flex; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null});
            const connect = async () => {
                if (window.ethereum) {
                    const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'});
                    if (acc) setS({connected: true, account: acc});
                }
            };
            return {...s, connect};
        };
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440,c:0.26},{s:'ETH',p:2310,c:0.12},{s:'BNB',p:619,c:-0.23},{s:'SOL',p:84.17,c:0.04}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p:x.p*(0.999+Math.random()*0.002)})), 2000); return () => clearInterval(i); }, []);
            return <div className="ticker">{[...t,...t].map((x,i) => <div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p.toFixed(2)}</span><span style={{color:x.c>=0?'#000':'#333'}}>{x.c>=0?'+':''}{x.c.toFixed(2)}%</span></div>)}</div>;
        };
        
        const Header = ({connected, account, connect}) => (
            <nav className="d-flex justify-content-between align-items-center px-4 py-2" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                <div className="d-flex align-items-center gap-4">
                    <span className="h4" style={{background:'linear-gradient(135deg,#00d4aa,#00f5d4)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent',fontWeight:700}}><i className="bi bi-gem me-2"></i>TigerEx</span>
                    {['Trade','Futures','Margin','Earn','P2P','More'].map(m => <span key={m} className="nav-item" style={{padding:'20px 12px',color:'var(--dim)',cursor:'pointer'}}>{m}</span>)}
                </div>
                <div className="d-flex align-items-center gap-3">
                    <div className="d-flex gap-2">
                        <input type="text" placeholder="Search" style={{background:'var(--dark3)',border:'1px solid var(--border)',borderRadius:'8px',padding:'8px 16px',color:'var(--light)',width:'200px'}} />
                    </div>
                    <button className="btn btn-action" onClick={connected?()=>{}:connect}>{connected ? account?.slice(0,8)+'...' : 'Connect Wallet'}</button>
                </div>
            </nav>
        );
        
        const QuickTrade = ({onSelect}) => {
            const [trading, setTrading] = useState('BTC/USDT');
            const pairs = ['BTC/USDT','ETH/USDT','BNB/USDT','SOL/USDT','TIG/USDC'];
            return (
                <div className="card-panel p-3">
                    <h6 className="mb-3">Quick Trade</h6>
                    <select className="form-control mb-3" style={{background:'var(--dark3)',border:'1px solid var(--border)',color:'white'}} value={trading} onChange={e=>setTrading(e.target.value)}>
                        {pairs.map(p => <option key={p}>{p}</option>)}
                    </select>
                    <div className="d-flex gap-2 mb-3">
                        <input type="number" placeholder="Amount" className="form-control" style={{background:'var(--dark3)',border:'1px solid var(--border)',color:'white'}} />
                    </div>
                    <div className="d-flex gap-2">
                        <button className="btn flex-fill" style={{background:'var(--green)',color:'#000',fontWeight:600}}>Buy</button>
                        <button className="btn flex-fill" style={{background:'var(--red)',color:'white',fontWeight:600}}>Sell</button>
                    </div>
                </div>
            );
        };
        
        const MarketOverview = () => {
            const [markets, setM] = useState([
                {s:'BTC/USDT',p:78440,c:0.26,v:1250000000},{s:'ETH/USDT',p:2310,c:0.12,v:890000000},{s:'BNB/USDT',p:619,c:-0.23,v:450000000},{s:'TIG/USDC',p:2.5,c:4.2,v:25000000},{s:'SOL/USDT',p:84.17,c:0.04,v:180000000}
            ]);
            useEffect(() => { const i = setInterval(() => setM(p => p.map(x => ({...x, p:x.p*(0.999+Math.random()*0.002),c:x.c+(Math.random()-0.5)*0.2})), 3000); return () => clearInterval(i); }, []);
            return (
                <div className="card-panel">
                    <div className="p-3 border-bottom" style={{borderColor:'var(--border)'}}>Market Overview</div>
                    <div style={{maxHeight:'400px',overflow:'auto'}}>
                        {markets.map((m,i) => <div key={i} className="d-flex justify-content-between p-3" style={{borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
                            <div><div style={{fontWeight:600}}>{m.s}</div><div className="text-muted" style={{fontSize:11}}>Vol: ${(m.v/1e6).toFixed(0)}M</div></div>
                            <div className="text-end"><div style={{fontWeight:600}}>${m.p.toFixed(2)}</div><div className={m.c>=0?'text-up':'text-down'}>{m.c>=0?'+':''}{m.c.toFixed(2)}%</div></div>
                        </div>)}
                    </div>
                </div>
            );
        };
        
        const Portfolio = () => (
            <div className="card-panel p-3">
                <h6 className="mb-3">My Portfolio</h6>
                <div className="row text-center">
                    <div className="col-6 mb-3"><div className="text-muted">Total Value</div><div className="h4 text-warning">$125,678</div></div>
                    <div className="col-6 mb-3"><div className="text-muted">24h P&L</div><div className="h4 text-up">+$2,456</div></div>
                    <div className="col-6"><div className="text-muted">Assets</div><div className="h5">8</div></div>
                    <div className="col-6"><div className="text-muted">Watchlist</div><div className="h5">12</div></div>
                </div>
            </div>
        );
        
        const RecentActivity = () => {
            const activities = [
                {t:'Buy BTC/USDT',p:78440,a:0.5,s:'completed',time:'2 min ago'},
                {t:'Stake ETH',p:'2.5 ETH',s:'completed',time:'1 hour ago'},
                {t:'P2P Transfer',p:'$500',s:'pending',time:'3 hours ago'}
            ];
            return (
                <div className="card-panel p-3 mt-3">
                    <h6 className="mb-3">Recent Activity</h6>
                    {activities.map((a,i) => <div key={i} className="d-flex justify-content-between py-2" style={{borderBottom:'1px solid var(--border)'}}>
                        <div><div style={{fontWeight:500}}>{a.t}</div><div className="text-muted" style={{fontSize:11}}>{a.time}</div></div>
                        <div className="text-end"><div>{a.p}</div><div className={a.s==='completed'?'text-up':'text-warning'}>{a.s}</div></div>
                    </div>)}
                </div>
            );
        };
        
        const Announcements = () => (
            <div className="card-panel p-3 mt-3">
                <h6 className="mb-3">Announcements</h6>
                {['🔥 New Trading Pairs Added','📈 0% Fee Campaign','🎁 5000 TIG Airdrop'].map((a,i) => <div key={i} className="py-2" style={{borderBottom:'1px solid var(--border)',cursor:'pointer'}}>{a}</div>)}
            </div>
        );
        
        const App = () => {
            const {connected, account, connect} = useWeb3();
            
            return (
                <div>
                    <Ticker />
                    <Header connected={connected} account={account} connect={connect} />
                    <div className="container-fluid p-4">
                        <div className="row">
                            <div className="col-md-3">
                                <MarketOverview />
                                <QuickTrade />
                            </div>
                            <div className="col-md-6">
                                <div className="card-panel p-4 text-center" style={{height:'400px'}}>
                                    <h4 className="mb-3">Welcome to TigerEx</h4>
                                    <p className="text-muted mb-4">The world's most advanced cryptocurrency exchange</p>
                                    <div className="row mb-4">
                                        <div className="col-4"><div className="h3 text-warning">$2.5B+</div><div className="text-muted">Daily Volume</div></div>
                                        <div className="col-4"><div className="h3 text-up">150+</div><div className="text-muted">Countries</div></div>
                                        <div className="col-4"><div className="h3">10M+</div><div className="text-muted">Users</div></div>
                                    </div>
                                    <div className="d-flex gap-3 justify-content-center">
                                        <button className="btn btn-action px-4">Start Trading</button>
                                        <button className="btn btn-outline-light px-4">Learn More</button>
                                    </div>
                                </div>
                            </div>
                            <div className="col-md-3">
                                <Portfolio />
                                <RecentActivity />
                                <Announcements />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
