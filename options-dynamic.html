<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Options Trading</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --purple: #7645d9; --border: #2a3140; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--light); font-family: -apple-system, sans-serif; font-size: 12px; }
        .card { background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
        .text-purple { color: var(--purple) !important; }
        .text-orange { color: var(--orange) !important; }
        .btn-call { background: var(--green); color: #000; font-weight: 600; }
        .btn-put { background: var(--red); color: #fff; font-weight: 600; }
        .input-field { background: var(--dark3); border: 1px solid var(--border); color: var(--light); padding: 10px; border-radius: 4px; width: 100%; }
        .strike-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .strike-row:hover { background: rgba(0,212,170,0.05); }
        .strike-row.selected { background: rgba(0,212,170,0.1); }
        .expiry-tab { padding: 8px 16px; background: var(--dark3); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; cursor: pointer; }
        .expiry-tab:hover, .expiry-tab.active { background: var(--primary); color: #000; }
        .ticker { background: linear-gradient(90deg, var(--primary), #00b894); height: 36px; overflow: hidden; display: flex; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null});
            const connect = async () => {
                if (window.ethereum) {
                    const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'});
                    if (acc) setS({connected: true, account: acc});
                }
            };
            return {...s, connect};
        };
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440,c:0.26},{s:'ETH',p:2310,c:0.12},{s:'BNB',p:619,c:-0.23}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p: x.p*(0.999+Math.random()*0.002)}))), 2000); return () => clearInterval(i); }, []);
            return <div className="ticker">{[...t,...t].map((x,i) => <div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p.toFixed(2)}</span><span style={{color:x.c>=0?'#000':'#333'}}>{x.c>=0?'+':''}{x.c.toFixed(2)}%</span></div>)}</div>;
        };
        
        const ChainSelector = () => (
            <div className="card mb-3">
                <div className="p-3 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}}>Select Asset</div>
                <div className="d-flex p-2 gap-2">
                    {['BTC', 'ETH', 'SOL'].map(a => <button key={a} className="btn btn-sm" style={{background:'var(--dark3)'}}>{a}</button>)}
                </div>
            </div>
        );
        
        const ExpirySelector = () => {
            const expiries = ['25 Apr', '02 May', '09 May', '30 May', '27 Jun'];
            return (
                <div className="d-flex gap-2 mb-3 flex-wrap">
                    {expiries.map((e,i) => <span key={i} className={`expiry-tab ${i===0?'active':''}`}>{e}</span>)}
                </div>
            );
        };
        
        const OptionsChain = () => {
            const [selected, setSel] = useState(null);
            const strikes = [78000, 78200, 78400, 78600, 78800, 79000, 79200, 79400, 79600, 79800];
            return (
                <div className="card">
                    <div className="p-3 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}}>Options Chain - BTC</div>
                    <ExpirySelector />
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',padding:'8px 12px',fontSize:11,color:'var(--dim)',borderBottom:'1px solid var(--border)'}}>
                        <span>Strike</span><span style={{textAlign:'right'}}>Call</span><span style={{textAlign:'right'}}>Put</span>
                    </div>
                    <div style={{maxHeight:'300px',overflow:'auto'}}>
                        {strikes.map((s,i) => (
                            <div key={i} className={`strike-row ${selected===i?'selected':''}`} onClick={()=>setSel(i)}>
                                <span style={{fontWeight:600}}>{s}</span>
                                <span className="text-up" style={{textAlign:'right'}}>{(Math.random()*500+100).toFixed(2)}</span>
                                <span className="text-down" style={{textAlign:'right'}}>{(Math.random()*500+100).toFixed(2)}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        const OptionTrade = () => {
            const [side, setS] = useState('call');
            const [price, setP] = useState('');
            const [qty, setQ] = useState('');
            return (
                <div className="card mt-3">
                    <div className="p-3 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}}>Trade Options</div>
                    <div className="d-flex border-bottom" style={{borderColor:'var(--border)'}}>
                        <div className={`flex-fill p-3 text-center ${side==='call'?'text-up':''}`} style={{borderBottom:side==='call'?'2px solid var(--green)':'none',cursor:'pointer'}} onClick={()=>setS('call')}>Buy Call</div>
                        <div className={`flex-fill p-3 text-center ${side==='put'?'text-down':''}`} style={{borderBottom:side==='put'?'2px solid var(--red)':'none',cursor:'pointer'}} onClick={()=>setS('put')}>Buy Put</div>
                    </div>
                    <div className="p-3">
                        <input type="number" className="input-field mb-3" placeholder="Price (USDT)" value={price} onChange={e=>setP(e.target.value)} />
                        <input type="number" className="input-field mb-3" placeholder="Quantity (contracts)" value={qty} onChange={e=>setQ(e.target.value)} />
                        <button className={`w-100 ${side==='call'?'btn-call':'btn-put'}`}>Buy {side==='call'?'Call':'Put'}</button>
                    </div>
                </div>
            );
        };
        
        const Positions = () => (
            <div className="card mt-3">
                <div className="p-3 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}}>My Positions</div>
                <div className="strike-row"><div><span className="badge bg-success me-2" style={{color:'#000'}}>CALL</span>BTC 79000 02May</div><div className="text-up">+$150.00</div></div>
                <div className="strike-row"><div><span className="badge bg-danger me-2">PUT</span>ETH 2200 09May</div><div className="text-down">-$50.00</div></div>
            </div>
        );
        
        const App = () => {
            const {connected, account, connect} = useWeb3();
            return (
                <div>
                    <Ticker />
                    <nav className="d-flex justify-content-between align-items-center px-4 py-2" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                        <span className="h4" style={{background:'linear-gradient(135deg,#7645d9,#00d4aa)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent',fontWeight:700}}><i className="bi bi-gem me-2"></i>TigerEx Options</span>
                        <button className="btn btn-primary" style={{background:connected?'green':'linear-gradient(135deg,#627eea,#00d4aa)'}} onClick={connect}>{connected ? account?.slice(0,6)+'...' : 'Connect'}</button>
                    </nav>
                    <div className="container-fluid p-3"><div className="row"><div className="col-md-8"><ChainSelector /><OptionsChain /></div><div className="col-md-4"><OptionTrade /><Positions /></div></div></div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
