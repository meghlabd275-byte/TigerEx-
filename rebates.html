<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Rebates</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--dark2:#161c25;--light:#eaeaea;--border:#2a3140}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState}=React;
        const App=()=>{
            const[r,setR]=useState({tier:'VIP 1',maker:0.08,taker:0.16,rebate:0.02,vol:5.2});
            return(<div className="container-fluid p-4">
                <h4 className="mb-4"><i className="bi bi-cash"></i>Rebates</h4>
                <div className="card-panel p-4 mb-3">
                    <div className="row mb-3"><div className="col"><small>Tier</small><h5>{r.tier}</h5></div>
                        <div className="col"><small>Maker Fee</small><h5>{r.maker}%</h5></div>
                        <div className="col"><small>Taker Fee</small><h5>{r.taker}%</h5></div></div>
                    <div className="row"><div className="col"><small>Rebate</small><h5 className="text-success">{r.rebate}%</h5></div>
                        <div className="col"><small>30d Volume</small><h5>{r.vol} BTC</h5></div></div>
                </div>
            </div>);
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
