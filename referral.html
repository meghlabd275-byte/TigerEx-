<!DOCTYPE html>
<html lang="en">
<head>

    <title>TigerEx - Referral</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --border: #2a3140; }

</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const App = () => {
            const [ref, setRef] = useState({code:' tigerex_ref_abc123', total:125, earnings:0.5});
            
            return (
                <div className="container-fluid p-4">
                    <h4 className="mb-4"><i className="bi bi-people me-2"></i>Referral Program</h4>
                    <div className="card-panel p-4 mb-3">
                        <h6>Your Referral Code</h6>
                        <div className="d-flex gap-2 mb-3">
                            <input className="form-control" value={ref.code} readOnly />
                            <button className="btn" style={{background:'var(--primary)',color:'#000'}} onClick={()=>navigator.clipboard.writeText(ref.code)}>Copy</button>
                        </div>
                        <div className="d-flex gap-3">
                            <div className="card-panel p-3"><h6>Total Referrals</h6><h4>{ref.total}</h4></div>
                            <div className="card-panel p-3"><h6>Earnings</h6><h4>{ref.earnings} TIG</h4></div>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
