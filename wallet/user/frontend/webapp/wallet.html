<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Wallet - Multi-Chain</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --purple: #7645d9; --border: #2a3140; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--light); font-family: -apple-system, sans-serif; font-size: 13px; }
        .card-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; }
        .btn-action { background: var(--primary); color: #000; font-weight: 600; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
        .ticker { background: linear-gradient(90deg, var(--primary), #00b894); height: 40px; overflow: hidden; display: flex; }
        .wallet-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; transition: 0.3s; }
        .wallet-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null, balance: null});
            const connect = async () => {
                if (window.ethereum) {
                    const w3 = new Web3(window.ethereum);
                    const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'});
                    if (acc) {
                        const bal = await w3.eth.getBalance(acc);
                        setS({connected: true, account: acc, balance: w3.utils.fromWei(bal), web3: w3});
                    }
                }
            };
            return {...s, connect};
        };
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440,c:0.26},{s:'ETH',p:2310,c:0.12},{s:'BNB',p:619,c:-0.23}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p: x.p*(0.999+Math.random()*0.002)})), 2000); return () => clearInterval(i); }, []);
            return <div className="ticker">{[...t,...t].map((x,i) => <div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p.toFixed(2)}</span></div>)}</div>;
        };
        
        const ChainIcon = ({chain}) => {
            const icons = { eth: '🔷', bsc: '🟡', polygon: '🟣', arbitrum: '🔵', avax: '🔺', sol: '☀️', tig: '🐯' };
            return <span style={{fontSize: 24}}>{icons[chain] || '💰'}</span>;
        };
        
        const WalletCard = ({ wallet, onSelect }) => (
            <div className="wallet-card">
                <div className="d-flex justify-content-between align-items-start mb-3">
                    <div className="d-flex align-items-center gap-3">
                        <ChainIcon chain={wallet.chain} />
                        <div>
                            <div style={{fontWeight: 600, fontSize: 16}}>{wallet.name}</div>
                            <div className="text-muted" style={{fontSize: 11}}>{wallet.type}</div>
                        </div>
                    </div>
                    <span className="badge" style={{background: 'var(--primary)', color: '#000'}}>{wallet.chain.toUpperCase()}</span>
                </div>
                <div className="mb-3" style={{fontFamily: 'monospace', fontSize: 12, wordBreak: 'break-all', background: 'var(--dark3)', padding: 10, borderRadius: 8}}>{wallet.address}</div>
                <div className="d-flex justify-content-between">
                    <div>
                        <div className="text-muted" style={{fontSize: 11}}>Balance</div>
                        <div style={{fontWeight: 600, fontSize: 18}}>{wallet.balance.toFixed(4)} {wallet.symbol}</div>
                    </div>
                    <div className="d-flex gap-2">
                        <button className="btn btn-sm" style={{background: 'var(--dark3)'}}><i className="bi bi-qr-code"></i></button>
                        <button className="btn btn-sm btn-action"><i className="bi bi-send"></i></button>
                    </div>
                </div>
            </div>
        );
        
        const AssetRow = ({ asset, balance, value }) => (
            <div className="d-flex justify-content-between align-items-center p-3" style={{borderBottom: '1px solid var(--border)'}}>
                <div className="d-flex align-items-center gap-3">
                    <div style={{width: 40, height: 40, borderRadius: '50%', background: 'var(--dark3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700}}>{asset[0]}</div>
                    <div>
                        <div style={{fontWeight: 600}}>{asset}</div>
                        <div className="text-muted" style={{fontSize: 11}}>Available</div>
                    </div>
                </div>
                <div className="text-end">
                    <div style={{fontWeight: 600}}>{balance.toFixed(4)}</div>
                    <div className="text-warning" style={{fontSize: 11}}>${value.toFixed(2)}</div>
                </div>
            </div>
        );
        
        const CreateWallet = ({ onCreate }) => {
            const [chain, setChain] = useState('ethereum');
            const [type, setType] = useState('custodial');
            return (
                <div className="card-panel p-4">
                    <h5 className="mb-3">Create New Wallet</h5>
                    <select className="form-control mb-3" style={{background: 'var(--dark3)', border: '1px solid var(--border)', color: 'white'}} value={chain} onChange={e=>setChain(e.target.value)}>
                        <option value="ethereum">Ethereum</option>
                        <option value="bsc">BNB Chain</option>
                        <option value="polygon">Polygon</option>
                        <option value="arbitrum">Arbitrum</option>
                        <option value="avalanche">Avalanche</option>
                        <option value="solana">Solana</option>
                        <option value="tigerex">TigerEx</option>
                    </select>
                    <div className="d-flex gap-2 mb-3">
                        <button className={`btn flex-fill ${type==='custodial'?'btn-action':'btn-outline-secondary'}`} onClick={()=>setType('custodial')}>Custodial</button>
                        <button className={`btn flex-fill ${type==='non-custodial'?'btn-action':'btn-outline-secondary'}`} onClick={()=>setType('non-custodial')}>Non-Custodial</button>
                    </div>
                    <button className="btn btn-action w-100" onClick={()=>onCreate(chain, type)}>Create Wallet</button>
                </div>
            );
        };
        
        const SendModal = ({ show, onClose }) => {
            if (!show) return null;
            return (
                <div style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000}}>
                    <div className="card-panel p-4" style={{width: '400px'}}>
                        <div className="d-flex justify-content-between mb-4">
                            <h5>Send Crypto</h5>
                            <button onClick={onClose} style={{background: 'none', border: 'none', color: 'white', fontSize: 24}}>×</button>
                        </div>
                        <input type="text" className="form-control mb-3" placeholder="Recipient Address (0x...)" style={{background: 'var(--dark3)', border: '1px solid var(--border)', color: 'white'}} />
                        <input type="number" className="form-control mb-3" placeholder="Amount" style={{background: 'var(--dark3)', border: '1px solid var(--border)', color: 'white'}} />
                        <button className="btn btn-action w-100">Send</button>
                    </div>
                </div>
            );
        };
        
        const App = () => {
            const {connected, account, balance, connect} = useWeb3();
            const [wallets, setWallets] = useState([
                {id: 1, name: 'Main Wallet', chain: 'ethereum', type: 'Custodial', address: '0x742d35Cc6634C0532925a3b8D0D2C8D3D5A5B5B5', balance: 1.25, symbol: 'ETH'},
                {id: 2, name: 'Trading', chain: 'bsc', type: 'Custodial', address: '0x8AC76a51CC950d5922DD9EA5912B6E5eC08f7D9A0', balance: 5.8, symbol: 'BNB'},
                {id: 3, name: 'DeFi', chain: 'polygon', type: 'Non-Custodial', address: '0x0d501E4E7E6d3707d50b4F4bB3E7E8F6a1C2d3E4b', balance: 2500, symbol: 'MATIC'}
            ]);
            const [sendModal, setSendModal] = useState(false);
            
            const createWallet = (chain, type) => {
                const newWallet = {
                    id: wallets.length + 1,
                    name: `${chain} Wallet`,
                    chain: chain,
                    type: type,
                    address: '0x' + Math.random().toString(16).substr(2, 40),
                    balance: 0,
                    symbol: chain === 'tigerex' ? 'TIG' : 'ETH'
                };
                setWallets([...wallets, newWallet]);
            };
            
            return (
                <div>
                    <Ticker />
                    <nav className="d-flex justify-content-between align-items-center px-4 py-2" style={{background: 'var(--dark2)', borderBottom: '1px solid var(--border)'}}>
                        <span className="h4" style={{background: 'linear-gradient(135deg,#00d4aa,#00f5d4)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', fontWeight: 700}}>
                            <i className="bi bi-wallet2 me-2"></i>TigerEx Wallet
                        </span>
                        <button className="btn btn-action" onClick={connected?()=>{}:connect}>
                            {connected ? `${account?.slice(0, 8)}...` : 'Connect Wallet'}
                        </button>
                    </nav>
                    
                    <div className="container-fluid p-4">
                        <div className="row">
                            <div className="col-md-8">
                                <div className="card-panel p-4 mb-4">
                                    <h5 className="mb-3">My Wallets ({wallets.length})</h5>
                                    {wallets.map(w => <WalletCard key={w.id} wallet={w} onSelect={setSendModal} />)}
                                </div>
                                
                                <div className="card-panel p-4">
                                    <h5 className="mb-3">All Assets</h5>
                                    <AssetRow asset="ETH" balance={1.25} value={2887.50} />
                                    <AssetRow asset="BNB" balance={5.80} value={1624.00} />
                                    <AssetRow asset="MATIC" balance={2500} value={2125.00} />
                                    <AssetRow asset="TIG" balance={10000} value={25000.00} />
                                    <AssetRow asset="USDT" balance={5000} value={5000.00} />
                                </div>
                            </div>
                            
                            <div className="col-md-4">
                                <CreateWallet onCreate={createWallet} />
                                
                                <div className="card-panel p-4 mt-4">
                                    <h5 className="mb-3">Quick Actions</h5>
                                    <div className="d-flex flex-column gap-2">
                                        <button className="btn" style={{background: 'var(--dark3)'}} onClick={()=>setSendModal(true)}><i className="bi bi-send me-2"></i>Send</button>
                                        <button className="btn" style={{background: 'var(--dark3)'}}><i className="bi bi-qr-code me-2"></i>Receive</button>
                                        <button className="btn" style={{background: 'var(--dark3)'}}><i className="bi bi-arrow-left-right me-2"></i>Swap</button>
                                        <button className="btn" style={{background: 'var(--dark3)'}}><i className="bi bi-bank me-2"></i>Buy Crypto</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <SendModal show={sendModal} onClose={()=>setSendModal(false)} />
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
