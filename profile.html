<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Profile</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const App = () => {
            const [profile, setProfile] = useState({name:'John Doe', email:'john@example.com', kyc:'verified', lang:'en', tz:'UTC'});
            
            return (
                <div className="container-fluid p-4">
                    <h4 className="mb-4"><i className="bi bi-person me-2"></i>Profile Settings</h4>
                    <div className="card-panel p-4 mb-3">
                        <div className="mb-3"><label className="text-muted">Display Name</label><input className="form-control" value={profile.name} onChange={e=>setProfile({...profile,name:e.target.value})} /></div>
                        <div className="mb-3"><label className="text-muted">Email</label><input className="form-control" value={profile.email} disabled /></div>
                        <div className="mb-3"><label className="text-muted">Language</label><select className="form-control" value={profile.lang}><option>English</option><option>中文</option></select></div>
                        <div className="mb-3"><label className="text-muted">Timezone</label><select className="form-control" value={profile.tz}><option>UTC</option><option>EST</option><option>PST</option></select></div>
                        <button className="btn" style={{background:'var(--primary)',color:'#000'}}>Save</button>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
