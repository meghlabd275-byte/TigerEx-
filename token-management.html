<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--light:#eaeaea}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState}=React;
        const App=()=>{
            const[d,setD]=useState({q:'',a:''});
            return(<div className="container-fluid p-4">
                <h4>TigerEx Management</h4>
                <div className="card-panel p-3">
                    <input className="form-control mb-2" placeholder="Search..." value={d.q} onChange={e=>setD({...d,q:e.target.value})}/>
                </div>
            </div>);
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
