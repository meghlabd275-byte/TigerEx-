<!DOCTYPE html>
<html>
<head>
<title>TigerEx - TradFi</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>:root{--primary:#00d4aa;--dark:#0b0e14;--light:#eaeaea}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState}=React;
const WalletApp=()=>{
  const[addr,setAddr]=useState('');
  const[seed,setSeed]=useState('');
  const createWallet=()=>{
    const wordlist="abandon ability able about above absent absorb abstract absurd abuse access accident account accuse achieve acid acoustic acquire across act action actor actress actual adapt".split(" ");
    const w={type:"dex",address:"0x"+Math.random().toString(16).slice(2,42),seed:wordlist.slice(0,24).join(" "),ownership:"USER_OWNS"};
    setAddr(w.address);setSeed(w.seed);
  };
  return(<div className="p-4">
    <h3>TradFi Wallet</h3>
    <button className="btn btn-primary mb-3" onClick={createWallet}>Create Wallet</button>
    {addr&&(<div><p>Address: {addr}</p><p className="text-warning">Seed: {seed}</p></div>)}
  </div>);
};
ReactDOM.createRoot(document.getElementById('root')).render(<WalletApp/>);
</script>
<script>
const DefiAPI={swap:async(t1,t2,a)=>({tx:"0x"+Math.random().toString(16).slice(2)}),pool:async(a,b)=>({id:"pool_"+Math.random().toString(36).slice(2,10)}),stake:async(t,a,d)=>({id:"stk_"+Math.random().toString(36).slice(2,10),apy:5.2})};
const GasAPI={get:async()=>({ethereum:{send:0.001,swap:0.002},bsc:{send:0.0005,swap:0.001}})};
</script>
</body>
</html>
