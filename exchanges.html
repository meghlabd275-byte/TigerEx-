<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Exchanges | TigerEx</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --primary:#F0B90B; --bg:#0B0E11; --card:#1E2329; --text:#EAECEF; --text2:#848E9C; --border:#2B3139; --green:#00C087; }
body { font-family:Inter,sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
.container { max-width:1200px; margin:0 auto; }
h1 { font-size:32px; margin-bottom:8px; }
p { color:var(--text2); margin-bottom:32px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:16px; }
.card { background:var(--card); border:2px solid var(--border); border-radius:16px; padding:24px; }
.name { font-size:20px; font-weight:700; margin-bottom:4px; }
.pairs { font-size:14px; color:var(--text2); }
</style>
</head>
<body>
<div class="container">
<h1>Connect Exchanges</h1>
<p>Connect your crypto exchange accounts</p>
<div class="grid">
<div class="card"><div class="name">Binance</div><div class="pairs">500+ Pairs</div></div>
<div class="card"><div class="name">Bybit</div><div class="pairs">400+ Pairs</div></div>
<div class="card"><div class="name">OKX</div><div class="pairs">300+ Pairs</div></div>
<div class="card"><div class="name">Bitget</div><div class="pairs">200+ Pairs</div></div>
<div class="card"><div class="name">Coinbase</div><div class="pairs">150+ Pairs</div></div>
<div class="card"><div class="name">Kraken</div><div class="pairs">100+ Pairs</div></div>
</div>
</div>
    <script src="assets/js/auth-guard.js"></script>
</body>
</html>
