version: '3.8'

# TigerEx Multi-Cloud Docker Compose
# Supports: AWS, GCP, Azure, Multi-VM, Multi-Region

services:
  # ==================== API GATEWAY ====================
  api-gateway:
    image: tigerex/api-gateway:latest
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - REGION=${REGION:-us}
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-aws}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - RATE_LIMIT=100
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - tigerex-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== USER SERVICE ====================
  user-service:
    image: tigerex/user-service:latest
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - api-gateway
    networks:
      - tigerex-network
    deploy:
      replicas: 3

  # ==================== TRADING ENGINE ====================
  trading-engine:
    image: tigerex/trading-engine:latest
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MARGIN_ENABLED=true
      - FUTURES_ENABLED=true
    depends_on:
      - user-service
    networks:
      - tigerex-network
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ==================== WALLET SERVICE ====================
  wallet-service:
    image: tigerex/wallet-service:latest
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - user-service
    networks:
      - tigerex-network

  # ==================== MARKET DATA ====================
  market-data:
    image: tigerex/market-data:latest
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - BINANCE_WS=true
      - CACHE_ENABLED=true
    networks:
      - tigerex-network

  # ==================== P2P SERVICE ====================
  p2p-service:
    image: tigerex/p2p-service:latest
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - tigerex-network

  # ==================== EARN SERVICE ====================
  earn-service:
    image: tigerex/earn-service:latest
    ports:
      - "8006:8006"
    environment:
      - PORT=8006
      - STAKING_ENABLED=true
      - LAUNCHPOOL_ENABLED=true
    networks:
      - tigerex-network

  # ==================== ADMIN SERVICE ====================
  admin-service:
    image: tigerex/admin-service:latest
    ports:
      - "8007:8007"
    environment:
      - PORT=8007
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - tigerex-network

  # ==================== LOAD BALANCER (HAProxy) ====================
  load-balancer:
    image: tigerex/lb:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BACKEND_HOSTS=api-gateway:8000
      - SSL_CERT_PATH=/certs/server.crt
      - SSL_KEY_PATH=/certs/server.key
    depends_on:
      - api-gateway
    networks:
      - tigerex-network
    deploy:
      replicas: 2

  # ==================== REDIS (Cache) ====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    networks:
      - tigerex-network
    deploy:
      replicas: 2

  # ==================== POSTGRESQL ====================
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-tigerex}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=tigerex_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tigerex-network
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=512MB
      -c effective_cache_size=2GB

  # ==================== RABBITMQ ====================
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    networks:
      - tigerex-network

networks:
  tigerex-network:
    driver: overlay
    driver_opts:
      encrypted: "true"

volumes:
  pgdata:

# Multi-region deployment example
# docker-compose -f docker-compose.yml -f docker-compose.us.yml up -d
# docker-compose -f docker-compose.yml -f docker-compose.eu.yml up -d
# docker-compose -f docker-compose.yml -f docker-compose.asia.yml up -d