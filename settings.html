<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Settings</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const App = () => {
            const [s, setS] = useState({
                theme: 'dark', currency: 'USD', lang: 'en', 
                tn: true, email: true, push: false
            });
            const [saved, setSaved] = useState(false);
            
            const save = () => {
                setSaved(true);
                setTimeout(() => setSaved(false), 2000);
            };
            
            return (
                <div className="container-fluid p-4">
                    <h4 className="mb-4"><i className="bi bi-gear me-2"></i>Settings</h4>
                    <div className="card-panel p-4 mb-3">
                        <div className="mb-3">
                            <label className="d-block mb-1">Theme</label>
                            <select className="form-control" value={s.theme} onChange={e=>setS({...s,theme:e.target.value})}>
                                <option>Dark</option><option>Light</option>
                            </select>
                        </div>
                        <div className="mb-3">
                            <label className="d-block mb-1">Currency</label>
                            <select className="form-control" value={s.currency} onChange={e=>setS({...s,currency:e.target.value})}>
                                <option>USD</option><option>EUR</option><option>GBP</option>
                            </select>
                        </div>
                        <div className="mb-3">
                            <label className="d-block mb-1">Language</label>
                            <select className="form-control" value={s.lang} onChange={e=>setS({...s,lang:e.target.value})}>
                                <option>English</option><option>中文</option><option>हिन्दी</option>
                            </select>
                        </div>
                        <button className="btn" style={{background:'var(--primary)',color:'#000'}} onClick={save}>
                            {saved ? 'Saved!' : 'Save Changes'}
                        </button>
                    </div>
                    <div className="card-panel p-4">
                        <h5 className="mb-3">Notifications</h5>
                        <div className="form-check form-switch mb-2">
                            <input className="form-check-input" type="checkbox" checked={s.tn} onChange={e=>setS({...s,tn:e.target.checked})} />
                            <label className="form-check-label">Trade Notifications</label>
                        </div>
                        <div className="form-check form-switch mb-2">
                            <input className="form-check-input" type="checkbox" checked={s.email} onChange={e=>setS({...s,email:e.target.checked})} />
                            <label className="form-check-label">Email Alerts</label>
                        </div>
                        <div className="form-check form-switch">
                            <input className="form-check-input" type="checkbox" checked={s.push} onChange={e=>setS({...s,push:e.target.checked})} />
                            <label className="form-check-label">Push Notifications</label>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
