<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - 2FA Reset</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const App = () => {
            const [step, setStep] = useState(1);
            const [code, setCode] = useState('');
            const [loading, setLoading] = useState(false);
            
            const handleVerify = () => {
                if(code.length === 6) {
                    setLoading(true);
                    setTimeout(() => {
                        setLoading(false);
                        alert('2FA disabled successfully!');
                    }, 1500);
                }
            };
            
            return (
                <div className="container-fluid p-4">
                    <h4 className="mb-4"><i className="bi bi-shield-lock me-2"></i>Reset 2FA</h4>
                    <div className="card-panel p-4">
                        <p className="mb-3">Enter the 6-digit code from your authenticator app:</p>
                        <input 
                            className="form-control mb-3" 
                            placeholder="000000"
                            maxLength={6}
                            value={code}
                            onChange={e => setCode(e.target.value.replace(/\D/g,'').slice(0,6))}
                            style={{fontSize:24, textAlign:'center', letterSpacing:8}}
                        />
                        <button 
                            className="btn w-100" 
                            style={{background:'var(--primary)', color:'#000'}}
                            onClick={handleVerify}
                            disabled={loading || code.length !== 6}
                        >
                            {loading ? 'Verifying...' : 'Disable 2FA'}
                        </button>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
