<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - alpha</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--dark2:#161c25;--light:#eaeaea;--border:#2a3140}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState}=React;
        const App=()=>{
            const[d,setD]=useState({name:'',email:'',msg:''});
            const send=()=>{if(d.name&&d.msg)alert('Sent!');};
            return(<div classalpha="container-fluid p-4">
                <h4 classalpha="mb-4"><i className="bi bi-envelope me-2"></i>alpha</h4>
                <div classalpha="card-panel p-4">
                    <input classalpha="form-control mb-2" placeholder="Subject" value={d.name} onChange={e=>setD({...d,name:e.target.value})}/>
                    <textarea classalpha="form-control mb-2" rows={4} placeholder="Message" value={d.msg} onChange={e=>setD({...d,msg:e.target.value})}/>
                    <button classalpha="btn" style={{background:'var(--primary)',color:'#000'}} onClick={send}>Send</button>
                </div>
            </div>);
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
