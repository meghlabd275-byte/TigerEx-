<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Copy Trading</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>:root{--primary:#00d4aa;--dark:#0b0e14;--dark2:#161c25;--light:#eaeaea;--border:#2a3140}body{background:var(--dark);color:var(--light)}</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const{useState}=React;
        const App=()=>{
            const[t,setT]=useState([{trader:'Trader1',pnl:25.5,copy:true},{trader:'Trader2',pnl:18.2,copy:false}]);
            return(<div className="container-fluid p-4">
                <h4 className="mb-4"><i className="bi bi-copy me-2"></i>Copy Trading</h4>
                {t.map((x,i)=><div key={i} className="card-panel p-3 mb-2 d-flex justify-content-between">
                    <div><b>{x.trader}</b><small className="d-block text-success">+{x.pnl}%</small></div>
                    <button className="btn btn-sm" style={{background:x.copy?'var(--primary)':'#333',color:'#000'}}>{x.copy?'Following':'Follow'}</button>
                </div>)}
            </div>);
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
