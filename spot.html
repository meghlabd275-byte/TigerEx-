<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Spot Trading</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --light: #eaeaea; --green: #00c087; --red: #f6465d; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const App = () => {
            const [pair, setPair] = useState('BTC/USDT');
            const [price, setPrice] = useState(78440);
            const [side, setSide] = useState('buy');
            const [amount, setAmount] = useState('');
            const [orders, setOrders] = useState([
                {id:'1',price:78450,amount:0.5,total:39225},
                {id:'2',price:78400,amount:0.3,total:23520},
            ]);
            
            useEffect(() => {
                const i = setInterval(() => setPrice(p => p*(0.999+Math.random()*0.002)), 2000);
                return () => clearInterval(i);
            }, []);
            
            return (
                <div className="d-flex">
                    <div className="flex-grow-1 p-3">
                        <div className="d-flex justify-content-between mb-3">
                            <select className="form-control w-25" value={pair} onChange={e=>setPair(e.target.value)}>
                                <option>BTC/USDT</option>
                                <option>ETH/USDT</option>
                                <option>BNB/USDT</option>
                            </select>
                            <h4>${price.toFixed(2)} <small className="text-success">+2.5%</small></h4>
                        </div>
                        <div className="d-flex gap-2 mb-3">
                            <button className={`btn ${side==='buy'?'btn-success':'btn-secondary'}`} onClick={()=>setSide('buy')}>Buy</button>
                            <button className={`btn ${side==='sell'?'btn-danger':'btn-secondary'}`} onClick={()=>setSide('sell')}>Sell</button>
                        </div>
                        <input className="form-control mb-2" placeholder="Amount" value={amount} onChange={e=>setAmount(e.target.value)} />
                        <div className="d-flex gap-2 mb-3">
                            <button className="btn btn-sm btn-outline-secondary">25%</button>
                            <button className="btn btn-sm btn-outline-secondary">50%</button>
                            <button className="btn btn-sm btn-outline-secondary">75%</button>
                            <button className="btn btn-sm btn-outline-secondary">100%</button>
                        </div>
                        <button className={`btn w-100 ${side==='buy'?'btn-success':'btn-danger'}`}>Place Order</button>
                    </div>
                    <div className="w-25 p-3" style={{background:'var(--dark2)'}}>
                        <h6>Order Book</h6>
                        <table className="w-100"><tbody>
                            {orders.map(o=><tr key={o.id}><td className="p-1 text-success">{o.price}</td><td className="p-1">{o.amount}</td><td className="p-1 text-end">{o.total}</td></tr>)}
                        </tbody></table>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
