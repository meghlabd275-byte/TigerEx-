# ==========================================
# TigerEx Docker Compose Configuration
# @file docker-compose.yml
# @description Production-ready multi-service orchestration
# @author TigerEx Development Team
# @version v12.0.0
# ==========================================

version: '3.9'

services:
  # Database Services
  postgres:
    image: postgres:16-alpine
    container_name: tigerex-postgres
    environment:
      POSTGRES_DB: tigerex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tigerex_secure_password_2024}
      POSTGRES_MAX_CONNECTIONS: 200
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - tigerex-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tigerex-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - tigerex-network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-tigerex_redis_2024}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: tigerex-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-tigerex}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-tigerex_rabbitmq_2024}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - tigerex-network
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: tigerex-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-tigerex}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-tigerex_mongo_2024}
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - tigerex-network
    restart: unless-stopped
    command: mongod --replSet rs0

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: tigerex-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-tigerex_elastic_2024}
      - ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - '9200:9200'
      - '9300:9300'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - tigerex-network
    restart: unless-stopped

  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    container_name: tigerex-api-gateway
    ports:
      - '8000:8000'
    environment:
      - NODE_ENV=production
      - PORT=8000
    depends_on:
      - redis
      - rabbitmq
    networks:
      - tigerex-network
    restart: unless-stopped

  user-service:
    build:
      context: ../backend/user-service
      dockerfile: Dockerfile
    container_name: tigerex-user-service
    ports:
      - '8001:8001'
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-tigerex_secure_password_2024}@postgres:5432/tigerex
      - REDIS_URL=redis://:${REDIS_PASSWORD:-tigerex_redis_2024}@redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - tigerex-network
    restart: unless-stopped

  trading-engine:
    build:
      context: ../backend/trading-engine
      dockerfile: Dockerfile
    container_name: tigerex-trading-engine
    ports:
      - '8002:8002'
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-tigerex_secure_password_2024}@postgres:5432/tigerex
      - REDIS_URL=redis://:${REDIS_PASSWORD:-tigerex_redis_2024}@redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-tigerex}:${RABBITMQ_PASSWORD:-tigerex_rabbitmq_2024}@rabbitmq:5672
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - tigerex-network
    restart: unless-stopped

  wallet-service:
    build:
      context: ../backend/wallet-service
      dockerfile: Dockerfile
    container_name: tigerex-wallet-service
    ports:
      - '8003:8003'
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-tigerex_secure_password_2024}@postgres:5432/tigerex
      - REDIS_URL=redis://:${REDIS_PASSWORD:-tigerex_redis_2024}@redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - tigerex-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tigerex-frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8000
    depends_on:
      - api-gateway
    networks:
      - tigerex-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: tigerex-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - tigerex-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: tigerex-grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-tigerex_grafana_2024}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - tigerex-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tigerex-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - api-gateway
    networks:
      - tigerex-network
    restart: unless-stopped

networks:
  tigerex-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  mongodb_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data: