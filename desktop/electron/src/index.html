<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Desktop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        #root {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .loading {
            color: white;
            font-size: 24px;
            text-align: center;
        }
    .theme-toggle { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--bg-card); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; padding: 8px; } .theme-toggle:hover { background: var(--bg-card-hover); } body { transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <h1>🐅 TigerEx Desktop</h1>
            <p>Loading trading platform...</p>
            <p>Version 1.0.0</p>
        </div>
    </div>
    
    <script>
        // Load the web app in an iframe for security
        const iframe = document.createElement('iframe');
        iframe.src = 'http://localhost:3000'; // Web app URL
        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.border = 'none';
        
        document.getElementById('root').innerHTML = '';
        document.getElementById('root').appendChild(iframe);
    </script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/auth-guard.js"></script>
</body>
</html>
