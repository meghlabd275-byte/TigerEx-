<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Users - Desktop</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #F0B90B;
            --primary-dark: #D69E0A;
            --success: #0ECB81;
            --error: #F6465D;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        /* Dark Mode Styles */
        .dark {
            background-color: #0B0B0F;
            color: #FFFFFF;
        }
        
        .dark .bg-card {
            background-color: #1E1E1E;
        }
        
        .dark .bg-secondary {
            background-color: #2A2A2E;
        }
        
        .dark .text-primary {
            color: #FFFFFF;
        }
        
        .dark .text-secondary {
            color: #A0A0A0;
        }
        
        .dark .border {
            border-color: #2C2C2E;
        }
        
        /* Light Mode Styles */
        .light {
            background-color: #FFFFFF;
            color: #1A1A1A;
        }
        
        .light .bg-card {
            background-color: #F5F5F5;
        }
        
        .light .text-primary {
            color: #1A1A1A;
        }
        
        .light .text-secondary {
            color: #757575;
        }
        
        .light .border {
            border-color: #E5E5E5;
        }
        
        /* Bottom Navigation */
        .nav-item.active {
            color: var(--primary);
        }
        
        .btn-primary {
            background-color: var(--primary);
        }
        
        /* Platform Badge */
        .platform-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            background: var(--primary);
            color: black;
            font-weight: bold;
        }
    </style>
</head>
<body class="dark" id="app">
    <!-- Platform Badge -->
    <div class="platform-badge" id="platformBadge">Windows</div>
    
    <!-- Toolbar with Theme Toggle -->
    <header class="bg-card border-b px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <h1 class="text-xl font-bold" style="color: var(--primary)">TigerEx</h1>
            <span class="text-sm text-secondary">Users</span>
        </div>
        
        <!-- Theme Toggle Button in Toolbar -->
        <div class="flex items-center space-x-4">
            <button
                id="themeToggle"
                onclick="toggleTheme()"
                class="flex items-center space-x-2 px-3 py-2 rounded-lg bg-secondary hover:opacity-80 transition"
                title="Toggle Dark/Light Mode"
            >
                <span id="themeIcon">☀️</span>
                <span id="themeText" class="text-sm font-medium">Light Mode</span>
            </button>
        </div>
    </header>
    
    <!-- Main Content Area -->
    <div class="flex h-screen">
        <!-- Sidebar Navigation -->
        <nav class="w-20 bg-card border-r flex flex-col items-center py-4 space-y-4">
            <button onclick="setTab('home')" class="nav-item w-full py-3 text-center active" data-tab="home">
                <span class="text-2xl">🏠</span>
                <span class="text-xs block mt-1">Home</span>
            </button>
            <button onclick="setTab('markets')" class="nav-item w-full py-3 text-center" data-tab="markets">
                <span class="text-2xl">📊</span>
                <span class="text-xs block mt-1">Markets</span>
            </button>
            <button onclick="setTab('trade')" class="nav-item w-full py-3 text-center" data-tab="trade">
                <span class="text-2xl">💱</span>
                <span class="text-xs block mt-1">Trade</span>
            </button>
            <button onclick="setTab('tradfi')" class="nav-item w-full py-3 text-center" data-tab="tradfi">
                <span class="text-2xl">🏦</span>
                <span class="text-xs block mt-1">TradFi</span>
            </button>
            <button onclick="setTab('assets')" class="nav-item w-full py-3 text-center" data-tab="assets">
                <span class="text-2xl">💼</span>
                <span class="text-xs block mt-1">Assets</span>
            </button>
        </nav>
        
        <!-- Main Content -->
        <main class="flex-1 overflow-auto p-4" id="mainContent">
            <!-- Home Tab -->
            <div id="homeTab" class="tab-content">
                <!-- Portfolio Card -->
                <div class="bg-card rounded-lg p-6 mb-4">
                    <p class="text-secondary text-sm">Total Balance</p>
                    <p class="text-3xl font-bold mt-2">$12,345.67</p>
                    <p class="text-green-500 mt-2">+$523.45 (+4.42%)</p>
                </div>
                
                <!-- Quick Actions -->
                <div class="grid grid-cols-4 gap-4 mb-4">
                    <button class="bg-green-500 text-white py-3 rounded-lg font-medium">Buy</button>
                    <button class="bg-red-500 text-white py-3 rounded-lg font-medium">Sell</button>
                    <button class="bg-blue-500 text-white py-3 rounded-lg font-medium">Send</button>
                    <button class="bg-secondary text-primary py-3 rounded-lg font-medium">Convert</button>
                </div>
                
                <!-- Services Grid -->
                <div class="grid grid-cols-4 gap-3">
                    <button class="bg-card p-3 rounded-lg text-center">
                        <span class="text-2xl">📥</span>
                        <p class="text-xs mt-1">Deposit</p>
                    </button>
                    <button class="bg-card p-3 rounded-lg text-center">
                        <span class="text-2xl">📤</span>
                        <p class="text-xs mt-1">Withdraw</p>
                    </button>
                    <button class="bg-card p-3 rounded-lg text-center">
                        <span class="text-2xl">📈</span>
                        <p class="text-xs mt-1">Futures</p>
                    </button>
                    <button class="bg-card p-3 rounded-lg text-center">
                        <span class="text-2xl">🔒</span>
                        <p class="text-xs mt-1">Staking</p>
                    </button>
                    <button class="bg-card p-3 rounded-lg text-center">
                        <span class="text-2xl">🔥</span>
                        <p class="text-xs mt-1">Launchpool</p>
                    </button>
                    <button class="bg-card p-3 rounded-lg text-center">
                        <span class="text-2xl">👥</span>
                        <p class="text-xs mt-1">Copy</p>
                    </button>
                    <button class="bg-card p-3 rounded-lg text-center">
                        <span class="text-2xl">⛏️</span>
                        <p class="text-xs mt-1">Mining</p>
                    </button>
                    <button class="bg-card p-3 rounded-lg text-center">
                        <span class="text-2xl">💳</span>
                        <p class="text-xs mt-1">Card</p>
                    </button>
                </div>
            </div>
            
            <!-- Markets Tab -->
            <div id="marketsTab" class="tab-content hidden">
                <div class="bg-card rounded-lg p-4 mb-4">
                    <input type="text" placeholder="Search markets..." class="w-full bg-secondary p-3 rounded-lg text-primary">
                </div>
                <div class="space-y-2">
                    <div class="bg-card p-4 rounded-lg flex justify-between items-center">
                        <div>
                            <p class="font-bold">BTC/USDT</p>
                            <p class="text-secondary text-sm">Bitcoin</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold">$43,250.00</p>
                            <p class="text-green-500">+2.5%</p>
                        </div>
                    </div>
                    <div class="bg-card p-4 rounded-lg flex justify-between items-center">
                        <div>
                            <p class="font-bold">ETH/USDT</p>
                            <p class="text-secondary text-sm">Ethereum</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold">$2,280.00</p>
                            <p class="text-green-500">+1.8%</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Trade Tab -->
            <div id="tradeTab" class="tab-content hidden">
                <!-- Trading Mode Tabs -->
                <div class="flex space-x-2 mb-4 overflow-x-auto">
                    <button onclick="setTradeMode('spot')" class="trade-mode-btn px-4 py-2 rounded-lg bg-primary text-black font-medium" data-mode="spot">Spot</button>
                    <button onclick="setTradeMode('futures')" class="trade-mode-btn px-4 py-2 rounded-lg bg-card text-primary" data-mode="futures">Futures</button>
                    <button onclick="setTradeMode('margin')" class="trade-mode-btn px-4 py-2 rounded-lg bg-card text-primary" data-mode="margin">Margin</button>
                    <button onclick="setTradeMode('option')" class="trade-mode-btn px-4 py-2 rounded-lg bg-card text-primary" data-mode="option">Option</button>
                    <button onclick="setTradeMode('alpha')" class="trade-mode-btn px-4 py-2 rounded-lg bg-card text-primary" data-mode="alpha">Alpha</button>
                    <button onclick="setTradeMode('copy')" class="trade-mode-btn px-4 py-2 rounded-lg bg-card text-primary" data-mode="copy">Copy</button>
                    <button onclick="setTradeMode('tradex')" class="trade-mode-btn px-4 py-2 rounded-lg bg-card text-primary" data-mode="tradex">TradeX</button>
                </div>
                
                <!-- Trade Form -->
                <div class="bg-card rounded-lg p-4">
                    <p class="font-bold text-xl mb-4">BTC/USDT: $43,250.00</p>
                    
                    <div class="flex space-x-2 mb-4">
                        <button class="flex-1 py-3 bg-green-500 text-white rounded-lg font-medium">Buy</button>
                        <button class="flex-1 py-3 bg-red-500 text-white rounded-lg font-medium">Sell</button>
                    </div>
                    
                    <div class="space-y-3">
                        <input type="text" placeholder="Price" class="w-full bg-secondary p-3 rounded-lg text-primary">
                        <input type="text" placeholder="Amount" class="w-full bg-secondary p-3 rounded-lg text-primary">
                    </div>
                    
                    <button class="w-full py-3 bg-primary text-black font-bold rounded-lg mt-4">Place Order</button>
                </div>
            </div>
            
            <!-- TradFi Tab -->
            <div id="tradfiTab" class="tab-content hidden">
                <div class="bg-card rounded-lg p-4 mb-4">
                    <p class="font-bold mb-2">Yield Products</p>
                    <div class="p-3 bg-secondary rounded-lg mb-2">
                        <p class="font-medium">BTC Vault</p>
                        <p class="text-green-500">5.2% APY</p>
                    </div>
                    <div class="p-3 bg-secondary rounded-lg">
                        <p class="font-medium">ETH Vault</p>
                        <p class="text-green-500">4.8% APY</p>
                    </div>
                </div>
            </div>
            
            <!-- Assets Tab -->
            <div id="assetsTab" class="tab-content hidden">
                <div class="bg-card rounded-lg p-4 mb-4">
                    <input type="text" placeholder="Search assets..." class="w-full bg-secondary p-3 rounded-lg text-primary">
                </div>
                <div class="space-y-2">
                    <div class="bg-card p-4 rounded-lg flex justify-between items-center">
                        <div>
                            <p class="font-bold">BTC</p>
                            <p class="text-secondary text-sm">Bitcoin</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold">1.2345</p>
                            <p class="text-secondary">$53,408.25</p>
                        </div>
                    </div>
                    <div class="bg-card p-4 rounded-lg flex justify-between items-center">
                        <div>
                            <p class="font-bold">ETH</p>
                            <p class="text-secondary text-sm">Ethereum</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold">10.5</p>
                            <p class="text-secondary">$23,940.00</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // State
        let isDarkMode = true;
        let currentTab = 'home';
        let currentTradeMode = 'spot';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            // Detect platform
            const platform = getPlatform();
            document.getElementById('platformBadge').textContent = platform;
            
            // Load saved theme
            const savedTheme = localStorage.getItem('tigerex_theme');
            if (savedTheme) {
                isDarkMode = savedTheme === 'dark';
                applyTheme();
            }
        });
        
        // Get Platform
        function getPlatform() {
            const userAgent = navigator.userAgent.toLowerCase();
            if (userAgent.includes('win')) return 'Windows';
            if (userAgent.includes('mac')) return 'Mac OS';
            if (userAgent.includes('linux')) return 'Linux';
            return 'Desktop';
        }
        
        // Toggle Theme
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('tigerex_theme', isDarkMode ? 'dark' : 'light');
            applyTheme();
        }
        
        // Apply Theme
        function applyTheme() {
            const app = document.getElementById('app');
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            
            if (isDarkMode) {
                app.classList.remove('light');
                app.classList.add('dark');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Light Mode';
            } else {
                app.classList.remove('dark');
                app.classList.add('light');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Dark Mode';
            }
        }
        
        // Set Tab
        function setTab(tab) {
            currentTab = tab;
            
            // Update nav items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.tab === tab) {
                    item.classList.add('active');
                }
            });
            
            // Show/hide tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(tab + 'Tab').classList.remove('hidden');
        }
        
        // Set Trade Mode
        function setTradeMode(mode) {
            currentTradeMode = mode;
            
            // Update buttons
            document.querySelectorAll('.trade-mode-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-black');
                btn.classList.add('bg-card', 'text-primary');
                if (btn.dataset.mode === mode) {
                    btn.classList.remove('bg-card', 'text-primary');
                    btn.classList.add('bg-primary', 'text-black');
                }
            });
        }
    </script>
    <script src="assets/js/auth-guard.js"></script>
</body>
</html>
