<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Exchange - CEX + DEX</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #00d4aa;
            --secondary: #1a1a2e;
            --dark: #0f0f1a;
            --light: #f8f9fa;
            --success: #00d4aa;
            --danger: #ff4757;
            --warning: #ffa502;
        }
        body {
            background: var(--dark);
            color: var(--light);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar {
            background: var(--secondary) !important;
            border-bottom: 1px solid #2a2a4a;
        }
        .navbar-brand {
            color: var(--primary) !important;
            font-weight: bold;
        }
        .card {
            background: var(--secondary);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .card-header {
            background: transparent;
            border-bottom: 1px solid #2a2a4a;
            color: var(--primary);
        }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--dark);
        }
        .btn-primary:hover {
            background: #00b894;
            border-color: #00b894;
        }
        .btn-success {
            background: var(--success);
            border-color: var(--success);
            color: var(--dark);
        }
        .btn-danger {
            background: var(--danger);
            border-color: var(--danger);
        }
        .ticker {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: var(--secondary);
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .ticker-item {
            text-align: center;
        }
        .ticker-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
        }
        .ticker-label {
            font-size: 0.8rem;
            color: #888;
        }
        .price-up { color: var(--success); }
        .price-down { color: var(--danger); }
        .order-form {
            background: var(--secondary);
            padding: 20px;
            border-radius: 8px;
        }
        .order-form input, .order-form select {
            background: var(--dark);
            border-color: #2a2a4a;
            color: white;
        }
        .order-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .order-item {
            padding: 10px;
            border-bottom: 1px solid #2a2a4a;
        }
        .order-item:hover {
            background: #252545;
        }
        .depth-bar {
            height: 20px;
            background: var(--primary);
            opacity: 0.5;
        }
        .wallet-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #2a2a4a;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-arrow-left-right"></i> TigerEx Exchange
            </a>
            <div class="d-flex">
                <button class="btn btn-outline-light me-2" onclick="showSection('trade')">Trade</button>
                <button class="btn btn-outline-light me-2" onclick="showSection('wallet')">Wallet</button>
                <button class="btn btn-outline-light" onclick="showSection('Liquidity')">Liquidity</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Ticker -->
        <div class="ticker" id="ticker">
            <div class="ticker-item">
                <div class="ticker-value" id="lastPrice">-</div>
                <div class="ticker-label">Last Price</div>
            </div>
            <div class="ticker-item">
                <div class="ticker-value" id="bidPrice">-</div>
                <div class="ticker-label">Bid</div>
            </div>
            <div class="ticker-item">
                <div class="ticker-value" id="askPrice">-</div>
                <div class="ticker-label">Ask</div>
            </div>
            <div class="ticker-item">
                <div class="ticker-value" id="vol24h">-</div>
                <div class="ticker-label">Volume 24h</div>
            </div>
        </div>

        <div class="row">
            <!-- Order Book -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">Order Book</div>
                    <div class="card-body p-0">
                        <div id="asksList" class="order-list"></div>
                        <div class="text-center py-2 border-top border-bottom border-secondary" id="midPrice">
                            <span class="text-warning">--</span>
                        </div>
                        <div id="bidsList" class="order-list"></div>
                    </div>
                </div>
            </div>

            <!-- Trading Form -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <select id="pairSelect" class="form-select" style="width: auto; display: inline-block;">
                            <option value="TIG/USDC">TIG/USDC</option>
                            <option value="ETH/USDC">ETH/USDC</option>
                            <option value="BTC/USDC">BTC/USDC</option>
                        </select>
                    </div>
                    <div class="card-body">
                        <ul class="nav nav-tabs mb-3">
                            <li class="nav-item">
                                <button class="nav-link active" onclick="setSide('buy')">Buy</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" onclick="setSide('sell')">Sell</button>
                            </li>
                        </ul>
                        <div class="order-form">
                            <div class="mb-3">
                                <label>Price</label>
                                <input type="number" id="priceInput" class="form-control" placeholder="0.00">
                            </div>
                            <div class="mb-3">
                                <label>Amount</label>
                                <input type="number" id="amountInput" class="form-control" placeholder="0.00">
                            </div>
                            <div class="mb-3">
                                <label>Total</label>
                                <input type="text" id="totalInput" class="form-control" readonly>
                            </div>
                            <button class="btn btn-success w-100" id="submitBtn" onclick="placeOrder()">Place Buy Order</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- My Orders -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">My Orders</div>
                    <div class="card-body p-0">
                        <div id="myOrders" class="order-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Wallet Section -->
        <div class="row" id="walletSection" style="display: none;">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-header">My Wallet</div>
                    <div class="card-body">
                        <div id="walletBalances"></div>
                        <div class="mt-3">
                            <h5>Deposit</h5>
                            <div class="row">
                                <div class="col-md-4">
                                    <select id="depositAsset" class="form-select">
                                        <option value="TIG">TIG</option>
                                        <option value="USDC">USDC</option>
                                        <option value="ETH">ETH</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <input type="number" id="depositAmount" class="form-control" placeholder="Amount">
                                </div>
                                <div class="col-md-4">
                                    <button class="btn btn-primary" onclick="deposit()">Deposit</button>
                                </div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <h5>Withdraw</h5>
                            <div class="row">
                                <div class="col-md-3">
                                    <select id="withdrawAsset" class="form-select">
                                        <option value="TIG">TIG</option>
                                        <option value="USDC">USDC</option>
                                        <option value="ETH">ETH</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <input type="number" id="withdrawAmount" class="form-control" placeholder="Amount">
                                </div>
                                <div class="col-md-3">
                                    <input type="text" id="withdrawAddress" class="form-control" placeholder="Address">
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-danger" onclick="withdraw()">Withdraw</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Liquidity Section -->
        <div class="row" id="liquiditySection" style="display: none;">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-header">Add Liquidity (AMM)</div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="number" id="liqAmountA" class="form-control" placeholder="Token A Amount">
                            </div>
                            <div class="col-md-4">
                                <input type="number" id="liqAmountB" class="form-control" placeholder="Token B Amount">
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-primary w-100" onclick="addLiquidity()">Add Liquidity</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">Pools</div>
                    <div class="card-body" id="poolsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:5900';
        let currentUser = 'user1';
        let currentSide = 'buy';

        async function fetchJSON(url, options = {}) {
            try {
                const res = await fetch(url, options);
                return await res.json();
            } catch (e) {
                console.error(e);
                return {error: e.message};
            }
        }

        async function loadTicker() {
            const pair = document.getElementById('pairSelect').value;
            const ticker = await fetchJSON(`${API_BASE}/exchange/ticker/${pair}`);
            if (!ticker.error) {
                document.getElementById('lastPrice').textContent = ticker.last || '--';
                document.getElementById('bidPrice').textContent = ticker.bid || '--';
                document.getElementById('askPrice').textContent = ticker.ask || '--';
                document.getElementById('vol24h').textContent = (ticker.volume_24h || 0).toFixed(2);
                document.getElementById('midPrice').innerHTML = `<span>${ticker.last || '--'}</span>`;
            }
        }

        async function loadOrderBook() {
            const pair = document.getElementById('pairSelect').value;
            const book = await fetchJSON(`${API_BASE}/exchange/book/${pair}`);
            
            const bidsList = document.getElementById('bidsList');
            const asksList = document.getElementById('asksList');
            
            bidsList.innerHTML = (book.bids || []).slice(0, 10).reverse().map(b => 
                `<div class="order-item d-flex justify-content-between">
                    <span class="price-up">${b[0]}</span>
                    <span>${b[1]}</span>
                </div>`
            ).join('');
            
            asksList.innerHTML = (book.asks || []).slice(0, 10).map(a => 
                `<div class="order-item d-flex justify-content-between">
                    <span>${a[1]}</span>
                    <span class="price-down">${a[0]}</span>
                </div>`
            ).join('');
        }

        async function loadMyOrders() {
            const orders = await fetchJSON(`${API_BASE}/exchange/orders?user_id=${currentUser}`);
            const list = document.getElementById('myOrders');
            
            list.innerHTML = (orders || []).slice(0, 20).map(o => 
                `<div class="order-item">
                    <div class="d-flex justify-content-between">
                        <span class="${o.side === 'buy' ? 'price-up' : 'price-down'}">${o.side.toUpperCase()}</span>
                        <span>${o.price}</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <small>${o.pair}</small>
                        <small>${o.remaining}/${o.quantity}</small>
                    </div>
                </div>`
            ).join('');
        }

        async function loadWallet() {
            const balance = await fetchJSON(`${API_BASE}/exchange/balance/${currentUser}`);
            const list = document.getElementById('walletBalances');
            
            list.innerHTML = Object.entries(balance || {}).map(([asset, amount]) => 
                `<div class="wallet-item">
                    <span>${asset}</span>
                    <span>${amount.toFixed(6)}</span>
                </div>`
            ).join('');
        }

        async function placeOrder() {
            const pair = document.getElementById('pairSelect').value;
            const price = parseFloat(document.getElementById('priceInput').value);
            const quantity = parseFloat(document.getElementById('amountInput').value);
            
            if (!price || !quantity) {
                alert('Please enter price and amount');
                return;
            }
            
            const result = await fetchJSON(`${API_BASE}/exchange/order`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: currentUser,
                    pair: pair,
                    side: currentSide,
                    type: 'limit',
                    price: price,
                    quantity: quantity
                })
            });
            
            if (result.order && !result.error) {
                alert('Order placed!');
                loadMyOrders();
                loadOrderBook();
                loadWallet();
            } else {
                alert(result.error || 'Failed to place order');
            }
        }

        async function deposit() {
            const asset = document.getElementById('depositAsset').value;
            const amount = parseFloat(document.getElementById('depositAmount').value);
            
            const result = await fetchJSON(`${API_BASE}/exchange/deposit`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: currentUser,
                    asset: asset,
                    amount: amount
                })
            });
            
            if (!result.error) {
                alert('Deposit successful!');
                loadWallet();
            } else {
                alert(result.error);
            }
        }

        async function withdraw() {
            const asset = document.getElementById('withdrawAsset').value;
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const address = document.getElementById('withdrawAddress').value;
            
            const result = await fetchJSON(`${API_BASE}/exchange/withdraw`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: currentUser,
                    asset: asset,
                    amount: amount,
                    address: address
                })
            });
            
            if (!result.error) {
                alert('Withdrawal initiated!');
                loadWallet();
            } else {
                alert(result.error);
            }
        }

        async function addLiquidity() {
            const pair = document.getElementById('pairSelect').value;
            const amountA = parseFloat(document.getElementById('liqAmountA').value);
            const amountB = parseFloat(document.getElementById('liqAmountB').value);
            
            const result = await fetchJSON(`${API_BASE}/exchange/liquidity/add`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: currentUser,
                    pair: pair,
                    amount_a: amountA,
                    amount_b: amountB
                })
            });
            
            if (!result.error) {
                alert('Liquidity added!');
                loadWallet();
            } else {
                alert(result.error);
            }
        }

        function setSide(side) {
            currentSide = side;
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('submitBtn').textContent = `Place ${side.charAt(0).toUpperCase() + side.slice(1)} Order`;
            document.getElementById('submitBtn').className = `btn btn-${side === 'buy' ? 'success' : 'danger'} w-100`;
        }

        function showSection(section) {
            document.getElementById('trade').style.display = section === 'trade' ? 'block' : 'none';
            document.getElementById('walletSection').style.display = section === 'wallet' ? 'block' : 'none';
            document.getElementById('liquiditySection').style.display = section === 'Liquidity' ? 'block' : 'none';
        }

        // Event listeners
        document.getElementById('pairSelect').addEventListener('change', () => {
            loadTicker();
            loadOrderBook();
        });

        document.getElementById('priceInput').addEventListener('input', updateTotal);
        document.getElementById('amountInput').addEventListener('input', updateTotal);

        function updateTotal() {
            const price = parseFloat(document.getElementById('priceInput').value) || 0;
            const amount = parseFloat(document.getElementById('amountInput').value) || 0;
            document.getElementById('totalInput').value = (price * amount).toFixed(2);
        }

        // Initialize
        setInterval(() => { loadTicker(); loadOrderBook(); }, 3000);
        loadTicker();
        loadOrderBook();
        loadMyOrders();
        loadWallet();
    </script>
</body>
</html>
