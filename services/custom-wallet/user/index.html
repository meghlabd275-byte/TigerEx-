<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Wallet - User Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen p-6">
    <h1 class="text-3xl font-bold text-yellow-500 mb-6">My Wallets</h1>
    
    <div id="login" class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl">
        <h2 class="text-white text-xl mb-4">Login / Register</h2>
        <input type="email" id="email" placeholder="Email" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white mb-3">
        <input type="password" id="password" placeholder="Password" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white mb-3">
        <button onclick="login()" class="w-full bg-yellow-500 text-gray-900 font-bold py-3 rounded-lg">Login</button>
    </div>
    
    <div id="dashboard" class="hidden">
        <div class="bg-gray-800 p-4 rounded-xl mb-4">
            <h2 class="text-white font-bold mb-4">Create Wallet</h2>
            <select id="chain" class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white mr-2"></select>
            <button onclick="createWallet()" class="bg-yellow-500 text-gray-900 px-6 py-2 rounded-lg font-bold">Create</button>
        </div>
        
        <div class="bg-gray-800 p-4 rounded-xl">
            <h2 class="text-white font-bold mb-4">My Wallets</h2>
            <div id="wallets" class="space-y-3"></div>
        </div>
        
        <div class="grid grid-cols-3 gap-4 mt-4">
            <button onclick="deposit()" class="bg-green-600 text-white p-4 rounded-xl">Deposit</button>
            <button onclick="withdraw()" class="bg-red-600 text-white p-4 rounded-xl">Withdraw</button>
            <button onclick="send()" class="bg-blue-600 text-white p-4 rounded-xl">Send</button>
        </div>
    </div>
    
    <script>
        let sessionId = '';
        
        async function login() {
            const res = await fetch('/api/user/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.status === 'logged_in') {
                sessionId = data.session_id;
                document.getElementById('login').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                loadChains();
                loadWallets();
            }
        }
        
        async function loadChains() {
            const res = await fetch('/api/user/chains');
            const data = await res.json();
            const sel = document.getElementById('chain');
            Object.entries(data.chains).forEach(([id, c]) => {
                sel.innerHTML += `<option value="${id}">${c.flag || ''} ${c.name} (${c.symbol})</option>`;
            });
        }
        
        async function loadWallets() {
            const res = await fetch('/api/user/wallets', {headers: {'session_id': sessionId}});
            const data = await res.json();
            const container = document.getElementById('wallets');
            container.innerHTML = Object.values(data.wallets || {}).map(w => `
                <div class="bg-gray-700 p-4 rounded-lg">
                    <p class="text-yellow-500 font-bold">${w.chain.toUpperCase()}</p>
                    <p class="text-gray-400 text-sm font-mono">${(w.address || '').substring(0, 20)}...</p>
                    <p class="text-white mt-1">${Object.entries(w.balance || {}).map(([t,a]) => a.toFixed(4)+' '+t).join(', ') || '0.0000'}</p>
                </div>
            `).join('');
        }
        
        async function createWallet() {
            const chain = document.getElementById('chain').value;
            await fetch('/api/user/wallet', {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'session_id': sessionId},
                body: JSON.stringify({chain})
            });
            loadWallets();
        }
        
        function deposit() { alert('Use wallet address to deposit'); }
        function withdraw() { alert('Withdraw flow'); }
        function send() { alert('Send flow'); }
    </script>
</body>
</html>
