<!DOCTYPE html><html><head><title>Blockchain Admin</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-900 min-h-screen p-6">
<h1 class="text-3xl font-bold text-yellow-500 mb-6"><i class="fas fa-cubes"></i> Blockchain Admin</h1>
<div class="grid grid-cols-4 gap-4 mb-6">
<div class="bg-gray-800 p-4 rounded-xl"><p class="text-gray-400">Chains</p><p class="text-2xl font-bold text-white" id="chains">-</p></div>
<div class="bg-gray-800 p-4 rounded-xl"><p class="text-gray-400">Blocks</p><p class="text-2xl font-bold text-white" id="blocks">-</p></div>
<div class="bg-gray-800 p-4 rounded-xl"><p class="text-gray-400">Transactions</p><p class="text-2xl font-bold text-white" id="txs">-</p></div>
<div class="bg-gray-800 p-4 rounded-xl"><p class="text-gray-400">Validators</p><p class="text-2xl font-bold text-white" id="validators">-</p></div>
</div>
<div class="bg-gray-800 p-4 rounded-xl mb-4">
<h2 class="text-white font-bold mb-4">Create Chain</h2>
<input id="chain_id" placeholder="Chain ID" class="bg-gray-700 px-3 py-2 rounded text-white mr-2">
<input id="chain_name" placeholder="Name" class="bg-gray-700 px-3 py-2 rounded text-white mr-2">
<input id="chain_symbol" placeholder="Symbol" class="bg-gray-700 px-3 py-2 rounded text-white mr-2">
<select id="chain_type" class="bg-gray-700 px-3 py-2 rounded text-white mr-2">
<option value="evm">EVM</option><option value="non-evm">Non-EVM</option>
</select>
<button onclick="createChain()" class="bg-yellow-500 px-4 py-2 rounded text-gray-900 font-bold">Create</button>
</div>
<div class="bg-gray-800 p-4 rounded-xl">
<h2 class="text-white font-bold mb-4">Blocks</h2>
<div id="blocks-list" class="space-y-2"></div>
</div>
<script>
async function loadStats(){const r=await fetch('/api/admin/stats');const d=await r.json();document.getElementById('chains').innerText=d.chains;document.getElementById('blocks').innerText=d.total_blocks;document.getElementById('txs').innerText=d.total_txs;document.getElementById('validators').innerText=d.validators;}
async function createChain(){await fetch('/api/admin/chain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chain_id:document.getElementById('chain_id').value,name:document.getElementById('chain_name').value,symbol:document.getElementById('chain_symbol').value,type:document.getElementById('chain_type').value})});loadStats();}
loadStats();
</script></body></html>
