<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - SERVICE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <h1 class="text-4xl font-bold text-yellow-500 text-center">🐯 TigerEx - SERVICE</h1>
        
        <!-- Login -->
        <div id="login" class="max-w-md mx-auto mt-8 bg-gray-800 rounded-xl p-6">
            <h2 class="text-2xl font-bold text-white mb-4">Login / Register</h2>
            
            <!-- Social Login -->
            <div class="flex gap-2 mb-4 justify-center">
                <button onclick="socialLogin('google')" class="w-12 h-12 bg-red-500 rounded-full text-white">G</button>
                <button onclick="socialLogin('facebook')" class="w-12 h-12 bg-blue-600 rounded-full text-white">f</button>
                <button onclick="socialLogin('apple')" class="w-12 h-12 bg-gray-700 rounded-full text-white">🍎</button>
            </div>
            
            <input type="email" id="email" placeholder="Email" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white mb-3">
            <input type="password" id="password" placeholder="Password" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white mb-3">
            <button onclick="login()" class="w-full bg-yellow-500 text-gray-900 font-bold py-3 rounded-lg">Login</button>
        </div>
        
        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="bg-gray-800 rounded-xl p-6 mt-8">
                <h2 class="text-2xl font-bold text-white mb-4">My Account</h2>
                <div class="space-y-3">
                    <div class="bg-gray-700 p-4 rounded-lg"><p class="text-yellow-500">Wallets</p></div>
                    <div class="bg-gray-700 p-4 rounded-lg"><p class="text-yellow-500">Transactions</p></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bind Email/Phone Modal -->
    <div id="bind-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-gray-800 rounded-xl p-6 max-w-md">
            <h3 class="text-xl font-bold text-white mb-4">Bind Email & Phone</h3>
            <input type="email" id="bind-email" placeholder="Email" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white mb-3">
            <input type="tel" id="bind-phone" placeholder="Phone" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white mb-3">
            <button onclick="submitBind()" class="w-full bg-yellow-500 text-gray-900 font-bold py-3 rounded-lg">Submit</button>
        </div>
    </div>
    
    <script>
        function socialLogin(provider) {
            document.getElementById('bind-modal').classList.remove('hidden');
        }
        
        function login() {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
        
        function submitBind() {
            document.getElementById('bind-modal').classList.add('hidden');
            login();
        }
    </script>
</body>
</html>
