<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Professional Trading Platform</title>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Web3 & Ethers -->
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    
    <!-- Charting -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d4aa;
            --primary-dark: #00b894;
            --secondary: #1a1a2e;
            --dark: #0b0e14;
            --dark-2: #151a2e;
            --light: #eaeaea;
            --success: #00c087;
            --danger: #f6465d;
            --warning: #f0b90b;
            --info: #0fb5ee;
            --border: #2a2e3f;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        /* Navbar */
        .navbar-tigerex {
            background: linear-gradient(180deg, rgba(26,26,46,0.98) 0%, rgba(11,14,20,0.98) 100%);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
        }
        
        .navbar-brand {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, #00f5d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-menu-item {
            padding: 20px 16px;
            color: #8b8b8b;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        
        .nav-menu-item:hover, .nav-menu-item.active {
            color: var(--light);
        }
        
        .nav-menu-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 16px;
            height: 2px;
            background: var(--primary);
        }
        
        /* Search */
        .search-box {
            background: var(--dark-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-box input {
            background: transparent;
            border: none;
            color: var(--light);
            width: 200px;
            outline: none;
        }
        
        /* Buttons */
        .btn-connect {
            background: linear-gradient(135deg, #627eea 0%, var(--primary) 100%);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(98, 126, 234, 0.4);
        }
        
        .btn-buy {
            background: var(--success);
            border: none;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-sell {
            background: var(--danger);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        /* Ticker */
        .ticker-wrap {
            background: linear-gradient(90deg, var(--primary) 0%, #00b894 100%);
            overflow: hidden;
            height: 40px;
            display: flex;
            align-items: center;
        }
        
        .ticker-content {
            display: flex;
            animation: ticker 30s linear infinite;
            white-space: nowrap;
        }
        
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 24px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .ticker-item .symbol { font-weight: 700; color: #000; }
        .ticker-item .price { color: #000; }
        
        /* Cards */
        .card-panel {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .card-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--light);
        }
        
        /* Order Book */
        .orderbook-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 16px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            position: relative;
        }
        
        .orderbook-row .price-up { color: var(--success); }
        .orderbook-row .price-down { color: var(--danger); }
        
        .depth-bar {
            position: absolute;
            top: 0;
            bottom: 0;
            opacity: 0.15;
            transition: width 0.3s;
        }
        
        /* Trading Form */
        .order-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        
        .order-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .order-tab.buy { color: var(--success); }
        .order-tab.sell { color: var(--danger); }
        .order-tab.active { border-bottom: 2px solid; }
        
        .order-input {
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--light);
            width: 100%;
            font-size: 14px;
        }
        
        .order-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .percent-btns {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        
        .percent-btn {
            flex: 1;
            padding: 8px;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: #8b8b8b;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .percent-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* Market List */
        .market-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .market-item:hover { background: rgba(0,212,170,0.05); }
        .market-item.active { background: rgba(0,212,170,0.1); }
        
        /* Price Up/Down */
        .price-up { color: var(--success) !important; }
        .price-down { color: var(--danger) !important; }
        
        /* Status */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        
        .status-connected { background: var(--success); }
        .status-disconnected { background: var(--danger); }
        
        /* Loading */
        .loading-wave {
            display: flex;
            gap: 4px;
            padding: 20px;
            justify-content: center;
        }
        
        .loading-wave span {
            width: 4px;
            height: 20px;
            background: var(--primary);
            animation: wave 1s ease-in-out infinite;
        }
        
        .loading-wave span:nth-child(2) { animation-delay: 0.1s; }
        .loading-wave span:nth-child(3) { animation-delay: 0.2s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .sidebar-left { display: none; }
        }
        
        @media (max-width: 768px) {
            .navbar-tigerex { padding: 0 12px; }
            .search-box { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        // ==================== API CONFIG ====================
        const API = {
            production: 'http://localhost:5300',
            price: 'http://localhost:5200',
            wallet: 'http://localhost:6000',
            exchange: 'http://localhost:5900',
            blockchain: 'http://localhost:5800'
        };
        
        // ==================== UTILITY FUNCTIONS ====================
        const apiCall = async (service, endpoint, options = {}) => {
            try {
                const res = await fetch(`${API[service]}${endpoint}`, {
                    ...options,
                    headers: { 'Content-Type': 'application/json', ...options.headers }
                });
                return await res.json();
            } catch (e) { return { error: e.message }; }
        };
        
        const formatNumber = (num, decimals = 2) => {
            if (num >= 1e9) return (num / 1e9).toFixed(decimals) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(decimals) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(decimals) + 'K';
            return num.toFixed(decimals);
        };
        
        const formatPrice = (price) => {
            if (price >= 1000) return price.toFixed(2);
            if (price >= 1) return price.toFixed(4);
            return price.toFixed(6);
        };
        
        // ==================== WEB3 HOOK ====================
        const useWeb3 = () => {
            const [web3, setWeb3] = useState(null);
            const [account, setAccount] = useState(null);
            const [chainId, setChainId] = useState(null);
            const [balance, setBalance] = useState(null);
            const [connected, setConnected] = useState(false);
            
            const connect = useCallback(async () => {
                if (window.ethereum) {
                    try {
                        const web3Instance = new Web3(window.ethereum);
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        
                        if (accounts[0]) {
                            setWeb3(web3Instance);
                            setAccount(accounts[0]);
                            setConnected(true);
                            
                            const chain = await web3Instance.eth.getChainId();
                            setChainId(chain);
                            
                            const bal = await web3Instance.eth.getBalance(accounts[0]);
                            setBalance(web3Instance.utils.fromWei(bal));
                            
                            window.ethereum.on('accountsChanged', (accs) => {
                                setAccount(accs[0] || null);
                                if (!accs[0]) setConnected(false);
                            });
                            
                            window.ethereum.on('chainChanged', (c) => setChainId(c));
                        }
                    } catch (err) { console.error(err); }
                }
            }, []);
            
            const disconnect = useCallback(() => {
                setWeb3(null);
                setAccount(null);
                setChainId(null);
                setBalance(null);
                setConnected(false);
            }, []);
            
            return { web3, account, chainId, balance, connected, connect, disconnect };
        };
        
        // ==================== TICKER COMPONENT ====================
        const TickerTape = () => {
            const [tickers, setTickers] = useState([]);
            
            useEffect(() => {
                // Simulated real-time ticker (connect to price API in production)
                const symbols = [
                    { s: 'BTCUSDT', p: 45000 + Math.random() * 500, c: 2.5 },
                    { s: 'ETHUSDT', p: 2800 + Math.random() * 50, c: 1.8 },
                    { s: 'BNBUSDT', p: 280 + Math.random() * 10, c: 3.2 },
                    { s: 'SOLUSDT', p: 95 + Math.random() * 5, c: 5.5 },
                    { s: 'TIGUSDC', p: 2.5 + Math.random() * 0.1, c: 4.2 },
                    { s: 'MATICUSDT', p: 0.85 + Math.random() * 0.05, c: -1.5 },
                    { s: 'AVAXUSDT', p: 35 + Math.random() * 2, c: 2.8 },
                    { s: 'DOTUSDT', p: 7 + Math.random() * 0.5, c: 1.2 }
                ];
                setTickers(symbols);
                
                const interval = setInterval(() => {
                    setTickers(prev => prev.map(t => ({
                        ...t,
                        p: t.p * (0.999 + Math.random() * 0.002),
                        c: t.c + (Math.random() - 0.5) * 0.5
                    })));
                }, 2000);
                
                return () => clearInterval(interval);
            }, []);
            
            const duplicated = [...tickers, ...tickers];
            
            return (
                <div className="ticker-wrap">
                    <div className="ticker-content">
                        {duplicated.map((t, i) => (
                            <div key={i} className="ticker-item">
                                <span className="symbol">{t.s.replace('USDT', '').replace('USDC', '/USDC')}</span>
                                <span className="price">${formatPrice(t.p)}</span>
                                <span style={{color: t.c >= 0 ? '#000' : '#d00'}}>
                                    {t.c >= 0 ? '+' : ''}{t.c.toFixed(2)}%
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // ==================== ORDER BOOK COMPONENT ====================
        const OrderBook = ({ symbol }) => {
            const [bids, setBids] = useState([]);
            const [asks, setAsks] = useState([]);
            
            useEffect(() => {
                const base = symbol === 'BTCUSDT' ? 45000 : symbol === 'ETHUSDT' ? 2800 : 2.5;
                
                const generate = () => {
                    const newBids = [];
                    const newAsks = [];
                    
                    for (let i = 0; i < 15; i++) {
                        newBids.push({
                            price: base - i * base * 0.001,
                            qty: Math.random() * 10 + 1
                        });
                        newAsks.push({
                            price: base + i * base * 0.001 * 0.5,
                            qty: Math.random() * 10 + 1
                        });
                    }
                    
                    setBids(newBids);
                    setAsks(newAsks.slice().reverse());
                };
                
                generate();
                const interval = setInterval(generate, 1000);
                return () => clearInterval(interval);
            }, [symbol]);
            
            const maxBid = Math.max(...bids.map(b => b.qty), 1);
            const maxAsk = Math.max(...asks.map(a => a.qty), 1);
            
            return (
                <div className="card-panel" style={{height: '420px'}}>
                    <div className="card-header">
                        <span className="card-title">Order Book</span>
                    </div>
                    <div style={{padding: '8px 0'}}>
                        <div className="orderbook-row" style={{color: '#8b8b8b', fontSize: '12px'}}>
                            <span>Price</span>
                            <span>Amount</span>
                        </div>
                        {asks.map((a, i) => (
                            <div key={i} className="orderbook-row">
                                <span className="price-down">{formatPrice(a.price)}</span>
                                <span>{a.qty.toFixed(4)}</span>
                                <div className="depth-bar price-down" style={{right: 0, width: `${(a.qty/maxAsk)*100}%`}}></div>
                            </div>
                        ))}
                        <div className="orderbook-row" style={{background: 'var(--dark)', padding: '8px 16px'}}>
                            <span className="price-up" style={{fontWeight: '700'}}>
                                {formatPrice(bids[0]?.price || 0)}
                            </span>
                        </div>
                        {bids.map((b, i) => (
                            <div key={i} className="orderbook-row">
                                <span className="price-up">{formatPrice(b.price)}</span>
                                <span>{b.qty.toFixed(4)}</span>
                                <div className="depth-bar price-up" style={{right: 0, width: `${(b.qty/maxBid)*100}%`}}></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // ==================== PRICE CHART ====================
        const PriceChart = ({ symbol }) => {
            const chartRef = useRef(null);
            
            useEffect(() => {
                if (!chartRef.current) return;
                
                const base = symbol === 'BTCUSDT' ? 45000 : symbol === 'ETHUSDT' ? 2800 : 2.5;
                const labels = Array.from({length: 50}, (_, i) => 
                    new Date(Date.now() - (49 - i) * 60000).toLocaleTimeString()
                );
                const data = Array.from({length: 50}, () => base * (0.98 + Math.random() * 0.04));
                
                const ctx = chartRef.current.getContext('2d');
                
                if (window.priceChart) window.priceChart.destroy();
                
                window.priceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            borderColor: '#00d4aa',
                            backgroundColor: 'rgba(0, 212, 170, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false },
                            y: { 
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#8b8b8b' }
                            }
                        },
                        interaction: { intersect: false, mode: 'index' }
                    }
                });
                
                const update = setInterval(() => {
                    if (window.priceChart) {
                        const newData = [...window.priceChart.data.datasets[0].data.slice(1)];
                        newData.push(base * (0.99 + Math.random() * 0.02));
                        window.priceChart.data.datasets[0].data = newData;
                        window.priceChart.update('none');
                    }
                }, 3000);
                
                return () => { clearInterval(update); };
            }, [symbol]);
            
            return (
                <div className="card-panel" style={{height: '300px'}}>
                    <div className="card-header">
                        <span className="card-title">{symbol.replace('USDT', '')}/USDT</span>
                        <div style={{display: 'flex', gap: '8px'}}>
                            {['1H', '4H', '1D', '1W'].map(t => (
                                <span key={t} style={{padding: '4px 8px', background: 'var(--dark)', borderRadius: '4px', fontSize: '12px', cursor: 'pointer'}}>
                                    {t}
                                </span>
                            ))}
                        </div>
                    </div>
                    <div style={{padding: '16px', height: '250px'}}>
                        <canvas ref={chartRef}></canvas>
                    </div>
                </div>
            );
        };
        
        // ==================== TRADING FORM ====================
        const TradingForm = ({ symbol, web3, account, connected }) => {
            const [side, setSide] = useState('buy');
            const [orderType, setOrderType] = useState('limit');
            const [price, setPrice] = useState('');
            const [amount, setAmount] = useState('');
            const [orders, setOrders] = useState([]);
            
            const total = price && amount ? (parseFloat(price) * parseFloat(amount)).toFixed(2) : '0.00';
            
            const placeOrder = async () => {
                if (!connected) { alert('Please connect wallet first!'); return; }
                if (!price || !amount) { alert('Enter price and amount!'); return; }
                
                const newOrder = {
                    id: 'ORD' + Date.now(),
                    symbol: symbol,
                    side: side,
                    price: parseFloat(price),
                    amount: parseFloat(amount),
                    filled: 0,
                    status: 'Open',
                    time: new Date().toLocaleTimeString()
                };
                
                setOrders(prev => [newOrder, ...prev].slice(0, 10));
                setPrice('');
                setAmount('');
                alert(`${side.toUpperCase()} order placed!`);
            };
            
            return (
                <div className="card-panel">
                    <div className="order-tabs">
                        <div className={`order-tab buy ${side === 'buy' ? 'active' : ''}`} 
                             onClick={() => setSide('buy')} style={{borderBottomColor: side === 'buy' ? 'var(--success)' : 'transparent'}}>
                            Buy
                        </div>
                        <div className={`order-tab sell ${side === 'sell' ? 'active' : ''}`}
                             onClick={() => setSide('sell')} style={{borderBottomColor: side === 'sell' ? 'var(--danger)' : 'transparent'}}>
                            Sell
                        </div>
                    </div>
                    
                    <div style={{padding: '16px'}}>
                        <div className="mb-3">
                            <select className="order-input" value={orderType} onChange={e => setOrderType(e.target.value)}>
                                <option value="limit">Limit</option>
                                <option value="market">Market</option>
                                <option value="stop_limit">Stop-Limit</option>
                            </select>
                        </div>
                        
                        {orderType !== 'market' && orderType !== 'stop_limit' && (
                            <div className="mb-3">
                                <input type="number" className="order-input" placeholder="Price" value={price} onChange={e => setPrice(e.target.value)} />
                            </div>
                        )}
                        
                        <div className="mb-3">
                            <input type="number" className="order-input" placeholder="Amount" value={amount} onChange={e => setAmount(e.target.value)} />
                        </div>
                        
                        <div className="percent-btns">
                            {[25, 50, 75, 100].map(p => (
                                <button key={p} className="percent-btn" onClick={() => setAmount((side === 'buy' ? 10000 : 10) * p / 100)}>
                                    {p}%
                                </button>
                            ))}
                        </div>
                        
                        <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '16px', color: '#8b8b8b', fontSize: '13px'}}>
                            <span>Total</span>
                            <span>${total}</span>
                        </div>
                        
                        <button className={`btn w-100 ${side === 'buy' ? 'btn-buy' : 'btn-sell'}`} onClick={placeOrder}>
                            {connected ? `${side === 'buy' ? 'Buy' : 'Sell'} ${symbol.replace('USDT', '')}` : 'Connect Wallet'}
                        </button>
                        
                        {orders.length > 0 && (
                            <div style={{marginTop: '16px', borderTop: '1px solid var(--border)', paddingTop: '12px'}}>
                                <div style={{fontSize: '12px', color: '#8b8b8b', marginBottom: '8px'}}>Open Orders</div>
                                {orders.map((o, i) => (
                                    <div key={i} style={{display: 'flex', justifyContent: 'space-between', fontSize: '12px', padding: '4px 0'}}>
                                        <span className={o.side === 'buy' ? 'price-up' : 'price-down'}>{o.side.toUpperCase()}</span>
                                        <span>{o.price} × {o.amount}</span>
                                        <span className="badge bg-secondary">{o.status}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        // ==================== MARKET LIST ====================
        const MarketList = ({ onSelect, active }) => {
            const [markets, setMarkets] = useState([
                { s: 'BTCUSDT', p: 45000, c: 2.5, v: 1250000000 },
                { s: 'ETHUSDT', p: 2800, c: 1.8, v: 890000000 },
                { s: 'BNBUSDT', p: 280, c: 3.2, v: 450000000 },
                { s: 'TIGUSDC', p: 2.5, c: 4.2, v: 25000000 },
                { s: 'SOLUSDT', p: 95, c: 5.5, v: 180000000 },
                { s: 'MATICUSDT', p: 0.85, c: -1.5, v: 95000000 }
            ]);
            
            useEffect(() => {
                const update = setInterval(() => {
                    setMarkets(prev => prev.map(m => ({
                        ...m,
                        p: m.p * (0.999 + Math.random() * 0.002),
                        c: m.c + (Math.random() - 0.5) * 0.5
                    })));
                }, 3000);
                return () => clearInterval(update);
            }, []);
            
            return (
                <div className="card-panel">
                    <div className="card-header">
                        <span className="card-title">Markets</span>
                    </div>
                    <div style={{maxHeight: '400px', overflow: 'auto'}}>
                        {markets.map((m, i) => (
                            <div key={i} className={`market-item ${active === m.s ? 'active' : ''}`} onClick={() => onSelect(m.s)}>
                                <div>
                                    <div style={{fontWeight: '600'}}>{m.s.replace('USDT', '').replace('USDC', '/USDC')}</div>
                                    <div style={{fontSize: '12px', color: '#8b8b8b'}}>Vol: ${formatNumber(m.v)}</div>
                                </div>
                                <div style={{textAlign: 'right'}}>
                                    <div style={{fontWeight: '600'}}>${formatPrice(m.p)}</div>
                                    <div className={m.c >= 0 ? 'price-up' : 'price-down'} style={{fontSize: '12px'}}>
                                        {m.c >= 0 ? '+' : ''}{m.c.toFixed(2)}%
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // ==================== WALLET COMPONENT ====================
        const Wallet = ({ web3, account, connected, balance }) => {
            const [balances, setBalances] = useState([
                { asset: 'USDT', balance: 12500.50 },
                { asset: 'BTC', balance: 1.25 },
                { asset: 'ETH', balance: 8.5 },
                { asset: 'TIG', balance: 2500 }
            ]);
            
            return (
                <div className="row">
                    <div className="col-12">
                        <div className="card-panel p-3">
                            <h5 className="mb-3">My Assets</h5>
                            <div className="table-responsive">
                                <table className="table table-dark">
                                    <thead>
                                        <tr>
                                            <th>Asset</th>
                                            <th>Available</th>
                                            <th>In Orders</th>
                                            <th>USD Value</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {balances.map((b, i) => (
                                            <tr key={i}>
                                                <td><strong>{b.asset}</strong></td>
                                                <td>{b.balance.toFixed(4)}</td>
                                                <td>0.0000</td>
                                                <td>${(b.balance * (b.asset === 'USDT' ? 1 : b.asset === 'BTC' ? 45000 : b.asset === 'ETH' ? 2800 : 2.5)).toFixed(2)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        // ==================== MAIN APP ====================
        const App = () => {
            const [page, setPage] = useState('trade');
            const [symbol, setSymbol] = useState('BTCUSDT');
            const { web3, account, chainId, balance, connected, connect, disconnect } = useWeb3();
            
            const menuItems = [
                { id: 'trade', icon: 'bi-graph-up', label: 'Trade' },
                { id: 'wallet', icon: 'bi-wallet2', label: 'Wallet' },
                { id: 'history', icon: 'bi-clock-history', label: 'History' },
                { id: 'earn', icon: 'bi-cash-stack', label: 'Earn' },
                { id: 'convert', icon: 'bi-arrow-repeat', label: 'Convert' }
            ];
            
            return (
                <div>
                    {/* Ticker */}
                    <TickerTape />
                    
                    {/* Navbar */}
                    <nav className="navbar-tigerex d-flex align-items-center justify-content-between">
                        <div className="d-flex align-items-center">
                            <span className="navbar-brand me-4">
                                <i className="bi bi-gem me-2"></i>TigerEx
                            </span>
                            
                            {menuItems.map(m => (
                                <div key={m.id} className={`nav-menu-item ${page === m.id ? 'active' : ''}`} onClick={() => setPage(m.id)}>
                                    <i className={`bi ${m.icon} me-1`}></i>{m.label}
                                </div>
                            ))}
                        </div>
                        
                        <div className="d-flex align-items-center gap-3">
                            <div className="search-box">
                                <i className="bi bi-search" style={{color: '#8b8b8b'}}></i>
                                <input type="text" placeholder="Search markets..." />
                            </div>
                            
                            <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
                                <span className={`status-dot ${connected ? 'status-connected' : 'status-disconnected'}`}></span>
                                <span style={{fontSize: '12px', color: '#8b8b8b'}}>
                                    {connected ? 'Connected' : 'Disconnected'}
                                </span>
                            </div>
                            
                            {connected ? (
                                <button className="btn-connect" onClick={disconnect}>
                                    {account?.substring(0, 6)}...{account?.substring(38)}
                                </button>
                            ) : (
                                <button className="btn-connect" onClick={connect}>
                                    <i className="bi bi-wallet2 me-2"></i>Connect
                                </button>
                            )}
                        </div>
                    </nav>
                    
                    {/* Main Content */}
                    <div className="container-fluid p-3">
                        {page === 'trade' ? (
                            <div className="row">
                                {/* Left Sidebar - Markets */}
                                <div className="col-md-2 sidebar-left">
                                    <MarketList active={symbol} onSelect={setSymbol} />
                                </div>
                                
                                {/* Center - Chart & Order Book */}
                                <div className="col-md-7">
                                    <PriceChart symbol={symbol} />
                                    <div className="mt-3">
                                        <OrderBook symbol={symbol} />
                                    </div>
                                </div>
                                
                                {/* Right - Trading Form */}
                                <div className="col-md-3">
                                    <TradingForm symbol={symbol} web3={web3} account={account} connected={connected} />
                                    
                                    <div className="card-panel mt-3 p-3">
                                        <h6 className="mb-3">Recent Trades</h6>
                                        {[
                                            { t: '10:45:23', p: 45123, a: 0.5, s: 'buy' },
                                            { t: '10:44:15', p: 45120, a: 0.25, s: 'sell' },
                                            { t: '10:43:42', p: 45118, a: 1.2, s: 'buy' },
                                            { t: '10:42:30', p: 45115, a: 0.8, s: 'sell' },
                                            { t: '10:41:55', p: 45110, a: 0.3, s: 'buy' }
                                        ].map((trade, i) => (
                                            <div key={i} className="d-flex justify-content-between py-1" style={{fontSize: '12px', borderBottom: '1px solid var(--border)'}}>
                                                <span>{trade.t}</span>
                                                <span className={trade.s === 'buy' ? 'price-up' : 'price-down'}>{trade.p}</span>
                                                <span>{trade.a}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : page === 'wallet' ? (
                            <Wallet web3={web3} account={account} connected={connected} balance={balance} />
                        ) : (
                            <div className="card-panel p-5 text-center">
                                <h4>{page.charAt(0).toUpperCase() + page.slice(1)}</h4>
                                <p className="text-muted">Coming soon...</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        // Render
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
