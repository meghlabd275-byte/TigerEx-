<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - TigerEx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #F0B90B;
            --bg-dark: #0B0B0F;
            --bg-card: #1E1E1E;
        }
        body { background: var(--bg-dark); color: white; min-height: 100vh; min-height: 100dvh; }
        .social-google { background: #4285F4; }
        .social-apple { background: #000; border: 1px solid #333; }
        .social-facebook { background: #1877F2; }
        .social-twitter { background: #1DA1F2; }
        .social-github { background: #333; }
        .social-discord { background: #5865F2; }
        .social-telegram { background: #0088CC; }
        .social-btn { transition: transform 0.2s; }
        .social-btn:hover { transform: scale(1.05); }
        .social-btn:active { transform: scale(0.95); }
        .input-dark { background: #2A2A2A; border: 1px solid #3A3A3A; color: white; }
        .input-dark:focus { border-color: var(--primary); outline: none; }
        .social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
        @media (max-width: 480px) { .social-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 360px) { .social-grid { grid-template-columns: repeat(2, 1fr); } }
        .login-card { width: 100%; max-width: 420px; padding: 1.25rem; }
        @media (min-width: 640px) { .login-card { padding: 2rem; } }
        .title-lg { font-size: 1.5rem; }
        @media (min-width: 640px) { .title-lg { font-size: 2rem; } }
        .touch-target { min-height: 48px; min-width: 48px; }
    /* Light theme */
        body.light {
            --bg-dark: #F5F5F5;
            --bg-card: #FFFFFF;
            --text-dark: #1A1A1A;
        }
        body.light { background: var(--bg-dark); color: var(--text-dark); }
        body.light .bg-\[\#1E1E1E\] { background: var(--bg-card) !important; }
        body.light .bg-\[\#2A2A2A\] { background: #FFFFFF !important; border-color: #E0E0E0; }
        body.light .text-gray-400 { color: #666666; }
        body.light .text-gray-500 { color: #888888; }
        body.light .bg-gray-700 { background: #CCCCCC; }
        body.light .border-gray-700 { border-color: #DDDDDD; }
        body.light .social-github { background: #333; }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6 md:p-8">
    <!-- Theme Toggle Button -->
    <button id="themeToggle" onclick="toggleTheme()" class="fixed top-4 right-4 z-50 p-3 rounded-full bg-[#1E1E1E] hover:bg-[#2A2A2A] transition-all shadow-lg touch-target">

        </svg>

    <div class="login-card">
        <!-- Logo -->
        <div class="text-center mb-6 sm:mb-8">
            <h1 class="title-lg font-bold" style="color: var(--primary)">TigerEx</h1>
            <p class="text-gray-400 mt-2 text-sm sm:text-base">Sign in to your account</p>
        </div>
        
        <!-- Login Card -->

            <form id="loginForm" class="p-4 sm:p-6 space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" 
                           class="input-dark w-full px-4 py-3 rounded-lg touch-target text-base" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" 
                           class="input-dark w-full px-4 py-3 rounded-lg touch-target text-base" required>
                </div>
                <div class="flex items-center justify-between text-xs sm:text-sm">
                    <label class="flex items-center"><input type="checkbox" class="mr-2 w-4 h-4 rounded"><span class="text-gray-400">Remember me</span></label>
                    <a href="/forgot-password" class="text-yellow-500 hover:text-yellow-400">Forgot password?</a>
                </div>
                <button type="submit" class="w-full py-3 rounded-lg font-bold text-black touch-target text-base" style="background: var(--primary)">
                    Sign In
                </button>
            </form>
            
            <!-- Divider -->

                <div class="flex-1 h-px bg-gray-700"></div>
                <span class="px-4 text-gray-500 text-xs sm:text-sm">or continue with</span>

    <script src="../utils/api.js"></script>
    <script>
        // Theme Toggle
        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('themeIconDark').classList.toggle('hidden', !isLight);
            document.getElementById('themeIconLight').classList.toggle('hidden', isLight);
        }
        
        // Load saved theme
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeIconDark').classList.remove('hidden');
                document.getElementById('themeIconLight').classList.add('hidden');
            }
        });
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const response = await API.auth.login(email, password);
                if (response.token) {
                    localStorage.setItem('tigerex_token', response.token);
                    window.location.href = '/';
                }
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });
    </script>
</body>
</html>
