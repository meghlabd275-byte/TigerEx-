<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TigerEx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Dark theme by default */
        :root {
            --primary: #F0B90B;
            --bg-dark: #0B0B0F;
            --bg-card-dark: #1E1E1E;
            --text-dark: #FFFFFF;
            --text-secondary-dark: #A0A0A0;
        }
        
        body { background-color: var(--bg-dark); color: var(--text-dark); }
        
        /* Social Media Brand Colors */
        .social-google { background: #4285F4; }
        .social-apple { background: #000000; border: 1px solid #333; }
        .social-facebook { background: #1877F2; }
        .social-twitter { background: #1DA1F2; }
        .social-github { background: #333333; }
        .social-discord { background: #5865F2; }
        .social-telegram { background: #0088CC; }
        .social-whatsapp { background: #25D366; }
        .social-instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .social-linkedin { background: #0A66C2; }
        .social-reddit { background: #FF4500; }
        
        /* Logo hover effects */
        .social-btn { transition: transform 0.2s, opacity 0.2s; }
        .social-btn:hover { transform: scale(1.05); opacity: 0.9; }
        
        /* Input styling */
        .input-dark {
            background-color: #2A2A2A;
            border: 1px solid #3A3A3A;
            color: white;
        }
        .input-dark:focus {
            border-color: var(--primary);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold" style="color: var(--primary)">TigerEx</h1>
            <p class="text-gray-400 mt-2">Sign in to your account</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-[#1E1E1E] rounded-2xl p-8 shadow-xl">
            <!-- Email Login -->
            <form class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Email</label>
                    <input type="email" placeholder="Enter your email" 
                           class="w-full px-4 py-3 rounded-lg input-dark">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Password</label>
                    <input type="password" placeholder="Enter your password" 
                           class="w-full px-4 py-3 rounded-lg input-dark">
                </div>
                <button type="submit" 
                        class="w-full py-3 rounded-lg font-bold text-black"
                        style="background-color: var(--primary)">
                    Sign In
                </button>
            </form>
            
            <!-- Divider -->
            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-gray-700"></div>
                <span class="px-4 text-gray-500 text-sm">or continue with</span>
                <div class="flex-1 h-px bg-gray-700"></div>
            </div>
            
            <!-- Social Media Login Buttons with Official Logos -->
            <div class="grid grid-cols-4 gap-3">
                <!-- Google -->
                <button class="social-btn social-google py-3 px-2 rounded-lg flex items-center justify-center" title="Continue with Google">

                Don't have an account? 
                <a href="#" class="text-yellow-500 hover:underline">Sign up</a>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            By signing in, you agree to our 
            <a href="#" class="text-yellow-500">Terms</a> and 
            <a href="#" class="text-yellow-500">Privacy Policy</a>
        </p>
    </div>
</body>
</html>
