    <title>Login - TigerEx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        :root { --primary: #F0B90B; --bg-dark: #0B0B0F; --bg-card: #1E1E1E; }
        body { background: var(--bg-dark); color: white; min-height: 100vh; min-height: 100dvh; }
        .input-dark { background: #2A2A2A; border: 1px solid #3A3A3A; color: white; }
        .input-dark:focus { border-color: var(--primary); outline: none; }
        .login-card { width: 100%; max-width: 420px; padding: 1.25rem; }
        @media (min-width: 640px) { .login-card { padding: 2rem; } }
        .title-lg { font-size: 1.5rem; }
        @media (min-width: 640px) { .title-lg { font-size: 2rem; } }
        .touch-target { min-height: 48px; min-width: 48px; }
        /* Toggle Tab */
        .tab-btn { flex: 1; padding: 10px; border-radius: 8px; font-weight: 600; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: #000; }
        .tab-btn:not(.active) { background: #2A2A2A; color: #9CA3AF; }
        /* Light theme */
        body.light { background: #F5F5F5; color: #1A1A1A; }
        body.light .bg-\[\#1E1E1E\] { background: #FFF; }
        body.light .bg-\[\#2A2A2A\] { background: #FFF; border-color: #E0E0E0; }
        body.light .text-gray-400 { color: #666; }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6 md:p-8">

        <svg id="themeIconLight" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1z"/></svg>
    </button>

    <script src="../utils/api.js"></script>
    <script>
        function toggleTheme() {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('themeIconDark').classList.toggle('hidden', !isLight);
            document.getElementById('themeIconLight').classList.toggle('hidden', isLight);
        }

        function switchTab(tab) {
            const emailTab = document.getElementById('emailTab');
            const phoneTab = document.getElementById('phoneTab');
            const emailField = document.getElementById('emailField');
            const phoneField = document.getElementById('phoneField');
            
            if (tab === 'email') {
                emailTab.className = 'tab-btn active';
                phoneTab.className = 'tab-btn';
                emailField.classList.remove('hidden');
                phoneField.classList.add('hidden');
                document.getElementById('email').required = true;
                document.getElementById('phone').required = false;
            } else {
                phoneTab.className = 'tab-btn active';
                emailTab.className = 'tab-btn';
                phoneField.classList.remove('hidden');
                emailField.classList.add('hidden');
                document.getElementById('phone').required = true;
                document.getElementById('email').required = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light');
                document.getElementById('themeIconDark').classList.remove('hidden');
                document.getElementById('themeIconLight').classList.add('hidden');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const isEmail = !document.getElementById('emailField').classList.contains('hidden');
            const loginId = isEmail ? document.getElementById('email').value : 
                document.getElementById('countryCode').value + document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await API.auth.login(loginId, password);
                if (response.token) {
                    localStorage.setItem('tigerex_token', response.token);
                    window.location.href = '../../../trading-dashboard/pages/trade/index.html?symbol=BTCUSDT&mode=spot';
                }
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });
    </script>
    <script src="assets/js/auth-guard.js"></script>
