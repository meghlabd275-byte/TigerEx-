<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Admin Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #f0b90b; --dark: #0b0e11; --card: #1e2329; --text: #eaecef; --text2: #848e9c; --green: #00c087; --red: #f6465d; --border: #2b3139; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--dark); color: var(--text); font-size: 13px; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 20px; height: 100vh; position: fixed; overflow-y: auto; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 700; margin-bottom: 30px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #ff6b6b); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .nav-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 10px; color: var(--text); font-size: 14px; margin-bottom: 4px; cursor: pointer; transition: 0.2s; }
        .nav-item:hover { background: var(--dark); }
        .nav-item.active { background: var(--primary); color: var(--dark); }
        .badge { margin-left: auto; background: var(--red); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-change { font-size: 12px; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null});
            const connect = async () => { if(window.ethereum) { const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'}); if(acc) setS({connected: true, account: acc}); }};
            return {...s, connect};
        };
        
        const StatCard = ({title, value, change, icon}) => (
            <div className="stat-card">
                <div className="d-flex justify-content-between mb-2">
                    <span className="text-muted">{title}</span>
                    <span style={{fontSize: 24}}>{icon}</span>
                </div>
                <div className="stat-value mb-1">{value}</div>
                <div className={change >= 0 ? 'text-up' : 'text-down'}>{change >= 0 ? '+' : ''}{change}%</div>
            </div>
        );
        
        const AdminTable = ({title, data}) => (
            <div className="stat-card mt-4">
                <h5 className="mb-3">{title}</h5>
                <table className="w-100">
                    <thead><tr style={{borderBottom:'1px solid var(--border)',color:'var(--text2)'}}><th className="p-2 text-start">User</th><th className="p-2 text-start">Action</th><th className="p-2 text-start">Date</th><th className="p-2 text-start">Status</th></tr></thead>
                    <tbody>{data.map((d,i)=><tr key={i} style={{borderBottom:'1px solid var(--border)'}}><td className="p-2">{d.user}</td><td className="p-2">{d.action}</td><td className="p-2 text-muted">{d.date}</td><td className="p-2"><span className="badge" style={{background:d.status==='Active'?'var(--green)':'var(--red)',color:'#000'}}>{d.status}</span></td></tr>)}</tbody>
                </table>
            </div>
        );
        
        const App = () => {
            const {connected, account, connect} = useWeb3();
            const [stats, setStats] = useState([
                {t:'Total Users',v:'125,678',c:12.5,ic:'👥'},
                {t:'24h Volume',v:'$2.5B',c:8.2,ic:'📊'},
                {t:'Active Traders',v:'45,234',c:5.6,ic:'🔥'},
                {t:'Revenue',v:'$890K',c:15.3,ic:'💰'},
            ]);
            const [logs, setLogs] = useState([
                {user:'user123',action:'Login',date:'2024-05-02 10:30',status:'Active'},
                {user:'trader999',action:'Withdrawal',date:'2024-05-02 10:28',status:'Pending'},
                {user:'admin1',action:'Settings',date:'2024-05-02 10:25',status:'Active'},
            ]);
            
            useEffect(() => {
                const i = setInterval(() => setStats(s => s.map(x => ({...x, v: x.t.includes('Users') ? (parseInt(x.v.replace(/,/,'')) + Math.floor(Math.random()*10)).toLocaleString() : x.v})) , 5000);
                return () => clearInterval(i);
            }, []);
            
            return (
                <div className="d-flex">
                    <div className="sidebar">
                        <div className="logo">
                            <div className="logo-icon"><i className="bi bi-gem"></i></div>
                            <span>TigerEx</span>
                        </div>
                        {['Dashboard','Users','Trading','Wallets','Analytics','Settings'].map((n,i) => <div key={n} className={`nav-item ${i===0?'active':''}`}><i className={`bi ${['bi-grid','bi-people','bi-graph-up','bi-wallet2','bi-chart-line','bi-gear'][i]}`}></i>{n}</div>)}
                        <div className="nav-title mt-4">System</div>
                        {['Security','API Keys','Logs','Backups'].map((n,i) => <div key={n} className="nav-item"><i className="bi bi-shield-lock"></i>{n}</div>)}
                    </div>
                    <div className="flex-grow-1 p-4" style={{marginLeft:260}}>
                        <div className="d-flex justify-content-between align-items-center mb-4">
                            <h4>Admin Dashboard</h4>
                            <button className="btn" style={{background:'var(--primary)',color:'#000'}} onClick={connected?()=>{}:connect}>{connected ? account?.slice(0,8)+'...' : 'Connect Wallet'}</button>
                        </div>
                        <div className="row g-3 mb-4">
                            {stats.map((s,i) => <div key={i} className="col-md-3"><StatCard title={s.t} value={s.v} change={s.c} icon={s.ic} /></div>)}
                        </div>
                        <AdminTable title="Recent Activity" data={logs} />
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
