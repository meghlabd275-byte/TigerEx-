<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Professional Trading Platform</title>
    
    <!-- React & Web3 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d4aa;
            --primary-dark: #00b894;
            --dark: #0b0e14;
            --dark-2: #161c25;
            --dark-3: #1e2633;
            --light: #eaeaea;
            --light-dim: #8b8b8b;
            --success: #00c087;
            --danger: #f6465d;
            --warning: #f0b90b;
            --border: #2a3140;
            --border-light: #363d4f;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--dark);
            color: var(--light);
            font-size: 12px;
            line-height: 1.5;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark-2); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        /* Navbar */
        .navbar-brand-custom {
            background: linear-gradient(135deg, var(--primary) 0%, #00f5d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 22px;
            font-weight: 700;
        }
        
        .nav-item-custom {
            color: var(--light-dim);
            padding: 22px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .nav-item-custom:hover, .nav-item-custom.active {
            color: var(--light);
        }
        
        .nav-item-custom.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 14px;
            right: 14px;
            height: 2px;
            background: var(--primary);
        }
        
        /* Ticker */
        .ticker-strip {
            background: linear-gradient(90deg, var(--primary) 0%, #00b894 100%);
            height: 32px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }
        
        .ticker-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 20px;
            white-space: nowrap;
            font-size: 12px;
            border-right: 1px solid rgba(0,0,0,0.1);
        }
        
        .ticker-item .symbol { font-weight: 600; color: #000; }
        .ticker-item .price { color: #000; font-weight: 500; }
        
        /* Cards */
        .card-panel {
            background: var(--dark-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .card-header-custom {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            font-size: 13px;
            background: var(--dark-2);
        }
        
        /* Buttons */
        .btn-buy-custom {
            background: var(--success);
            border: none;
            color: #000;
            font-weight: 600;
            border-radius: 4px;
            padding: 10px;
            transition: all 0.2s;
        }
        
        .btn-buy-custom:hover { background: #00d696; }
        
        .btn-sell-custom {
            background: var(--danger);
            border: none;
            color: #fff;
            font-weight: 600;
            border-radius: 4px;
            padding: 10px;
            transition: all 0.2s;
        }
        
        .btn-sell-custom:hover { background: #ff5252; }
        
        .btn-connect-custom {
            background: linear-gradient(135deg, #627eea 0%, var(--primary) 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            border-radius: 6px;
            padding: 8px 16px;
            transition: all 0.3s;
        }
        
        .btn-connect-custom:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(98,126,234,0.3); }
        
        /* Order Book */
        .orderbook-row {
            display: flex;
            padding: 2px 0;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 11px;
            position: relative;
        }
        
        .orderbook-row:hover { background: rgba(255,255,255,0.02); }
        
        .bg-bid {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            background: rgba(0,192,135,0.15);
        }
        
        .bg-ask {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            background: rgba(246,70,93,0.15);
        }
        
        /* Forms */
        .form-control-custom {
            background: var(--dark-3);
            border: 1px solid var(--border-light);
            color: var(--light);
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 13px;
            transition: border 0.2s;
        }
        
        .form-control-custom:focus {
            border-color: var(--primary);
            box-shadow: none;
            outline: none;
        }
        
        .form-control-custom::placeholder { color: var(--light-dim); }
        
        /* Price Colors */
        .text-up { color: var(--success) !important; }
        .text-down { color: var(--danger) !important; }
        
        /* Trading Tabs */
        .order-type-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .order-type-tab.active-buy { border-color: var(--success); color: var(--success); }
        .order-type-tab.active-sell { border-color: var(--danger); color: var(--danger); }
        
        /* Market Tabs */
        .time-tab {
            padding: 4px 10px;
            background: var(--dark-3);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .time-tab:hover, .time-tab.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }
        
        /* Input Group */
        .input-group-addon {
            background: var(--dark-3);
            border: 1px solid var(--border);
            border-left: none;
            padding: 8px 12px;
            color: var(--light-dim);
            border-radius: 0 4px 4px 0;
        }
        
        /* Percent Buttons */
        .pct-btn {
            padding: 6px;
            background: var(--dark-3);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 11px;
            color: var(--light-dim);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .pct-btn:hover { border-color: var(--primary); color: var(--primary); }
        
        /* Market List */
        .market-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .market-item:hover { background: rgba(0,212,170,0.05); }
        
        .market-item.active { background: rgba(0,212,170,0.1); }
        
        /* Status */
        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-connected { background: var(--success); }
        .status-disconnected { background: var(--danger); }
        
        /* Search */
        .search-input {
            background: var(--dark-3);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 8px 12px 8px 36px;
            color: var(--light);
            width: 180px;
            font-size: 12px;
        }
        
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--light-dim);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .d-none-mobile { display: none; }
        }
        
        /* Dropdown */
        .dropdown-custom {
            position: relative;
        }
        
        .dropdown-menu-custom {
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--dark-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 200px;
            z-index: 1000;
            display: none;
        }
        
        .dropdown-custom:hover .dropdown-menu-custom {
            display: block;
        }
        
        /* Table */
        .table-custom {
            width: 100%;
            font-size: 11px;
        }
        
        .table-custom th {
            padding: 8px 12px;
            text-align: left;
            color: var(--light-dim);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        
        .table-custom td {
            padding: 6px 12px;
            border-bottom: 1px solid var(--border);
        }
        
        /* Badge */
        .badge-custom {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
        }
        
        .badge-sell { background: rgba(246,70,93,0.15); color: var(--danger); }
        .badge-buy { background: rgba(0,192,135,0.15); color: var(--success); }
        .badge-oco { background: rgba(99,102,241,0.15); color: #6365f1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        
        // ==================== API CONFIG ====================
        const API = {
            engine: 'http://localhost:5300',
            price: 'http://localhost:5200',
            wallet: 'http://localhost:6000',
            exchange: 'http://localhost:5900',
            blockchain: 'http://localhost:5800'
        };
        
        const apiCall = async (service, path, opts = {}) => {
            try {
                const res = await fetch(`${API[service]}${path}`, {
                    ...opts,
                    headers: { 'Content-Type': 'application/json', ...opts.headers }
                });
                return await res.json();
            } catch (e) { return { error: e.message }; }
        };
        
        // ==================== FORMATTING ====================
        const formatNumber = (num, decimals = 2) => {
            if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
            return num.toFixed(decimals);
        };
        
        const formatPrice = (price) => {
            if (price >= 10000) return price.toFixed(2);
            if (price >= 1000) return price.toFixed(2);
            if (price >= 1) return price.toFixed(4);
            return price.toFixed(6);
        };
        
        // ==================== WEB3 HOOK ====================
        const useWeb3 = () => {
            const [web3, setWeb3] = useState(null);
            const [account, setAccount] = useState(null);
            const [chainId, setChainId] = useState(null);
            const [balance, setBalance] = useState(null);
            const [connected, setConnected] = useState(false);
            
            const connect = useCallback(async () => {
                if (typeof window.ethereum !== 'undefined') {
                    try {
                        const w3 = new Web3(window.ethereum);
                        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                        
                        if (accounts[0]) {
                            setWeb3(w3);
                            setAccount(accounts[0]);
                            setConnected(true);
                            
                            const chain = await w3.eth.getChainId();
                            setChainId(chain);
                            
                            const bal = await w3.eth.getBalance(accounts[0]);
                            setBalance(w3.utils.fromWei(bal));
                            
                            window.ethereum.on('accountsChanged', (a) => {
                                setAccount(a[0] || null);
                                if (!a[0]) setConnected(false);
                            });
                            window.ethereum.on('chainChanged', (c) => setChainId(c));
                        }
                    } catch (err) { console.error(err); }
                }
            }, []);
            
            const disconnect = useCallback(() => {
                setWeb3(null);
                setAccount(null);
                setChainId(null);
                setBalance(null);
                setConnected(false);
            }, []);
            
            return { web3, account, chainId, balance, connected, connect, disconnect };
        };
        
        // ==================== TICKER STRIP ====================
        const TickerStrip = () => {
            const [tickers, setTickers] = useState([]);
            
            useEffect(() => {
                const symbols = [
                    { s: 'BTC/USDT', p: 78440, c: 0.26 },
                    { s: 'ETH/USDT', p: 2310, c: 0.12 },
                    { s: 'BNB/USDT', p: 619, c: -0.23 },
                    { s: 'SOL/USDT', p: 84.17, c: 0.04 },
                    { s: 'XRP/USDT', p: 1.393, c: -0.08 },
                    { s: 'DOGE/USDT', p: 0.108, c: -0.15 },
                    { s: 'ADA/USDT', p: 0.250, c: 0.16 },
                    { s: 'AVAX/USDT', p: 14.52, c: 2.31 }
                ];
                setTickers(symbols);
                
                const update = setInterval(() => {
                    setTickers(prev => prev.map(t => ({
                        ...t,
                        p: t.p * (0.9995 + Math.random() * 0.001),
                        c: t.c + (Math.random() - 0.5) * 0.1
                    })));
                }, 2000);
                
                return () => clearInterval(update);
            }, []);
            
            const items = [...tickers, ...tickers];
            
            return (
                <div className="ticker-strip">
                    <div style={{display: 'flex', animation: 'scroll 40s linear infinite'}}>
                        {items.map((t, i) => (
                            <div key={i} className="ticker-item">
                                <span className="symbol">{t.s}</span>
                                <span className="price">${formatPrice(t.p)}</span>
                                <span style={{color: t.c >= 0 ? 'rgba(0,0,0,0.7)' : 'rgba(0,0,0,0.5)'}}>
                                    {t.c >= 0 ? '+' : ''}{t.c.toFixed(2)}%
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // ==================== ORDER BOOK ====================
        const OrderBook = ({ symbol }) => {
            const [bids, setBids] = useState([]);
            const [asks, setAsks] = useState([]);
            
            useEffect(() => {
                const base = symbol === 'BTC/USDT' ? 78440 : symbol === 'ETH/USDT' ? 2310 : 619;
                
                const generate = () => {
                    const newBids = [];
                    const newAsks = [];
                    
                    for (let i = 0; i < 20; i++) {
                        newBids.push({
                            price: base - i * base * 0.0001,
                            amount: Math.random() * 10 + 0.1,
                            total: 0
                        });
                        newAsks.push({
                            price: base + i * base * 0.0001 * 0.5,
                            amount: Math.random() * 10 + 0.1,
                            total: 0
                        });
                    }
                    
                    let bidTotal = 0;
                    for (let b of newBids) { bidTotal += b.amount; b.total = bidTotal; }
                    
                    let askTotal = 0;
                    for (let a of newAsks) { askTotal += a.amount; a.total = askTotal; }
                    
                    setBids(newBids);
                    setAsks(newAsks);
                };
                
                generate();
                const interval = setInterval(generate, 1000);
                return () => clearInterval(interval);
            }, [symbol]);
            
            const maxTotal = Math.max(bids[bids.length-1]?.total || 1, asks[asks.length-1]?.total || 1);
            
            return (
                <div className="card-panel" style={{height: '420px'}}>
                    <div className="card-header-custom d-flex justify-content-between align-items-center">
                        <span>Order Book</span>
                        <span style={{color: 'var(--light-dim)'}}>0.01</span>
                    </div>
                    
                    <div style={{padding: '4px 0', fontSize: '11px', color: 'var(--light-dim)'}}>
                        <div className="d-flex" style={{padding: '0 12px'}}>
                            <span style={{flex: 1}}>Price(USDT)</span>
                            <span style={{flex: 1, textAlign: 'right'}}>Amount(BTC)</span>
                            <span style={{flex: 1, textAlign: 'right'}}>Total</span>
                        </div>
                    </div>
                    
                    <div style={{overflow: 'auto', height: '170px'}}>
                        {[...asks].reverse().map((a, i) => (
                            <div key={i} className="orderbook-row" style={{padding: '0 12px'}}>
                                <span className="text-down" style={{flex: 1, position: 'relative', zIndex: 1}}>
                                    {formatPrice(a.price)}
                                </span>
                                <span style={{flex: 1, textAlign: 'right', zIndex: 1}}>{a.amount.toFixed(5)}</span>
                                <span style={{flex: 1, textAlign: 'right', color: 'var(--light-dim)', zIndex: 1}}>
                                    {a.total.toFixed(5)}
                                </span>
                                <div className="bg-ask" style={{width: `${(a.total/maxTotal)*100}%`}}></div>
                            </div>
                        ))}
                        
                        <div style={{padding: '8px 12px', background: 'var(--dark-3)', borderTop: '1px solid var(--border)', borderBottom: '1px solid var(--border)'}}>
                            <span className="text-up" style={{fontWeight: '600', fontSize: '14px'}}>
                                {formatPrice(bids[0]?.price || 0)}
                            </span>
                        </div>
                        
                        {bids.map((b, i) => (
                            <div key={i} className="orderbook-row" style={{padding: '0 12px'}}>
                                <span className="text-up" style={{flex: 1, position: 'relative', zIndex: 1}}>
                                    {formatPrice(b.price)}
                                </span>
                                <span style={{flex: 1, textAlign: 'right', zIndex: 1}}>{b.amount.toFixed(5)}</span>
                                <span style={{flex: 1, textAlign: 'right', color: 'var(--light-dim)', zIndex: 1}}>
                                    {b.total.toFixed(5)}
                                </span>
                                <div className="bg-bid" style={{width: `${(b.total/maxTotal)*100}%`}}></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // ==================== PRICE CHART ====================
        const PriceChart = ({ symbol }) => {
            const canvasRef = useRef(null);
            const chartRef = useRef(null);
            
            useEffect(() => {
                if (!canvasRef.current) return;
                
                const base = symbol === 'BTC/USDT' ? 78440 : symbol === 'ETH/USDT' ? 2310 : 619;
                const labels = Array.from({length: 60}, (_, i) => {
                    const d = new Date(Date.now() - (59 - i) * 60000);
                    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                });
                const data = Array.from({length: 60}, () => base * (0.995 + Math.random() * 0.01));
                
                const ctx = canvasRef.current.getContext('2d');
                
                if (chartRef.current) chartRef.current.destroy();
                
                chartRef.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            borderColor: '#00d4aa',
                            backgroundColor: (context) => {
                                const ctx = context.chart.ctx;
                                const gradient = ctx.createLinearGradient(0, 0, 0, 250);
                                gradient.addColorStop(0, 'rgba(0,212,170,0.2)');
                                gradient.addColorStop(1, 'rgba(0,212,170,0)');
                                return gradient;
                            },
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false },
                            y: {
                                grid: { color: 'rgba(255,255,255,0.05)' },
                                ticks: { color: '#8b8b8b', font: {size: 10} }
                            }
                        },
                        interaction: { intersect: false, mode: 'index' }
                    }
                });
                
                const update = setInterval(() => {
                    if (chartRef.current) {
                        const newD = [...chartRef.current.data.datasets[0].data.slice(1)];
                        newD.push(base * (0.998 + Math.random() * 0.004));
                        chartRef.current.data.datasets[0].data = newD;
                        chartRef.current.update('none');
                    }
                }, 3000);
                
                return () => clearInterval(update);
            }, [symbol]);
            
            return (
                <div className="card-panel" style={{height: '320px'}}>
                    <div className="card-header-custom d-flex justify-content-between align-items-center">
                        <div>
                            <span style={{fontWeight: '700', fontSize: '18px', marginRight: '8px'}}>
                                {symbol}
                            </span>
                            <span style={{color: 'var(--success)'}}>$78,440.40</span>
                        </div>
                        <div style={{display: 'flex', gap: '4px'}}>
                            {['1m', '5m', '15m', '1H', '4H', '1D'].map(t => (
                                <span key={t} className="time-tab">{t}</span>
                            ))}
                        </div>
                    </div>
                    <div style={{height: '270px', padding: '12px'}}>
                        <canvas ref={canvasRef}></canvas>
                    </div>
                </div>
            );
        };
        
        // ==================== TRADING FORM ====================
        const TradingForm = ({ symbol, web3, account, connected }) => {
            const [side, setSide] = useState('buy');
            const [orderType, setOrderType] = useState('limit');
            const [price, setPrice] = useState('');
            const [amount, setAmount] = useState('');
            const [orders, setOrders] = useState([]);
            const [trades, setTrades] = useState([]);
            
            useEffect(() => {
                // Recent trades simulation
                const t = [];
                for (let i = 0; i < 15; i++) {
                    t.push({
                        price: 78440 + (Math.random() - 0.5) * 10,
                        amount: Math.random() * 2,
                        time: new Date().toLocaleTimeString(),
                        side: Math.random() > 0.5 ? 'buy' : 'sell'
                    });
                }
                setTrades(t);
                
                const update = setInterval(() => {
                    setTrades(prev => {
                        const n = [...prev.slice(1)];
                        n.push({
                            price: 78440 + (Math.random() - 0.5) * 10,
                            amount: Math.random() * 2,
                            time: new Date().toLocaleTimeString(),
                            side: Math.random() > 0.5 ? 'buy' : 'sell'
                        });
                        return n;
                    });
                }, 2000);
                
                return () => clearInterval(update);
            }, [symbol]);
            
            const total = price && amount ? (parseFloat(price) * parseFloat(amount)).toFixed(2) : '0.00';
            
            const placeOrder = async () => {
                if (!connected) {
                    alert('Please connect your wallet first!');
                    return;
                }
                if (!price || !amount) {
                    alert('Please enter price and amount');
                    return;
                }
                
                const newOrder = {
                    id: 'ORD' + Date.now().toString().slice(-6),
                    symbol: symbol,
                    side: side,
                    type: orderType,
                    price: parseFloat(price),
                    amount: parseFloat(amount),
                    filled: 0,
                    status: 'Open',
                    time: new Date().toLocaleTimeString()
                };
                
                setOrders(prev => [newOrder, ...prev].slice(0, 10));
            };
            
            const setPercent = (p) => {
                const maxAmt = side === 'buy' ? 10000 : 10;
                setAmount((maxAmt * p / 100).toFixed(5));
            };
            
            return (
                <div className="card-panel">
                    <div className="d-flex" style={{borderBottom: '1px solid var(--border)'}}>
                        <div className={`order-type-tab ${side === 'buy' ? 'active-buy' : ''}`} 
                             onClick={() => setSide('buy')}>Buy</div>
                        <div className={`order-type-tab ${side === 'sell' ? 'active-sell' : ''}`}
                             onClick={() => setSide('sell')}>Sell</div>
                    </div>
                    
                    <div style={{padding: '16px'}}>
                        <div className="mb-3">
                            <select className="form-control-custom" style={{width: '100%'}} 
                                    value={orderType} onChange={e => setOrderType(e.target.value)}>
                                <option value="limit">Limit</option>
                                <option value="market">Market</option>
                                <option value="stop_limit">Stop-Limit</option>
                                <option value="oco">OCO</option>
                            </select>
                        </div>
                        
                        {orderType !== 'market' && (
                            <div className="mb-3">
                                <div className="input-group">
                                    <input type="number" className="form-control-custom" 
                                           style={{borderRight: 'none', flex: 1}}
                                           placeholder="Price" value={price} onChange={e => setPrice(e.target.value)} />
                                    <span className="input-group-addon">USDT</span>
                                </div>
                            </div>
                        )}
                        
                        <div className="mb-3">
                            <div className="input-group">
                                <input type="number" className="form-control-custom" 
                                       style={{borderRight: 'none', flex: 1}}
                                       placeholder="Amount" value={amount} onChange={e => setAmount(e.target.value)} />
                                <span className="input-group-addon">BTC</span>
                            </div>
                        </div>
                        
                        <div className="d-flex gap-2 mb-3">
                            {[25, 50, 75, 100].map(p => (
                                <button key={p} className="pct-btn flex-grow-1" onClick={() => setPercent(p)}>
                                    {p}%
                                </button>
                            ))}
                        </div>
                        
                        <div className="d-flex justify-content-between mb-3" style={{color: 'var(--light-dim)', fontSize: '11px'}}>
                            <span>Total</span>
                            <span>{total} USDT</span>
                        </div>
                        
                        <button className={`w-100 ${side === 'buy' ? 'btn-buy-custom' : 'btn-sell-custom'}`}
                                onClick={placeOrder} disabled={!connected}>
                            {connected ? `${side === 'buy' ? 'Buy' : 'Sell'} ${symbol.split('/')[0]}` : 'Connect Wallet'}
                        </button>
                        
                        {orders.length > 0 && (
                            <div style={{marginTop: '16px', borderTop: '1px solid var(--border)', paddingTop: '12px'}}>
                                <div style={{fontSize: '11px', color: 'var(--light-dim)', marginBottom: '8px'}}>
                                    Open Orders ({orders.length})
                                </div>
                                {orders.map((o, i) => (
                                    <div key={i} style={{display: 'flex', justifyContent: 'space-between', padding: '4px 0', fontSize: '11px'}}>
                                        <span className={o.side === 'buy' ? 'text-up' : 'text-down'}>
                                            {o.side.toUpperCase()}
                                        </span>
                                        <span>{o.price} × {o.amount}</span>
                                        <span className="badge-custom badge-oco">{o.status}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        // ==================== MARKET LIST ====================
        const MarketList = ({ active, onSelect }) => {
            const [markets, setMarkets] = useState([
                { s: 'BTC/USDT', p: 78440, c: 0.26, v: 572733550 },
                { s: 'ETH/USDT', p: 2310, c: 0.12, v: 234567890 },
                { s: 'BNB/USDT', p: 619, c: -0.23, v: 123456789 },
                { s: 'SOL/USDT', p: 84.17, c: 0.04, v: 98765432 },
                { s: 'XRP/USDT', p: 1.393, c: -0.08, v: 87654321 },
                { s: 'DOGE/USDT', p: 0.108, c: -0.15, v: 76543210 },
                { s: 'ADA/USDT', p: 0.250, c: 0.16, v: 65432109 },
                { s: 'AVAX/USDT', p: 14.52, c: 2.31, v: 54321098 },
                { s: 'DOT/USDT', p: 7.23, c: 1.45, v: 43210987 },
                { s: 'MATIC/USDT', p: 0.528, c: -0.85, v: 32109876 }
            ]);
            
            useEffect(() => {
                const update = setInterval(() => {
                    setMarkets(prev => prev.map(m => ({
                        ...m,
                        p: m.p * (0.999 + Math.random() * 0.002),
                        c: m.c + (Math.random() - 0.5) * 0.2
                    })));
                }, 3000);
                return () => clearInterval(update);
            }, []);
            
            const categories = ['All', 'USDT', 'BTC', 'ETH', 'BNB', 'ALTS'];
            
            return (
                <div className="card-panel" style={{height: '100%'}}>
                    <div style={{padding: '12px', borderBottom: '1px solid var(--border)'}}>
                        <div className="d-flex gap-1 flex-wrap">
                            {categories.map(c => (
                                <span key={c} className="time-tab">{c}</span>
                            ))}
                        </div>
                    </div>
                    
                    <div style={{overflow: 'auto', height: 'calc(100% - 60px)'}}>
                        {markets.map((m, i) => (
                            <div key={i} className={`market-item ${active === m.s ? 'active' : ''}`} onClick={() => onSelect(m.s)}>
                                <div>
                                    <div style={{fontWeight: '600', marginBottom: '2px'}}>{m.s.replace('/USDT','')}</div>
                                    <div style={{fontSize: '10px', color: 'var(--light-dim)'}}>
                                        Vol: ${formatNumber(m.v)}
                                    </div>
                                </div>
                                <div style={{textAlign: 'right'}}>
                                    <div style={{fontWeight: '600'}}>${formatPrice(m.p)}</div>
                                    <div className={m.c >= 0 ? 'text-up' : 'text-down'} style={{fontSize: '11px'}}>
                                        {m.c >= 0 ? '+' : ''}{m.c.toFixed(2)}%
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // ==================== RECENT TRADES ====================
        const RecentTrades = ({ symbol }) => {
            const [trades, setTrades] = useState([]);
            
            useEffect(() => {
                const t = [];
                for (let i = 0; i < 20; i++) {
                    t.push({
                        price: 78440 + (Math.random() - 0.5) * 20,
                        amount: Math.random() * 2,
                        time: new Date().toLocaleTimeString(),
                        side: Math.random() > 0.5 ? 'buy' : 'sell'
                    });
                }
                setTrades(t);
                
                const update = setInterval(() => {
                    setTrades(prev => {
                        const n = [...prev.slice(1)];
                        n.push({
                            price: 78440 + (Math.random() - 0.5) * 20,
                            amount: Math.random() * 2,
                            time: new Date().toLocaleTimeString(),
                            side: Math.random() > 0.5 ? 'buy' : 'sell'
                        });
                        return n;
                    });
                }, 1500);
                
                return () => clearInterval(update);
            }, [symbol]);
            
            return (
                <div className="card-panel" style={{height: '280px'}}>
                    <div className="card-header-custom">Recent Trades</div>
                    <div style={{padding: '4px 0', fontSize: '11px', color: 'var(--light-dim)'}}>
                        <div className="d-flex" style={{padding: '0 12px'}}>
                            <span style={{flex: 1}}>Price(USDT)</span>
                            <span style={{flex: 1, textAlign: 'right'}}>Amount(BTC)</span>
                            <span style={{flex: 1, textAlign: 'right'}}>Time</span>
                        </div>
                    </div>
                    <div style={{overflow: 'auto', height: '230px'}}>
                        {trades.map((t, i) => (
                            <div key={i} className="orderbook-row" style={{padding: '2px 12px'}}>
                                <span className={t.side === 'buy' ? 'text-up' : 'text-down'} style={{flex: 1}}>
                                    {formatPrice(t.price)}
                                </span>
                                <span style={{flex: 1, textAlign: 'right'}}>{t.amount.toFixed(5)}</span>
                                <span style={{flex: 1, textAlign: 'right', color: 'var(--light-dim)'}}>
                                    {t.time}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        
        // ==================== MAIN APP ====================
        const App = () => {
            const [page, setPage] = useState('trade');
            const [symbol, setSymbol] = useState('BTC/USDT');
            const { web3, account, chainId, balance, connected, connect, disconnect } = useWeb3();
            
            const navItems = [
                { id: 'trade', label: 'Trade', icon: 'bi-graph-up' },
                { id: 'futures', label: 'Futures', icon: 'bi-globe' },
                { id: 'earn', label: 'Earn', icon: 'bi-cash-stack' },
                { id: 'wallet', label: 'Wallet', icon: 'bi-wallet2' },
                { id: 'history', label: 'History', icon: 'bi-clock-history' },
                { id: 'api', label: 'API', icon: 'bi-code-slash' }
            ];
            
            return (
                <div>
                    {/* Ticker */}
                    <TickerStrip />
                    
                    {/* Navbar */}
                    <nav className="d-flex justify-content-between align-items-center" 
                         style={{background: 'var(--dark-2)', borderBottom: '1px solid var(--border)', padding: '0 20px'}}>
                        <div className="d-flex align-items-center">
                            <span className="navbar-brand-custom me-3" style={{padding: '14px 0'}}>
                                <i className="bi bi-gem me-2"></i>TigerEx
                            </span>
                            {navItems.map(n => (
                                <div key={n.id} className={`nav-item-custom ${page === n.id ? 'active' : ''}`}
                                     onClick={() => setPage(n.id)}>
                                    <i className={`bi ${n.icon} me-1`}></i>{n.label}
                                </div>
                            ))}
                        </div>
                        
                        <div className="d-flex align-items-center gap-3">
                            <div style={{position: 'relative'}}>
                                <i className="bi bi-search search-icon"></i>
                                <input type="text" className="search-input" placeholder="Search" />
                            </div>
                            
                            <div className="d-flex align-items-center gap-2">
                                <span className={`status-indicator ${connected ? 'status-connected' : 'status-disconnected'}`}></span>
                                <span style={{fontSize: '11px', color: 'var(--light-dim)'}}>
                                    {connected ? 'Connected' : 'Offline'}
                                </span>
                            </div>
                            
                            {connected ? (
                                <button className="btn-connect-custom" onClick={disconnect}>
                                    {account?.substring(0, 6)}...{account?.substring(38)}
                                </button>
                            ) : (
                                <button className="btn-connect-custom" onClick={connect}>
                                    <i className="bi bi-wallet2 me-2"></i>Connect
                                </button>
                            )}
                        </div>
                    </nav>
                    
                    {/* Main Content */}
                    <div className="container-fluid p-3">
                        {page === 'trade' ? (
                            <div className="row g-3">
                                {/* Markets - Left */}
                                <div className="col-md-2 d-none-mobile">
                                    <MarketList active={symbol} onSelect={setSymbol} />
                                </div>
                                
                                {/* Chart & Order Book - Center */}
                                <div className="col-md-7">
                                    <PriceChart symbol={symbol} />
                                    <div className="mt-3">
                                        <OrderBook symbol={symbol} />
                                    </div>
                                </div>
                                
                                {/* Trading & Trades - Right */}
                                <div className="col-md-3">
                                    <TradingForm symbol={symbol} web3={web3} account={account} connected={connected} />
                                    <div className="mt-3">
                                        <RecentTrades symbol={symbol} />
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="card-panel p-5 text-center">
                                <h4>{navItems.find(n => n.id === page)?.label}</h4>
                                <p className="text-muted">Coming soon...</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
