<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx Margin Trading</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/web3@1.10.0/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --dim: #8b8b8b; --green: #00c087; --red: #f6465d; --orange: #f0b90b; --border: #2a3140; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: var(--light); font-family: -apple-system, sans-serif; font-size: 12px; }
        .card { background: var(--dark2); border: 1px solid var(--border); border-radius: 8px; }
        .text-up { color: var(--green) !important; }
        .text-down { color: var(--red) !important; }
        .text-orange { color: var(--orange) !important; }
        .btn-borrow { background: var(--primary); color: #000; font-weight: 600; }
        .btn-repay { background: var(--orange); color: #000; font-weight: 600; }
        .input-field { background: var(--dark3); border: 1px solid var(--border); color: var(--light); padding: 10px; border-radius: 4px; width: 100%; }
        .asset-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); }
        .slider { -webkit-appearance: none; width: 100%; height: 6px; background: var(--dark3); border-radius: 3px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--primary); border-radius: 50%; cursor: pointer; }
        .ticker { background: linear-gradient(90deg, var(--primary), #00b894); height: 36px; overflow: hidden; display: flex; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const useWeb3 = () => {
            const [s, setS] = useState({connected: false, account: null});
            const connect = async () => {
                if (window.ethereum) {
                    const w3 = new Web3(window.ethereum);
                    const [acc] = await window.ethereum.request({method: 'eth_requestAccounts'});
                    if (acc) setS({connected: true, account: acc});
                }
            };
            return {...s, connect};
        };
        
        const Ticker = () => {
            const [t, setT] = useState([{s:'BTC',p:78440,c:0.26},{s:'ETH',p:2310,c:0.12},{s:'BNB',p:619,c:-0.23}]);
            useEffect(() => { const i = setInterval(() => setT(p => p.map(x => ({...x, p: x.p * (0.999 + Math.random()*0.002)}))), 2000); return () => clearInterval(i); }, []);
            return <div className="ticker">{[...t,...t].map((x,i) => <div key={i} className="d-inline-flex gap-2 px-4 align-items-center" style={{whiteSpace:'nowrap',borderRight:'1px solid rgba(0,0,0,0.15)'}}><span style={{fontWeight:600,color:'#000'}}>{x.s}/USDT</span><span style={{color:'#000'}}>${x.p.toFixed(2)}</span><span style={{color:x.c>=0?'#000':'#333'}}>{x.c>=0?'+':''}{x.c.toFixed(2)}%</span></div>)}</div>;
        };
        
        const Assets = () => {
            const [assets, setA] = useState([
                {sym:'USDT', borrowed: 1000, available: 5000, limit: 10000},
                {sym:'BTC', borrowed: 0.5, available: 2.5, limit: 10},
                {sym:'ETH', borrowed: 5, available: 20, limit: 100}
            ]);
            return (
                <div className="card">
                    <div className="p-3 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}}>Cross Margin Assets</div>
                    {assets.map((a,i) => (
                        <div key={i} className="asset-row">
                            <div><div style={{fontWeight:600}}>{a.sym}</div><div className="text-muted" style={{fontSize:11}}>Borrowed: {a.borrowed} | Limit: {a.limit}</div></div>
                            <div className="text-end"><div className="text-up">{a.available}</div><div className="text-muted" style={{fontSize:11}}>Available</div></div>
                        </div>
                    ))}
                </div>
            );
        };
        
        const BorrowForm = () => {
            const [asset, setA] = useState('USDT');
            const [amount, setAmt] = useState('');
            const [slider, setS] = useState(25);
            return (
                <div className="card mt-3">
                    <div className="p-3 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}}>Borrow</div>
                    <div className="p-3">
                        <select className="input-field mb-3" value={asset} onChange={e=>setA(e.target.value)}>
                            <option>USDT</option><option>BTC</option><option>ETH</option>
                        </select>
                        <input type="number" className="input-field mb-2" placeholder="Amount" value={amount} onChange={e=>setAmt(e.target.value)} />
                        <input type="range" className="slider mb-3" value={slider} onChange={e=>setS(e.target.value)} />
                        <div className="d-flex justify-content-between mb-3"><span>Borrow Amount</span><span>{slider}%</span></div>
                        <div className="d-flex gap-2"><button className="btn btn-borrow flex-fill">Borrow</button><button className="btn btn-repay flex-fill">Repay</button></div>
                    </div>
                </div>
            );
        };
        
        const AccountInfo = () => (
            <div className="card mt-3">
                <div className="p-3 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}}>Account Info</div>
                <div className="row p-3">
                    <div className="col-6"><div className="text-muted small">Total Borrowed</div><div className="text-orange" style={{fontSize:18,fontWeight:600}}>$1,000.00</div></div>
                    <div className="col-6"><div className="text-muted small">Total Assets</div><div className="text-up" style={{fontSize:18,fontWeight:600}}>$15,000.00</div></div>
                    <div className="col-6 mt-3"><div className="text-muted small">Margin Ratio</div><div style={{fontSize:18,fontWeight:600}}>150%</div></div>
                    <div className="col-6 mt-3"><div className="text-muted small">Risk Level</div><div className="text-up" style={{fontSize:18,fontWeight:600}}>Safe</div></div>
                </div>
            </div>
        );
        
        const Positions = () => (
            <div className="card mt-3">
                <div className="p-3 border-bottom" style={{borderColor:'var(--border)', fontWeight:600}>Margin Positions</div>
                <div className="asset-row"><div><span className="badge bg-success me-2" style={{color:'#000'}}>LONG</span>BTC/USDT</div><div className="text-end"><div className="text-up">+$120.50</div><div className="text-up">+2.5%</div></div></div>
            </div>
        );
        
        const App = () => {
            const {connected, account, connect} = useWeb3();
            return (
                <div>
                    <Ticker />
                    <nav className="d-flex justify-content-between align-items-center px-4 py-2" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                        <div className="d-flex align-items-center"><span className="h4 me-4" style={{background:'linear-gradient(135deg,#00d4aa,#00f5d4)','-webkit-background-clip':'text','-webkit-text-fill-color':'transparent',fontWeight:700}}><i className="bi bi-gem me-2"></i>TigerEx Margin</span></div>
                        <button className="btn btn-primary" style={{background:connected?'green':'linear-gradient(135deg,#627eea,#00d4aa)'}} onClick={connect}>{connected ? account?.slice(0,6)+'...' : 'Connect'}</button>
                    </nav>
                    <div className="container-fluid p-3"><div className="row"><div className="col-md-8"><Assets /></div><div className="col-md-4"><BorrowForm /><AccountInfo /><Positions /></div></div></div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html><script>
const marginAPI = { getPositions: () => [
    {pair: "BTC/USDT", size: 1.5, collateral: 5000, PnL: 250},
    {pair: "ETH/USDT", size: 10, collateral: 2000, PnL: -120}
]};
function loadPositions() {
    let html = '<table><thead><tr><th>Pair</th><th>Size</th><th>Collateral</th><th>PnL</th></tr></thead><tbody>';
    marginAPI.getPositions().forEach(p => {
        html += `<tr><td>${p.pair}</td><td>${p.size}</td><td>$${p.collateral}</td><td class="${p.PnL>=0?'text-success':'text-danger'}">$${p.PnL}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('positions').innerHTML = html;
}
document.addEventListener('DOMContentLoaded', loadPositions);
</script>
