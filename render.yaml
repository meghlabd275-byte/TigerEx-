# TigerEx Render Deployment Configuration
# @file render.yaml
# @description Render.com deployment config
# @author TigerEx Development Team

services:
  - type: web
    name: tigerex-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.src.enhanced_unified_backend:app --host 0.0.0.0 --port $PORT
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          engine: POSTGRES
          databaseName: tigerex
          instance: tigerex-db
      - key: REDIS_URL
        fromService:
          type: redis
          name: tigerex-redis

  - type: web
    name: tigerex-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    region: oregon
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://tigerex-api.onrender.com

  - type: redis
    name: tigerex-redis
    plan: free

  - type: postgres
    name: tigerex-db
    plan: free
    version: 15