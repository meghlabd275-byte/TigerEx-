<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx - Desktop App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #F0B90B; --bg-dark: #0B0E11; --bg-card: #1E2329; --text: #EAECEF; --text-secondary: #848E9C; }
        body { background: var(--bg-dark); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .tab-toggle { display: flex; background: var(--bg-dark); border-radius: 8px; padding: 4px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; border-radius: 6px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: #000; }
        .tab-btn:not(.active) { color: var(--text-secondary); }
        .tab-field { display: none; }
        .tab-field.active { display: block; }
        .country-select { background: var(--bg-dark); border: 1px solid #2B3139; border-radius: 8px; padding: 12px 16px; color: var(--text); font-size: 18px; cursor: pointer; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold" style="color: var(--primary)">🐯 TigerEx</h1>
            <p class="text-gray-400 mt-2">Desktop Trading Platform</p>
        </div>
        
        <!-- Login Card -->
        <div class="bg-[#1E2329] rounded-2xl p-8 shadow-xl">
            <h2 class="text-2xl font-bold mb-2">Welcome Back</h2>
            <p class="text-gray-400 mb-6">Sign in to continue</p>
            
            <!-- Tab Toggle -->
            <div class="tab-toggle mb-6">
                <button class="tab-btn active" onclick="switchTab('email')">Email</button>
                <button class="tab-btn" onclick="switchTab('phone')">Phone</button>
            </div>
            
            <!-- Email Field -->
            <div class="tab-field active" id="emailField">
                <label class="block text-sm text-gray-400 mb-2">Email</label>
                <input type="email" id="email" placeholder="name@example.com" class="w-full px-4 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg text-white focus:border-yellow-500 outline-none mb-4">
            </div>
            
            <!-- Phone Field -->
            <div class="tab-field" id="phoneField">
                <label class="block text-sm text-gray-400 mb-2">Phone Number</label>
                <div class="flex gap-2 mb-4">
                    <select class="country-select">
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+91" selected>🇮🇳 +91</option>
                        <option value="+86">🇨🇳 +86</option>
                        <option value="+880">🇧🇩 +880</option>
                        <option value="+971">🇦🇪 +971</option>
                        <option value="+965">🇰🇼 +965</option>
                    </select>
                    <input type="tel" placeholder="1234567890" class="flex-1 px-4 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg text-white focus:border-yellow-500 outline-none">
                </div>
            </div>
            
            <label class="block text-sm text-gray-400 mb-2">Password</label>
            <input type="password" placeholder="Enter password" class="w-full px-4 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg text-white focus:border-yellow-500 outline-none mb-4">
            
            <a href="#" class="text-yellow-500 text-sm block text-right mb-4">Forgot Password?</a>
            
            <button class="w-full py-3 rounded-lg font-bold text-black" style="background: var(--primary)">Sign In</button>
            
            <div class="flex items-center my-6">
                <div class="flex-1 h-px bg-[#2B3139]"></div>
                <span class="px-4 text-gray-500">or</span>
                <div class="flex-1 h-px bg-[#2B3139]"></div>
            </div>
            
            <div class="flex justify-center gap-4">
                <button class="px-6 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg">G</button>
                <button class="px-6 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg">🍎</button>
                <button class="px-6 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg">🐙</button>
            </div>
            
            <p class="text-center text-gray-400 mt-6">Don't have an account? <a href="#" class="text-yellow-500 font-medium">Sign Up</a></p>
        </div>
        
        <!-- Register Card (Hidden by default) -->
        <div class="bg-[#1E2329] rounded-2xl p-8 shadow-xl mt-6" id="registerCard" style="display:none;">
            <h2 class="text-2xl font-bold mb-2">Create Account</h2>
            <p class="text-gray-400 mb-6">Join TigerEx today</p>
            
            <div class="tab-toggle mb-6">
                <button class="tab-btn active" onclick="switchRegTab('email')">Email</button>
                <button class="tab-btn" onclick="switchRegTab('phone')">Phone</button>
            </div>
            
            <div class="tab-field active" id="regEmailField">
                <input type="email" placeholder="Enter your email" class="w-full px-4 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg text-white mb-4">
            </div>
            
            <div class="tab-field" id="regPhoneField">
                <div class="flex gap-2 mb-4">
                    <select class="country-select"><option>+1</option><option>+91</option></select>
                    <input type="tel" placeholder="Phone number" class="flex-1 px-4 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg text-white">
                </div>
            </div>
            
            <input type="password" placeholder="Create password" class="w-full px-4 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg text-white mb-4">
            <input type="password" placeholder="Confirm password" class="w-full px-4 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg text-white mb-4">
            
            <button class="w-full py-3 rounded-lg font-bold text-black" style="background: var(--primary)">Create Account</button>
            <p class="text-center text-gray-400 mt-4">Already have an account? <a href="#" class="text-yellow-500 font-medium" onclick="toggleAuth()">Sign In</a></p>
        </div>
        
        <!-- Forgot Password Card -->
        <div class="bg-[#1E2329] rounded-2xl p-8 shadow-xl mt-6" id="forgotCard" style="display:none;">
            <h2 class="text-2xl font-bold mb-2">Reset Password</h2>
            <p class="text-gray-400 mb-6">Enter email to receive OTP</p>
            
            <input type="email" placeholder="Enter your email" class="w-full px-4 py-3 bg-[#0B0E11] border border-[#2B3139] rounded-lg text-white mb-4">
            
            <button class="w-full py-3 rounded-lg font-bold text-black mb-4" style="background: var(--primary)">Send OTP</button>
            
            <p class="text-center text-gray-400 mt-4"><a href="#" class="text-yellow-500 font-medium" onclick="toggleAuth()">Back to Login</a></p>
        </div>
    </div>
    
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if(tab === 'email') {
                document.getElementById('emailField').classList.add('active');
                document.getElementById('phoneField').classList.remove('active');
            } else {
                document.getElementById('phoneField').classList.add('active');
                document.getElementById('emailField').classList.remove('active');
            }
        }
        
        function switchRegTab(tab) {
            if(tab === 'email') {
                document.getElementById('regEmailField').classList.add('active');
                document.getElementById('regPhoneField').classList.remove('active');
            } else {
                document.getElementById('regPhoneField').classList.add('active');
                document.getElementById('regEmailField').classList.remove('active');
            }
        }
        
        function toggleAuth() {
            const loginCard = document.querySelector('.bg-\\[\\#1E2329\\]');
            const registerCard = document.getElementById('registerCard');
            const forgotCard = document.getElementById('forgotCard');
            
            if (registerCard.style.display === 'none') {
                loginCard.style.display = 'none';
                registerCard.style.display = 'block';
                forgotCard.style.display = 'none';
            } else {
                loginCard.style.display = 'block';
                registerCard.style.display = 'none';
                forgotCard.style.display = 'none';
            }
        }
    </script>
</body>
</html>
