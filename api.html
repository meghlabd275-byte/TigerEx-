<!DOCTYPE html>
<!--
@file api.html
@description TigerEx platform page
@author TigerEx Development Team

<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Management | TigerEx</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --primary-color:#F0B90B; --bg-dark:#0B0E11; --bg-card:#1E2329; --text-primary:#EAECEF; --text-secondary:#848E9C; --accent-green:#00C087; --accent-red:#F6465D; --border-color:#2B3139; --hover-bg:#2B3139; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
    .header { background: var(--bg-card); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
    .back-btn { color: var(--text-primary); text-decoration: none; font-size: 14px; padding: 8px 12px; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 8px; display: flex; align-items: center; gap: 8px; }
    .logo { display: flex; align-items: center; gap: 8px; font-size: 22px; font-weight: 700; text-decoration: none; color: var(--text-primary); }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary-color), #FF6B6B); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .page-title { font-size: 20px; font-weight: 600; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    .warning-box { background: rgba(240,185,11,0.1); border: 1px solid var(--primary-color); border-radius: 12px; padding: 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .btn { padding: 14px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
    .btn-primary { background: var(--primary-color); color: var(--bg-dark); }
    .btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border-color); }
    .api-keys { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; }
    .api-header { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr; padding: 16px 20px; background: var(--bg-dark); font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
    .api-row { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr; padding: 16px 20px; border-bottom: 1px solid var(--border-color); align-items: center; }
    .api-name { font-weight: 600; }
    .api-key { font-size: 13px; color: var(--text-secondary); }
    .btn-icon { padding: 8px; background: transparent; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; margin-left: 8px; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 24px; width: 400px; max-width: 90%; }
  </style>
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
  <header class="header">
    <div style="display:flex;align-items:center;gap:16px">
      <a href="dashboard.html" class="back-btn">← Back</a>
      <a href="dashboard.html" class="logo"><div class="logo-icon">🐯</div><span>TigerEx</span></a>
    </div>
    <h1 class="page-title">API Management</h1>
  </header>
  <div class="container">
    <div class="warning-box"><span>⚠️</span><div><strong>Security:</strong> Keep API keys secret!</div></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:16px;font-weight:600">Your API Keys</h2>
      <button class="btn btn-primary" onclick="showModal()">+ Create Key</button>
    </div>
    <div class="api-keys">
      <div class="api-header"><div>Name</div><div>Key</div><div>Permissions</div><div>Created</div></div>
      <div class="api-row"><div class="api-name">Trading Bot</div><div class="api-key">mxK8...mR4n</div><div>Read/Write</div><div>2026-04-15</div></div>
      <div class="api-row"><div class="api-name">Trading Bot 2</div><div class="api-key">pK9...nP3k</div><div>Read Only</div><div>2026-04-10</div></div>
    </div>
  </div>
  <script>function showModal(){document.getElementById('m').classList.add('active')}</script>
    <script src="assets/js/auth-guard.js"></script>
</body>
</html>
