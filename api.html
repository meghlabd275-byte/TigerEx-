<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx API</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); font-size: 13px; }
        .card-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        
        const EndpointRow = ({method, path, desc}) => (
            <tr style={{borderBottom:'1px solid var(--border)'}}>
                <td className="p-2"><span className="badge bg-success">{method}</span></td>
                <td className="p-2" style={{fontFamily:'monospace'}}>{path}</td>
                <td className="p-2 text-muted">{desc}</td>
            </tr>
        );
        
        const App = () => {
            const [keys, setKeys] = useState([
                {key:'ak_xxxx...', secret:'as_xxxx...', name:'Main API',_perms:'Read+Write',status:'Active'},
            ]);
            const [showKey, setShowKey] = useState(false);
            
            return (
                <div>
                    <nav className="d-flex justify-content-between p-4" style={{background:'var(--dark2)',borderBottom:'1px solid var(--border)'}}>
                        <span className="h4"><i className="bi bi-code-slash me-2 text-primary"></i>TigerEx API</span>
                    </nav>
                    <div className="container-fluid p-4">
                        <div className="row g-3 mb-4">
                            <div className="col-md-4"><div className="card-panel p-3"><h6>Requests (24h)</h6><h4>1.2M</h4></div></div>
                            <div className="col-md-4"><div className="card-panel p-3"><h6>Rate Limit</h6><h4>1200/min</h4></div></div>
                            <div className="col-md-4"><div className="card-panel p-3"><h6>Errors</h6><h4 className="text-danger">0.01%</h4></div></div>
                        </div>
                        <div className="card-panel p-3 mb-3">
                            <h5 className="mb-3">API Keys</h5>
                            {keys.map((k,i)=><div key={i} className="d-flex justify-content-between p-2 mb-2" style={{background:'var(--dark3)',borderRadius:8}}>
                                <div><div style={{fontWeight:600}}>{k.name}</div>
                                <code className="text-muted">{showKey?k.key:'ak_xxxx...xxxx'}</code></div>
                                <div className="d-flex gap-2 align-items-center">
                                    <span className="badge bg-success">{k.status}</span>
                                    <button className="btn btn-sm" style={{background:'var(--primary)',color:'#000'}} onClick={()=>setShowKey(!showKey)}>{showKey?'Hide':'Show'}</button>
                                </div>
                            </div>)}
                            <button className="btn" style={{background:'var(--primary)',color:'#000'}}>Create Key</button>
                        </div>
                        <div className="card-panel p-3">
                            <h5 className="mb-3">Endpoints</h5>
                            <table><tbody>
                                <EndpointRow method="GET" path="/api/v1/ticker" desc="24h price change" />
                                <EndpointRow method="GET" path="/api/v1/depth" desc="Order book" />
                                <EndpointRow method="POST" path="/api/v1/order" desc="Place order" />
                                <EndpointRow method="GET" path="/api/v1/account" desc="Account info" />
                                <EndpointRow method="GET" path="/api/v1/balance" desc="Wallet balance" />
                            </tbody></table>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
