<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TigerEx API</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary: #00d4aa; --dark: #0b0e14; --dark2: #161c25; --dark3: #1e2633; --light: #eaeaea; --border: #2a3140; }
        body { background: var(--dark); color: var(--light); font-size: 13px; }
        .card-panel { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const EndpointRow = ({method, path, desc}) => (
            <tr style={{borderBottom:'1px solid var(--border)'}}>
                <td className="p-2"><span className="badge bg-success">{method}</span></td>
                <td className="p-2" style={{fontFamily:'monospace'}}>{path}</td>
                <td className="p-2 text-muted">{desc}</td>
            </tr>
        );

        const App = () => {
            const [showKey, setShowKey] = useState(false);
            const [keys, setKeys] = useState([
                {name: "Main API Key", key: "ak_live_xxxx", status: "Active"},
                {name: "Test Key", key: "ak_test_yyyy", status: "Test"}
            ]);

            return (
                <div className="container py-4">
                    <div className="d-flex justify-content-between align-items-center mb-4">
                        <div><h3 className="mb-0"><i className="bi bi-lightning-charge-fill text-warning"></i> TigerEx API</h3></div>
                        <div className="d-flex gap-2">
                            <button className="btn btn-sm" style={{background:'var(--primary)',color:'#000'}}>Documentation</button>
                            <button className="btn btn-sm btn-outline-light">SDKs</button>
                        </div>
                    </div>
                    <div className="row">
                        <div className="col-md-8">
                            <div className="card-panel p-3 mb-3">
                                <h5 className="mb-3">Endpoints</h5>
                                <table style={{width:'100%'}}>
                                    <thead><tr><th>Method</th><th>Path</th><th>Description</th></tr></thead>
                                    <tbody>
                                        <EndpointRow method="GET" path="/api/v1/ticker" desc="24h price change" />
                                        <EndpointRow method="GET" path="/api/v1/depth" desc="Order book" />
                                        <EndpointRow method="POST" path="/api/v1/order" desc="Place order" />
                                        <EndpointRow method="GET" path="/api/v1/account" desc="Account info" />
                                        <EndpointRow method="GET" path="/api/v1/balance" desc="Wallet balance" />
                                        <EndpointRow method="POST" path="/api/wallet/create" desc="Create wallet (24-word seed)" />
                                        <EndpointRow method="GET" path="/api/wallet/list" desc="List wallets" />
                                        <EndpointRow method="GET" path="/api/wallet/import" desc="Import wallet" />
                                        <EndpointRow method="POST" path="/api/defi/swap" desc="Token swap" />
                                        <EndpointRow method="POST" path="/api/defi/pool" desc="Create liquidity pool" />
                                        <EndpointRow method="POST" path="/api/defi/stake" desc="Stake tokens" />
                                        <EndpointRow method="POST" path="/api/defi/bridge" desc="Bridge tokens" />
                                        <EndpointRow method="POST" path="/api/defi/create-token" desc="Create new token" />
                                        <EndpointRow method="GET" path="/api/admin/gas-fees" desc="Get gas fees" />
                                        <EndpointRow method="POST" path="/api/admin/set-gas-fee" desc="Set gas fee" />
                                    </tbody>
                                </table>
                            </div>
                        </div>
                        <div className="col-md-4">
                            <div className="card-panel p-3 mb-3">
                                <h5 className="mb-3">API Keys</h5>
                                {keys.map((k,i)=><div key={i} className="d-flex justify-content-between p-2 mb-2" style={{background:'var(--dark3)',borderRadius:8}}>
                                    <div><div style={{fontWeight:600}}>{k.name}</div>
                                    <code className="text-muted">{showKey?k.key:'ak_xxxx...xxxx'}</code></div>
                                    <div className="d-flex gap-2 align-items-center">
                                        <span className="badge bg-success">{k.status}</span>
                                        <button className="btn btn-sm" style={{background:'var(--primary)',color:'#000'}} onClick={()=>setShowKey(!showKey)}>{showKey?'Hide':'Show'}</button>
                                    </div>
                                </div>)}
                                <button className="btn" style={{background:'var(--primary)',color:'#000'}}>Create Key</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
