# ==========================================
# TigerEx Production Deployment Workflow
# @file deploy.yml
# @description CI/CD pipeline for TigerEx deployment
# @author TigerEx Development Team
# @version v12.0.0
# ==========================================

name: Deploy TigerEx

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api-gateway:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/user-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-user-service:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Trading Engine
        uses: docker/build-push-action@v5
        with:
          context: ./backend/trading-engine
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-trading-engine:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Wallet Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/wallet-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-wallet-service:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to Production
        run: |
          echo "Deployment triggered for commit ${{ github.sha }}"
          echo "Container images pushed to GHCR"
          echo "Deploy using: docker-compose up -d"